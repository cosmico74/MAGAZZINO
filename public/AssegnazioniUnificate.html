<!DOCTYPE html>
<html lang="it">
<head>
  <link rel="icon" type="image/png" href="/images/kastle-logo.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>📦 Assegnazioni e Rientri</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f2f5;
      margin: 0;
      padding: 20px;
      cursor: default;
    }
    body.loading, body.loading * { cursor: wait !important; }
    .container {
      max-width: 1400px;
      margin: 0 auto;
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      padding: 12px 20px 20px 20px;
    }
    .header-main {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 10px;
      gap: 10px;
    }
    h2 {
      margin: 0;
      font-size: 1.6rem;
      border-left: 4px solid #1a73e8;
      padding-left: 10px;
      color: #1e2a3a;
    }
    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .density-selector {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.7rem;
    }
    .density-selector select {
      padding: 2px 5px;
      font-size: 0.7rem;
    }
    .btn {
      background: #1a73e8;
      color: white;
      border: none;
      padding: 4px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.7rem;
      font-weight: 500;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .btn:hover { background: #0f5bb5; transform: translateY(-1px); }
    .btn-success { background: #27ae60; }
    .btn-secondary { background: #6c757d; }
    .btn-sm { padding: 2px 6px; font-size: 0.65rem; }

    .header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
      flex-wrap: wrap;
      gap: 6px;
    }
    .logo img { height: 30px; }
    .login-info {
      background: #e8f0fe;
      padding: 2px 8px;
      border-radius: 16px;
      font-size: 0.7rem;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .sep {
      margin: 6px 0 10px 0;
      border-top: 1px solid #e2e8f0;
    }

    .source-selector, .source-selection {
      background: #f8f9fa;
      border-radius: 10px;
      border: 1px solid #e2e8f0;
    }
    .source-selector {
      padding: 5px 12px;
      margin-bottom: 8px;
      display: flex;
      gap: 20px;
      align-items: center;
      flex-wrap: wrap;
    }
    .source-option {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.75rem;
    }
    .source-selection {
      padding: 5px 12px;
      margin-bottom: 8px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: flex-end;
    }
    .form-group {
      margin-bottom: 0;
      flex: 1;
      min-width: 120px;
    }
    .form-group label {
      display: block;
      font-weight: 600;
      font-size: 0.6rem;
      margin-bottom: 2px;
      color: #2c3e50;
      text-transform: uppercase;
    }
    .form-group input, .form-group select {
      width: 100%;
      padding: 4px 6px;
      border: 1px solid #cbd5e0;
      border-radius: 6px;
      font-size: 0.7rem;
    }

    .table-wrapper {
      overflow-x: auto;
      overflow-y: auto;
      max-height: 70vh;
      border-radius: 12px;
      border: 1px solid #e2e8f0;
      background: white;
      position: relative;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.75rem;
      white-space: nowrap;
    }
    th, td {
      border-bottom: 1px solid #e2e8f0;
      padding: 6px 8px;
      text-align: left;
      vertical-align: middle;
    }
    th {
      background: #f8fafc;
      font-weight: 600;
      position: sticky;
      top: 0;
      z-index: 10;
      cursor: pointer;
      user-select: none;
    }
    th:hover { background: #e2e8f0; }
    th .sort-arrow {
      display: inline-block;
      margin-left: 6px;
      font-size: 0.7rem;
    }
    tr:hover td { background: #fefce8; }

    .density-small th, .density-small td { padding: 2px 5px; font-size: 0.65rem; }
    .density-medium th, .density-medium td { padding: 5px 7px; font-size: 0.75rem; }
    .density-large th, .density-large td { padding: 8px 10px; font-size: 0.85rem; }

    @media print {
      @page { margin: 0.5cm; size: auto; }
      body { background: white; padding: 0; margin: 0; }
      .container { max-width: 100%; padding: 0; margin: 0; box-shadow: none; }
      .no-print { display: none !important; }
      .login-info { display: none !important; }
      .header-bar .btn-secondary { display: none !important; }
      .header-bar .logo { display: block !important; }
      .header-bar { justify-content: center; }
      .table-wrapper { overflow: visible; max-height: none; }
      table { page-break-inside: avoid; width: 100%; }
      th, td { border: 1px solid #ccc; }
      th { position: static; }
      .logo img { height: 20px !important; }
      h2 { font-size: 1.8rem !important; }
      #tabellaOggetti th:last-child,
      #tabellaOggetti td:last-child { display: none; }
      .print-footer-right {
        display: block !important;
        position: fixed;
        bottom: 5px;
        right: 5px;
        font-size: 8px;
        color: #666;
        text-align: right;
      }
      header, footer { display: none !important; }
    }
    .print-footer-right { display: none; }

    .message {
      padding: 4px 8px;
      border-radius: 6px;
      margin-bottom: 8px;
      font-size: 0.7rem;
    }
    .success { background: #d4edda; color: #155724; border-left: 3px solid #38a169; }
    .error { background: #f8d7da; color: #721c24; border-left: 3px solid #e53e3e; }
    .info { background: #e8f0fe; color: #1a73e8; border-left: 3px solid #1a73e8; }
    .text-center { text-align: center; }

    .modal {
      display: none;
      position: fixed;
      top:0; left:0;
      width:100%; height:100%;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .modal-content {
      background: white;
      border-radius: 16px;
      width: 90%;
      max-width: 500px;
      max-height: 85vh;
      overflow-y: auto;
      padding: 0;
    }
    .modal-header {
      padding: 10px 15px;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .modal-header h3 { margin: 0; font-size: 1.1rem; }
    .close {
      font-size: 1.3rem;
      font-weight: bold;
      cursor: pointer;
      color: #aaa;
    }
    .close:hover { color: black; }
    .modal-body { padding: 12px 15px; }
    .modal-footer {
      padding: 10px 15px;
      border-top: 1px solid #e2e8f0;
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      background: #f8fafc;
    }
    .form-group { margin-bottom: 10px; }
    .form-control {
      width: 100%;
      padding: 5px 8px;
      border: 1px solid #cbd5e0;
      border-radius: 8px;
      font-size: 0.75rem;
    }
    .warning-badge {
      background: #fef3c7;
      color: #92400e;
      padding: 4px 8px;
      border-radius: 8px;
      font-size: 0.65rem;
      margin-top: 4px;
    }

    @media (max-width: 768px) {
      body { padding: 8px; }
      .container { padding: 8px 12px; }
      .source-selector, .source-selection { flex-direction: column; align-items: stretch; }
      .source-selection { gap: 8px; }
      .form-group { min-width: auto; }
      .header-main { flex-direction: column; align-items: stretch; }
      .toolbar { justify-content: flex-start; }
      .density-medium th, .density-medium td { padding: 4px 6px; font-size: 0.65rem; }
      .table-wrapper { max-height: 60vh; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header-bar">
    <div class="logo"><img src="/images/kastle-logo.png" alt="Kastle"></div>
    <div style="display: flex; gap: 6px; align-items: center;">
      <span id="loginInfo" class="login-info"></span>
      <button class="btn btn-secondary no-print" onclick="window.location.href='MenuPrincipale.html'">🏠 Menu</button>
      <button class="btn btn-secondary no-print" onclick="logout()">🚪 Logout</button>
      <button class="btn btn-secondary no-print" onclick="caricaOggetti()">🔄 Ricarica</button>
    </div>
  </div>
  <div class="sep"></div>

  <div class="header-main">
    <h2>📦 Assegnazioni e Rientri</h2>
    <div class="toolbar no-print">
      <div class="density-selector">
        <span>📏 Densità:</span>
        <select id="densitySelect" onchange="changeDensity()">
          <option value="small">Piccola</option>
          <option value="medium" selected>Media</option>
          <option value="large">Grande</option>
        </select>
      </div>
      <button class="btn btn-secondary" onclick="stampaTabella()">🖨️ Stampa</button>
      <button class="btn btn-success" onclick="esportaExcel()">📎 Esporta Excel</button>
    </div>
  </div>

  <div id="messageArea"></div>

  <div class="source-selector no-print">
    <div class="source-option">
      <input type="radio" name="source" id="sourceCarico" value="carico" checked>
      <label for="sourceCarico">📦 In carico (da soggetto)</label>
    </div>
    <div class="source-option">
      <input type="radio" name="source" id="sourceMagazzino" value="magazzino">
      <label for="sourceMagazzino">🏭 Dal magazzino</label>
    </div>
  </div>

  <!-- Sezione "In carico" -->
  <div id="caricoSection" class="source-selection no-print">
    <div class="form-group">
      <label>Sorgente (soggetto)</label>
      <select id="sourceTipo">
        <option value="PROMOTER">👤 Promoter</option>
        <option value="NEGOZIO">🏪 Negozio</option>
        <option value="CLIENTE">👥 Cliente</option>
        <option value="AGENTE">🤝 Agente</option>
      </select>
    </div>
    <div class="form-group">
      <label>Seleziona soggetto</label>
      <select id="sourceId"><option value="">Seleziona...</option></select>
    </div>
    <div class="form-group">
      <label><input type="checkbox" id="includeReferenced"> Includi referenti</label>
    </div>
  </div>

  <!-- Sezione "Dal magazzino" -->
  <div id="magazzinoSection" style="display: none;" class="no-print">
    <div class="source-selection">
      <div class="form-group">
        <label>Magazzino</label>
        <select id="magazzinoSelect"></select>
      </div>
      <div class="form-group">
        <label>Tipo oggetto</label>
        <select id="tipoOggettoMagazzino">
          <option value="TUTTI">Tutti</option>
          <option value="ARTICOLO">Articoli</option>
          <option value="KIT">Kit</option>
        </select>
      </div>
    </div>
    <div class="source-selection">
      <div class="form-group">
        <label>Lunghezza</label>
        <input type="text" id="filtroLunghezza" list="lunghezzaList" placeholder="Esatta">
        <datalist id="lunghezzaList"></datalist>
      </div>
      <div class="form-group">
        <label>Categoria</label>
        <select id="filtroCategoria">
          <option value="">Tutte</option>
        </select>
      </div>
      <div style="display: flex; gap: 8px; align-items: flex-end;">
        <button class="btn" onclick="applicaFiltriMagazzino()">🔍 Filtra</button>
        <button class="btn btn-secondary" onclick="resetFiltriMagazzino()">🔄 Reset</button>
      </div>
    </div>
  </div>

  <!-- Tabella -->
  <div class="table-wrapper" id="tableWrapper">
    <table id="tabellaOggetti">
      <thead id="tabellaHeader">
         <th id="colonnaPrimaria" data-sort="codice_sigla">Codice / Sigla <span class="sort-arrow"></span></th>
         <th data-sort="descrizione">Descrizione <span class="sort-arrow"></span></th>
         <th data-sort="lunghezza">Lunghezza <span class="sort-arrow"></span></th>
         <th data-sort="totale">Qtà <span class="sort-arrow"></span></th>
         <th data-sort="impegnato">Qtà impegnata <span class="sort-arrow"></span></th>
         <th data-sort="giacenza">Giacenza <span class="sort-arrow"></span></th>
         <th data-sort="destinatario">Assegnato a <span class="sort-arrow"></span></th>
         <th>Azioni</th>
      </thead>
      <tbody id="tabellaBody"><td colspan="8" class="text-center">Caricamento...<\/td></tbody>
    </table>
  </div>

  <div class="print-footer-right">
    <span id="printDate"></span><br>
    <span id="printUser"></span>
  </div>
</div>

<!-- MODALI -->
<div id="assignModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3>📤 Assegna a soggetto</h3>
      <span class="close" onclick="chiudiAssignModal()">&times;</span>
    </div>
    <div class="modal-body" id="assignModalContent"></div>
    <div class="modal-footer">
      <button class="btn btn-success" id="assignConfirmBtn">Assegna</button>
      <button class="btn btn-secondary" onclick="chiudiAssignModal()">Annulla</button>
    </div>
  </div>
</div>

<div id="editAssignmentModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3>✏️ Modifica Assegnazione</h3>
      <span class="close" onclick="chiudiEditModal()">&times;</span>
    </div>
    <div class="modal-body" id="editAssignmentContent"></div>
    <div class="modal-footer">
      <button class="btn btn-success" id="saveEditBtn">💾 Salva modifiche</button>
      <button class="btn btn-secondary" onclick="chiudiEditModal()">Annulla</button>
    </div>
  </div>
</div>

<div id="confirmRiassegnaModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3>⚠️ Conferma riassegnazione</h3>
      <span class="close" onclick="chiudiConfirmModal()">&times;</span>
    </div>
    <div class="modal-body">
      <p id="confirmMsg"></p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-warning" id="confirmOkBtn">Sì, trasferisci</button>
      <button class="btn btn-secondary" onclick="chiudiConfirmModal()">Annulla</button>
    </div>
  </div>
</div>

<div id="errorModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3>⚠️ Errore</h3>
      <span class="close" onclick="chiudiErrorModal()">&times;</span>
    </div>
    <div class="modal-body">
      <p id="errorMsg"></p>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="chiudiErrorModal()">Chiudi</button>
    </div>
  </div>
</div>

<script>
  // ========== UTILITY ==========
  function getAuthHeader() {
    const token = localStorage.getItem('token');
    if (!token) { window.location.href = 'Login.html'; return {}; }
    return { 'Authorization': 'Bearer ' + token };
  }

  async function apiFetch(endpoint, options = {}) {
    const headers = { 'Content-Type': 'application/json', ...getAuthHeader(), ...options.headers };
    const response = await fetch(endpoint, { ...options, headers });
    if (response.status === 401 || response.status === 403) {
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      window.location.href = 'Login.html';
      throw new Error('Sessione scaduta');
    }
    if (!response.ok) {
      let errorMsg = `Errore ${response.status}`;
      try { const err = await response.json(); errorMsg = err.message || errorMsg; } catch(e) {}
      throw new Error(errorMsg);
    }
    return response.json();
  }

  function showMessage(msg, type) {
    const div = document.getElementById('messageArea');
    div.innerHTML = `<div class="message ${type}">${msg}</div>`;
    setTimeout(() => div.innerHTML = '', 5000);
  }

  function showErrorModal(msg) {
    document.getElementById('errorMsg').innerHTML = msg;
    document.getElementById('errorModal').style.display = 'flex';
  }
  function chiudiErrorModal() { document.getElementById('errorModal').style.display = 'none'; }
  function chiudiAssignModal() { document.getElementById('assignModal').style.display = 'none'; currentAssignObj = null; }
  function chiudiEditModal() { document.getElementById('editAssignmentModal').style.display = 'none'; currentEditObj = null; }
  function chiudiConfirmModal() { document.getElementById('confirmRiassegnaModal').style.display = 'none'; pendingAction = null; }

  let currentUser = null;
  let magazzini = [], categorie = [];
  let oggetti = [];
  let currentEditObj = null, pendingAction = null, currentAssignObj = null;
  let sortColumn = 'codice_sigla', sortAsc = true;
  const kitDetailsCache = new Map();

  const radioCarico = document.getElementById('sourceCarico');
  const radioMagazzino = document.getElementById('sourceMagazzino');
  const caricoSection = document.getElementById('caricoSection');
  const magazzinoSection = document.getElementById('magazzinoSection');
  const sourceTipo = document.getElementById('sourceTipo');
  const sourceId = document.getElementById('sourceId');
  const includeReferenced = document.getElementById('includeReferenced');
  const magazzinoSelect = document.getElementById('magazzinoSelect');
  const tipoOggettoMagazzino = document.getElementById('tipoOggettoMagazzino');
  const filtroLunghezza = document.getElementById('filtroLunghezza');
  const filtroCategoria = document.getElementById('filtroCategoria');
  const lunghezzaList = document.getElementById('lunghezzaList');

  // ========== SORTING ==========
  function sortOggetti() {
    oggetti.sort((a, b) => {
      let valA = a[sortColumn];
      let valB = b[sortColumn];
      if (sortColumn === 'totale' || sortColumn === 'impegnato' || sortColumn === 'giacenza') {
        valA = parseFloat(valA) || 0;
        valB = parseFloat(valB) || 0;
      } else if (sortColumn === 'lunghezza') {
        valA = parseFloat(valA) || 0;
        valB = parseFloat(valB) || 0;
      } else {
        valA = (valA || '').toString().toLowerCase();
        valB = (valB || '').toString().toLowerCase();
      }
      if (valA < valB) return sortAsc ? -1 : 1;
      if (valA > valB) return sortAsc ? 1 : -1;
      return 0;
    });
  }

  function updateSortArrows() {
    document.querySelectorAll('#tabellaOggetti th[data-sort]').forEach(th => {
      const col = th.getAttribute('data-sort');
      const arrowSpan = th.querySelector('.sort-arrow');
      if (col === sortColumn) arrowSpan.innerHTML = sortAsc ? ' ↑' : ' ↓';
      else arrowSpan.innerHTML = '';
    });
    const colonnaPrimaria = document.getElementById('colonnaPrimaria');
    if (colonnaPrimaria) {
      const arrowSpan = colonnaPrimaria.querySelector('.sort-arrow');
      if (sortColumn === 'codice_sigla') arrowSpan.innerHTML = sortAsc ? ' ↑' : ' ↓';
      else arrowSpan.innerHTML = '';
    }
  }

  function attachSortHandlers() {
    document.querySelectorAll('#tabellaOggetti th[data-sort]').forEach(th => {
      th.removeEventListener('click', handleSortClick);
      th.addEventListener('click', handleSortClick);
    });
    const colonnaPrimaria = document.getElementById('colonnaPrimaria');
    if (colonnaPrimaria) {
      colonnaPrimaria.removeEventListener('click', handleSortClick);
      colonnaPrimaria.addEventListener('click', () => {
        const col = 'codice_sigla';
        if (sortColumn === col) sortAsc = !sortAsc;
        else { sortColumn = col; sortAsc = true; }
        sortOggetti();
        popolaTabella();
        updateSortArrows();
      });
    }
  }

  function handleSortClick(e) {
    const th = e.currentTarget;
    const col = th.getAttribute('data-sort');
    if (!col) return;
    if (sortColumn === col) sortAsc = !sortAsc;
    else { sortColumn = col; sortAsc = true; }
    sortOggetti();
    popolaTabella();
    updateSortArrows();
  }

  // ========== DENSITÀ, STAMPA, EXPORT ==========
  function changeDensity() {
    const val = document.getElementById('densitySelect').value;
    document.getElementById('tableWrapper').className = `table-wrapper density-${val}`;
  }

  async function stampaTabella() {
    const now = new Date().toLocaleString();
    document.getElementById('printDate').innerText = now;
    const userDisplay = currentUser?.nome_visualizzato || currentUser?.username || '';
    document.getElementById('printUser').innerText = userDisplay ? `Utente: ${userDisplay}` : '';
    window.print();
  }

  function esportaExcel() {
    const table = document.getElementById('tabellaOggetti');
    const rows = table.querySelectorAll('tr');
    let csv = [];
    for (let row of rows) {
      let rowData = [];
      let cells = row.querySelectorAll('th, td');
      for (let cell of cells) {
        let text = cell.innerText.trim();
        if (text === '✏️') text = '';
        if (cell.tagName === 'TH') text = text.replace(/[↑↓]/g, '').trim();
        rowData.push(`"${text.replace(/"/g, '""')}"`);
      }
      csv.push(rowData.join(','));
    }
    const blob = new Blob(["\uFEFF" + csv.join('\n')], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    const url = URL.createObjectURL(blob);
    link.href = url;
    link.setAttribute('download', 'assegnazioni.csv');
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(url);
  }

  // ========== OTTIMIZZAZIONE: recupero dettaglio kit con cache e Promise.all ==========
  async function getKitDetails(kitId) {
    if (kitDetailsCache.has(kitId)) return kitDetailsCache.get(kitId);
    try {
      const kit = await apiFetch(`/api/kit/${kitId}`);
      let sigla = '', lunghezza = '';
      const sciDetail = kit.dettagli?.find(d => d.tipo_articolo === 'SCI');
      if (sciDetail) {
        sigla = sciDetail.sigla || '';
        lunghezza = sciDetail.lunghezza || '';
        if (!lunghezza && sciDetail.articolo_id) {
          const art = await apiFetch(`/api/articoli/${sciDetail.articolo_id}`);
          lunghezza = art.lunghezza || '';
        }
      }
      const result = { sigla, lunghezza };
      kitDetailsCache.set(kitId, result);
      return result;
    } catch(e) {
      console.warn(`Errore dettagli kit ${kitId}:`, e);
      return { sigla: '', lunghezza: '' };
    }
  }

  // ========== OGGETTI IN CARICO (VERSIONE OTTIMIZZATA) ==========
  async function caricaOggettiInCarico() {
    const tipo = sourceTipo.value;
    const id = sourceId.value;
    if (!tipo || !id) { oggetti = []; popolaTabella(); return; }
    const body = { targetTipo: tipo, targetId: parseInt(id), includeReferenced: includeReferenced.checked };
    document.body.classList.add('loading');
    try {
      const res = await apiFetch('/api/assegnazioni/oggetti', { method: 'POST', body: JSON.stringify(body) });
      if (res.success) {
        let tutti = res.oggetti || [];
        // Recupera in parallelo tutti i dettagli dei kit
        const kitIds = tutti.filter(obj => obj.tipo === 'KIT').map(obj => obj.ID);
        const kitDetailsArray = await Promise.all(kitIds.map(id => getKitDetails(id)));
        const kitDetailsMap = new Map();
        for (let i = 0; i < kitIds.length; i++) {
          kitDetailsMap.set(kitIds[i], kitDetailsArray[i]);
        }
        // Mappa gli oggetti finali
        oggetti = tutti.map(obj => {
          let sigla = '';
          let lunghezza = '';
          if (obj.tipo === 'KIT') {
            const det = kitDetailsMap.get(obj.ID);
            sigla = det?.sigla || '';
            lunghezza = det?.lunghezza || '';
          } else {
            sigla = obj.SIGLA_CORRENTE || '';
            lunghezza = obj.LUNGHEZZA || '';
          }
          let codiceSigla = obj.codice || '';
          if (sigla && sigla !== codiceSigla) codiceSigla += ` / ${sigla}`;
          return {
            id: obj.ID,
            tipo: obj.tipo,
            codice_sigla: codiceSigla,
            descrizione: obj.descrizione || '',
            lunghezza: lunghezza,
            totale: obj.quantita,
            impegnato: 0,
            giacenza: obj.quantita,
            destinatario: obj.destinatarioNome || (obj.destinazioneTipo === 'PROMOTER' ? `${obj.destinatario_nome||''} ${obj.destinatario_cognome||''}`.trim() : (obj.destinatario_nome||'Magazzino')),
            sigleDisponibili: obj.sigleDisponibili || [],
            siglaId: obj.siglaId || null,
            destinazioneTipo: obj.destinazioneTipo,
            destinazioneId: obj.destinazioneId
          };
        });
        sortOggetti();
        popolaTabella();
      } else throw new Error(res.message);
    } catch(err) {
      showMessage('Errore carico: ' + err.message, 'error');
      oggetti = [];
      popolaTabella();
    } finally {
      document.body.classList.remove('loading');
    }
  }

  // ========== OGGETTI DAL MAGAZZINO ==========
  async function caricaOggettiDaMagazzino() {
    const magId = magazzinoSelect.value;
    if (!magId) { oggetti = []; popolaTabella(); return; }
    const tipo = tipoOggettoMagazzino.value;
    const filtroLung = filtroLunghezza.value.trim();
    const filtroCat = filtroCategoria.value;
    let lista = [];
    document.body.classList.add('loading');
    try {
      if (tipo === 'TUTTI' || tipo === 'ARTICOLO') {
        const params = new URLSearchParams({ magazzino: magId, min_giacenza: '1' });
        if (filtroLung) params.append('lunghezza', filtroLung);
        if (filtroCat) params.append('categoria', filtroCat);
        const res = await apiFetch(`/api/articoli?${params}`);
        let articoli = res.success ? res.data : [];
        for (let a of articoli) {
          let sigle = [];
          try { sigle = await apiFetch(`/api/articoli/${a.id}/sigle`); } catch(e) {}
          const magObj = magazzini.find(m => m.id == a.magazzino);
          const magNome = magObj ? magObj.nome : 'Magazzino';
          let sigla = sigle.length ? sigle[0].sigla : '';
          let codiceSigla = a.codice_modello || a.codice;
          if (sigla && sigla !== codiceSigla) codiceSigla += ` / ${sigla}`;
          lista.push({
            id: a.id, tipo: 'ARTICOLO',
            codice_sigla: codiceSigla,
            descrizione: a.descrizione,
            lunghezza: a.lunghezza || '',
            totale: a.quantita_totale,
            impegnato: a.quantita_in_kit,
            giacenza: a.quantita_totale - a.quantita_in_kit,
            destinatario: magNome,
            sigleDisponibili: sigle
          });
        }
      }
      if (tipo === 'TUTTI' || tipo === 'KIT') {
        const res = await apiFetch('/api/kit');
        let kits = res.success ? res.data : (Array.isArray(res) ? res : []);
        if (magId) kits = kits.filter(k => k.magazzino == magId);
        for (let k of kits) {
          let sigla = '', lunghezza = '';
          if (k.dettagli) {
            const sci = k.dettagli.find(d => d.tipo_articolo === 'SCI');
            if (sci) {
              sigla = sci.sigla || '';
              lunghezza = sci.lunghezza || '';
              if (!lunghezza && sci.articolo_id) {
                const art = await apiFetch(`/api/articoli/${sci.articolo_id}`);
                lunghezza = art.lunghezza || '';
              }
            }
          }
          if (filtroLung && lunghezza != filtroLung) continue;
          let descr = k.descrizione;
          if (descr && descr.startsWith('Kit: ')) descr = descr.substring(5);
          const magObj = magazzini.find(m => m.id == k.magazzino);
          const magNome = magObj ? magObj.nome : 'Magazzino';
          let qAssegnata = k.assegnato_a ? k.assegnato_a.quantita : 0;
          let codiceSigla = k.codice_kit;
          if (sigla && sigla !== codiceSigla) codiceSigla += ` / ${sigla}`;
          lista.push({
            id: k.id, tipo: 'KIT',
            codice_sigla: codiceSigla,
            descrizione: descr,
            lunghezza: lunghezza,
            totale: k.quantita + qAssegnata,
            impegnato: qAssegnata,
            giacenza: k.quantita,
            destinatario: magNome,
            sigleDisponibili: []
          });
        }
      }
      oggetti = lista;
      sortOggetti();
      popolaTabella();
      const lunghezze = [...new Set(lista.map(o => o.lunghezza).filter(v => v))];
      lunghezzaList.innerHTML = '';
      lunghezze.forEach(l => { let opt = document.createElement('option'); opt.value = l; lunghezzaList.appendChild(opt); });
    } catch(err) {
      showMessage('Errore magazzino: ' + err.message, 'error');
      oggetti = [];
      popolaTabella();
    } finally {
      document.body.classList.remove('loading');
    }
  }

  // ========== POPOLA TABELLA (VELOCE) ==========
  function popolaTabella() {
    const tbody = document.getElementById('tabellaBody');
    if (!oggetti.length) {
      tbody.innerHTML = '<td colspan="8" class="text-center">Nessun oggetto disponibile<\/td>';
      return;
    }
    // Usa DocumentFragment per ridurre i reflow
    const fragment = document.createDocumentFragment();
    oggetti.forEach((obj, idx) => {
      const row = document.createElement('tr');
      row.insertCell(0).innerText = obj.codice_sigla || '-';
      row.insertCell(1).innerText = obj.descrizione || '-';
      row.insertCell(2).innerText = obj.lunghezza || '-';
      row.insertCell(3).innerText = obj.totale ?? '-';
      row.insertCell(4).innerText = obj.impegnato ?? '-';
      row.insertCell(5).innerText = obj.giacenza ?? '-';
      row.insertCell(6).innerText = obj.destinatario || 'Magazzino';
      const btn = document.createElement('button');
      btn.textContent = '✏️';
      btn.className = 'btn btn-secondary btn-sm';
      if (radioMagazzino.checked) btn.onclick = () => apriModalAssegnazione(obj);
      else btn.onclick = () => apriModificaSingola(obj);
      row.insertCell(7).appendChild(btn);
      fragment.appendChild(row);
    });
    tbody.innerHTML = '';
    tbody.appendChild(fragment);
    updateSortArrows();
  }

  // ========== CARICAMENTO ANAGRAFICHE ==========
  async function caricaMagazzini() {
    try {
      magazzini = await apiFetch('/api/anagrafiche/magazzini');
      magazzinoSelect.innerHTML = '<option value="">Seleziona magazzino</option>';
      magazzini.forEach(m => magazzinoSelect.appendChild(new Option(m.nome, m.id)));
      const defaultMag = magazzini.find(m => m.nome.toLowerCase() === 'race');
      if (defaultMag) magazzinoSelect.value = defaultMag.id;
    } catch(err) { showMessage('Errore magazzini', 'error'); }
  }

  async function caricaCategorie() {
    try {
      const res = await apiFetch('/api/anagrafiche/categorie');
      categorie = res || [];
      filtroCategoria.innerHTML = '<option value="">Tutte</option>';
      categorie.forEach(c => filtroCategoria.appendChild(new Option(c.nome, c.id)));
    } catch(err) { console.error(err); }
  }

  async function caricaSorgentiAdmin() {
    const tipo = sourceTipo.value;
    try {
      const data = await apiFetch(`/api/soggetti/tipo/${tipo}`);
      sourceId.innerHTML = '<option value="">Seleziona...</option>';
      data.forEach(item => {
        let testo = tipo === 'PROMOTER' ? `${item.nome} ${item.cognome || ''}`.trim() : item.nome;
        sourceId.appendChild(new Option(testo, item.id));
      });
      if (sourceId.options.length > 1 && !sourceId.value) sourceId.selectedIndex = 1;
      if (radioCarico.checked) await caricaOggettiInCarico();
    } catch(err) { showMessage('Errore sorgenti', 'error'); }
  }

  // ========== GESTIONE UI ==========
  function toggleSource() {
    const isMagazzino = radioMagazzino.checked;
    caricoSection.style.display = isMagazzino ? 'none' : 'flex';
    magazzinoSection.style.display = isMagazzino ? 'flex' : 'none';
    caricaOggetti();
  }

  async function caricaOggetti() {
    if (radioMagazzino.checked) {
      await caricaOggettiDaMagazzino();
    } else {
      await caricaOggettiInCarico();
    }
  }

  function applicaFiltriMagazzino() { if (radioMagazzino.checked) caricaOggettiDaMagazzino(); }
  function resetFiltriMagazzino() { filtroLunghezza.value = ''; filtroCategoria.value = ''; if (radioMagazzino.checked) caricaOggettiDaMagazzino(); }

  function logout() { localStorage.removeItem('token'); localStorage.removeItem('user'); window.location.href = 'Login.html'; }

  // ========== SETUP ==========
  function setup() {
    const isAdmin = currentUser.ruolo === 'admin';
    if (isAdmin) {
      sourceTipo.disabled = false;
      sourceId.disabled = false;
      caricaSorgentiAdmin();
      sourceTipo.addEventListener('change', () => caricaSorgentiAdmin());
      sourceId.addEventListener('change', () => { if (radioCarico.checked) caricaOggettiInCarico(); });
      includeReferenced.addEventListener('change', () => { if (radioCarico.checked) caricaOggettiInCarico(); });
    } else {
      sourceTipo.disabled = true;
      sourceId.disabled = true;
      includeReferenced.disabled = true;
      if (currentUser.riferimento_id) {
        sourceTipo.value = currentUser.ruolo.toUpperCase();
        sourceId.value = currentUser.riferimento_id;
        caricaSorgentiAdmin();
      } else {
        showMessage('Utente senza soggetto associato', 'error');
      }
    }
    radioCarico.addEventListener('change', toggleSource);
    radioMagazzino.addEventListener('change', toggleSource);
    magazzinoSelect.addEventListener('change', () => { if (radioMagazzino.checked) caricaOggettiDaMagazzino(); });
    tipoOggettoMagazzino.addEventListener('change', () => { if (radioMagazzino.checked) caricaOggettiDaMagazzino(); });
    toggleSource();
    changeDensity();
    attachSortHandlers();
  }

  async function apriModalAssegnazione(obj) { /* ... come prima ... */ }
  async function confermaAssegnazione() { /* ... */ }
  async function apriModificaSingola(obj) { /* ... */ }
  async function salvaModificaSingola() { /* ... */ }
  async function verificaSiglaAssegnata(oggettoId, tipoOggetto, siglaId, excludeSubjectTipo, excludeSubjectId) { return null; }
  function escapeHtml(str) { return str ? str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;') : ''; }

  window.onload = async () => {
    const token = localStorage.getItem('token');
    if (!token) { document.body.innerHTML = '<div class="container"><h2>Accesso negato</h2><a href="Login.html">Login</a></div>'; return; }
    try {
      currentUser = JSON.parse(localStorage.getItem('user'));
      if (!currentUser.riferimento_id && currentUser.RiferimentoID) currentUser.riferimento_id = parseInt(currentUser.RiferimentoID);
    } catch(e) { logout(); return; }
    document.getElementById('loginInfo').innerHTML = `👤 ${currentUser.nome_visualizzato || currentUser.username} (${currentUser.ruolo})`;
    await caricaMagazzini();
    await caricaCategorie();
    setup();
  };
</script>
