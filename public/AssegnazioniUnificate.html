<!DOCTYPE html>
<html lang="it">
<head>
  <link rel="icon" type="image/png" href="/images/kastle-logo.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>📦 Assegnazioni e Rientri</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f2f5;
      margin: 0;
      padding: 20px;
    }
    .container {
      max-width: 1400px;
      margin: 0 auto;
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      padding: 12px 20px 20px 20px;
    }
    /* Intestazione con titolo e pulsanti allineati */
    .header-main {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 10px;
      gap: 10px;
    }
    h2 {
      margin: 0;
      font-size: 1.6rem;
      border-left: 4px solid #1a73e8;
      padding-left: 10px;
      color: #1e2a3a;
    }
    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .density-selector {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.7rem;
    }
    .density-selector select {
      padding: 2px 5px;
      font-size: 0.7rem;
    }
    .btn {
      background: #1a73e8;
      color: white;
      border: none;
      padding: 4px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.7rem;
      font-weight: 500;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .btn:hover { background: #0f5bb5; transform: translateY(-1px); }
    .btn-success { background: #27ae60; }
    .btn-secondary { background: #6c757d; }
    .btn-sm { padding: 2px 6px; font-size: 0.65rem; }

    /* Barra superiore compatta (logo, menu, logout, ricarica) */
    .header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
      flex-wrap: wrap;
      gap: 6px;
    }
    .logo img { height: 30px; }
    .login-info {
      background: #e8f0fe;
      padding: 2px 8px;
      border-radius: 16px;
      font-size: 0.7rem;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .sep {
      margin: 6px 0 10px 0;
      border-top: 1px solid #e2e8f0;
    }

    /* Selezioni sorgente e filtri compatti e uniformi */
    .source-selector, .source-selection {
      background: #f8f9fa;
      border-radius: 10px;
      border: 1px solid #e2e8f0;
    }
    .source-selector {
      padding: 5px 12px;
      margin-bottom: 8px;
      display: flex;
      gap: 20px;
      align-items: center;
      flex-wrap: wrap;
    }
    .source-option {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.75rem;
    }
    .source-selection {
      padding: 5px 12px;
      margin-bottom: 8px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: flex-end;
    }
    .form-group {
      margin-bottom: 0;
      flex: 1;
      min-width: 120px;
    }
    .form-group label {
      display: block;
      font-weight: 600;
      font-size: 0.6rem;
      margin-bottom: 2px;
      color: #2c3e50;
      text-transform: uppercase;
    }
    .form-group input, .form-group select {
      width: 100%;
      padding: 4px 6px;
      border: 1px solid #cbd5e0;
      border-radius: 6px;
      font-size: 0.7rem;
    }

    /* Tabella con intestazione fissa */
    .table-wrapper {
      overflow-x: auto;
      overflow-y: auto;
      max-height: 70vh;
      border-radius: 12px;
      border: 1px solid #e2e8f0;
      background: white;
      position: relative;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.75rem;
      white-space: nowrap;
    }
    th, td {
      border-bottom: 1px solid #e2e8f0;
      padding: 6px 8px;
      text-align: left;
      vertical-align: middle;
    }
    th {
      background: #f8fafc;
      font-weight: 600;
      position: sticky;
      top: 0;
      z-index: 10;
      cursor: pointer;
      user-select: none;
    }
    th:hover { background: #e2e8f0; }
    th .sort-arrow {
      display: inline-block;
      margin-left: 6px;
      font-size: 0.7rem;
    }
    tr:hover td { background: #fefce8; }

    /* Densità righe */
    .density-small th, .density-small td { padding: 2px 5px; font-size: 0.65rem; }
    .density-medium th, .density-medium td { padding: 5px 7px; font-size: 0.75rem; }
    .density-large th, .density-large td { padding: 8px 10px; font-size: 0.85rem; }

    /* Stampa - rimuove intestazioni e piè di pagina del browser */
    @media print {
      @page {
        margin: 0.5cm;
        size: auto;
      }
      body { background: white; padding: 0; margin: 0; }
      .container { max-width: 100%; padding: 0; margin: 0; box-shadow: none; }
      .no-print { display: none !important; }
      /* Nasconde l'info utente (login) */
      .login-info { display: none !important; }
      /* Nasconde i pulsanti menu, logout, ricarica */
      .header-bar .btn-secondary { display: none !important; }
      /* Mostra solo logo e titolo */
      .header-bar .logo { display: block !important; }
      .header-bar { justify-content: center; }
      .table-wrapper { overflow: visible; max-height: none; }
      table { page-break-inside: avoid; width: 100%; }
      th, td { border: 1px solid #ccc; }
      th { position: static; }
      /* Logo più piccolo e titolo più grande in stampa */
      .logo img { height: 20px !important; }
      h2 { font-size: 1.8rem !important; }
      /* Footer personalizzato in basso a destra */
      .print-footer-right {
        display: block !important;
        position: fixed;
        bottom: 5px;
        right: 5px;
        font-size: 8px;
        color: #666;
        text-align: right;
      }
      /* Rimuove eventuali header/footer generati dal browser */
      header, footer { display: none !important; }
    }
    .print-footer-right { display: none; }

    /* Messaggi */
    .message {
      padding: 4px 8px;
      border-radius: 6px;
      margin-bottom: 8px;
      font-size: 0.7rem;
    }
    .success { background: #d4edda; color: #155724; border-left: 3px solid #38a169; }
    .error { background: #f8d7da; color: #721c24; border-left: 3px solid #e53e3e; }
    .info { background: #e8f0fe; color: #1a73e8; border-left: 3px solid #1a73e8; }
    .text-center { text-align: center; }

    /* Modali */
    .modal {
      display: none;
      position: fixed;
      top:0; left:0;
      width:100%; height:100%;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .modal-content {
      background: white;
      border-radius: 16px;
      width: 90%;
      max-width: 500px;
      max-height: 85vh;
      overflow-y: auto;
      padding: 0;
    }
    .modal-header {
      padding: 10px 15px;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .modal-header h3 { margin: 0; font-size: 1.1rem; }
    .close {
      font-size: 1.3rem;
      font-weight: bold;
      cursor: pointer;
      color: #aaa;
    }
    .close:hover { color: black; }
    .modal-body { padding: 12px 15px; }
    .modal-footer {
      padding: 10px 15px;
      border-top: 1px solid #e2e8f0;
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      background: #f8fafc;
    }
    .form-group { margin-bottom: 10px; }
    .form-control {
      width: 100%;
      padding: 5px 8px;
      border: 1px solid #cbd5e0;
      border-radius: 8px;
      font-size: 0.75rem;
    }
    .warning-badge {
      background: #fef3c7;
      color: #92400e;
      padding: 4px 8px;
      border-radius: 8px;
      font-size: 0.65rem;
      margin-top: 4px;
    }

    /* Mobile ottimizzazione */
    @media (max-width: 768px) {
      body { padding: 8px; }
      .container { padding: 8px 12px; }
      .source-selector, .source-selection { flex-direction: column; align-items: stretch; }
      .source-selection { gap: 8px; }
      .form-group { min-width: auto; }
      .header-main { flex-direction: column; align-items: stretch; }
      .toolbar { justify-content: flex-start; }
      .density-medium th, .density-medium td { padding: 4px 6px; font-size: 0.65rem; }
      .table-wrapper { max-height: 60vh; }
    }
  </style>
</head>
<body>
<div class="container">
  <!-- Barra superiore (logo, menu, logout, ricarica) -->
  <div class="header-bar">
    <div class="logo"><img src="/images/kastle-logo.png" alt="Kastle"></div>
    <div style="display: flex; gap: 6px; align-items: center;">
      <span id="loginInfo" class="login-info"></span>
      <button class="btn btn-secondary no-print" onclick="window.location.href='MenuPrincipale.html'">🏠 Menu</button>
      <button class="btn btn-secondary no-print" onclick="logout()">🚪 Logout</button>
      <button class="btn btn-secondary no-print" onclick="caricaOggetti()">🔄 Ricarica</button>
    </div>
  </div>
  <div class="sep"></div>

  <!-- Intestazione principale: titolo a sinistra, toolbar a destra -->
  <div class="header-main">
    <h2>📦 Assegnazioni e Rientri</h2>
    <div class="toolbar no-print">
      <div class="density-selector">
        <span>📏 Densità:</span>
        <select id="densitySelect" onchange="changeDensity()">
          <option value="small">Piccola</option>
          <option value="medium" selected>Media</option>
          <option value="large">Grande</option>
        </select>
      </div>
      <button class="btn btn-secondary" onclick="stampaTabella()">🖨️ Stampa</button>
      <button class="btn btn-success" onclick="esportaExcel()">📎 Esporta Excel</button>
    </div>
  </div>

  <div id="messageArea"></div>

  <!-- Scelta sorgente -->
  <div class="source-selector no-print">
    <div class="source-option">
      <input type="radio" name="source" id="sourceCarico" value="carico" checked>
      <label for="sourceCarico">📦 In carico (da soggetto)</label>
    </div>
    <div class="source-option">
      <input type="radio" name="source" id="sourceMagazzino" value="magazzino">
      <label for="sourceMagazzino">🏭 Dal magazzino</label>
    </div>
  </div>

  <!-- Sezione "In carico" -->
  <div id="caricoSection" class="source-selection no-print">
    <div class="form-group">
      <label>Sorgente (soggetto)</label>
      <select id="sourceTipo">
        <option value="PROMOTER">👤 Promoter</option>
        <option value="NEGOZIO">🏪 Negozio</option>
        <option value="CLIENTE">👥 Cliente</option>
        <option value="AGENTE">🤝 Agente</option>
      </select>
    </div>
    <div class="form-group">
      <label>Seleziona soggetto</label>
      <select id="sourceId"><option value="">Seleziona...</option></select>
    </div>
    <div class="form-group">
      <label><input type="checkbox" id="includeReferenced"> Includi referenti</label>
    </div>
  </div>

  <!-- Sezione "Dal magazzino" -->
  <div id="magazzinoSection" style="display: none;" class="no-print">
    <div class="source-selection">
      <div class="form-group">
        <label>Magazzino</label>
        <select id="magazzinoSelect"></select>
      </div>
      <div class="form-group">
        <label>Tipo oggetto</label>
        <select id="tipoOggettoMagazzino">
          <option value="TUTTI">Tutti</option>
          <option value="ARTICOLO">Articoli</option>
          <option value="KIT">Kit</option>
        </select>
      </div>
    </div>
    <div class="source-selection">
      <div class="form-group">
        <label>Lunghezza</label>
        <input type="text" id="filtroLunghezza" list="lunghezzaList" placeholder="Esatta">
        <datalist id="lunghezzaList"></datalist>
      </div>
      <div class="form-group">
        <label>Categoria</label>
        <select id="filtroCategoria">
          <option value="">Tutte</option>
        </select>
      </div>
      <div style="display: flex; gap: 8px; align-items: flex-end;">
        <button class="btn" onclick="applicaFiltriMagazzino()">🔍 Filtra</button>
        <button class="btn btn-secondary" onclick="resetFiltriMagazzino()">🔄 Reset</button>
      </div>
    </div>
  </div>

  <!-- Tabella -->
  <div class="table-wrapper" id="tableWrapper">
    <table id="tabellaOggetti">
      <thead>
         <th data-sort="codice">Codice <span class="sort-arrow"></span></th>
         <th data-sort="descrizione">Descrizione <span class="sort-arrow"></span></th>
         <th data-sort="lunghezza">Lunghezza <span class="sort-arrow"></span></th>
         <th data-sort="sigla">Sigla <span class="sort-arrow"></span></th>
         <th data-sort="totale">Qtà totale <span class="sort-arrow"></span></th>
         <th data-sort="impegnato">Qtà impegnata <span class="sort-arrow"></span></th>
         <th data-sort="giacenza">Giacenza <span class="sort-arrow"></span></th>
         <th data-sort="destinatario">Assegnato a <span class="sort-arrow"></span></th>
         <th>Azioni</th>
      </thead>
      <tbody id="tabellaBody"><td colspan="9" class="text-center">Caricamento...<\/td></tbody>
    </table>
  </div>

  <!-- Footer per stampa (solo visibile in stampa) -->
  <div class="print-footer-right">
    <span id="printDate"></span><br>
    <span id="printUser"></span>
  </div>
</div>

<!-- MODALE ASSEGNAZIONE (dal magazzino) -->
<div id="assignModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3>📤 Assegna a soggetto</h3>
      <span class="close" onclick="chiudiAssignModal()">&times;</span>
    </div>
    <div class="modal-body" id="assignModalContent"></div>
    <div class="modal-footer">
      <button class="btn btn-success" id="assignConfirmBtn">Assegna</button>
      <button class="btn btn-secondary" onclick="chiudiAssignModal()">Annulla</button>
    </div>
  </div>
</div>

<!-- MODALE MODIFICA SINGOLA (per oggetti in carico) -->
<div id="editAssignmentModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3>✏️ Modifica Assegnazione</h3>
      <span class="close" onclick="chiudiEditModal()">&times;</span>
    </div>
    <div class="modal-body" id="editAssignmentContent"></div>
    <div class="modal-footer">
      <button class="btn btn-success" id="saveEditBtn">💾 Salva modifiche</button>
      <button class="btn btn-secondary" onclick="chiudiEditModal()">Annulla</button>
    </div>
  </div>
</div>

<!-- MODALE CONFERMA RIASSEGNAZIONE -->
<div id="confirmRiassegnaModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3>⚠️ Conferma riassegnazione</h3>
      <span class="close" onclick="chiudiConfirmModal()">&times;</span>
    </div>
    <div class="modal-body">
      <p id="confirmMsg"></p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-warning" id="confirmOkBtn">Sì, trasferisci</button>
      <button class="btn btn-secondary" onclick="chiudiConfirmModal()">Annulla</button>
    </div>
  </div>
</div>

<div id="errorModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3>⚠️ Errore</h3>
      <span class="close" onclick="chiudiErrorModal()">&times;</span>
    </div>
    <div class="modal-body">
      <p id="errorMsg"></p>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="chiudiErrorModal()">Chiudi</button>
    </div>
  </div>
</div>

<script>
  // ========== UTILITY ==========
  function getAuthHeader() {
    const token = localStorage.getItem('token');
    if (!token) { window.location.href = 'Login.html'; return {}; }
    return { 'Authorization': 'Bearer ' + token };
  }
  async function apiFetch(endpoint, options = {}) {
    const headers = { 'Content-Type': 'application/json', ...getAuthHeader(), ...options.headers };
    const response = await fetch(endpoint, { ...options, headers });
    if (response.status === 401 || response.status === 403) {
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      window.location.href = 'Login.html';
      throw new Error('Sessione scaduta');
    }
    if (!response.ok) {
      let errorMsg = `Errore ${response.status}`;
      try { const err = await response.json(); errorMsg = err.message || errorMsg; } catch(e) {}
      throw new Error(errorMsg);
    }
    return response.json();
  }
  function showMessage(msg, type) {
    const div = document.getElementById('messageArea');
    div.innerHTML = `<div class="message ${type}">${msg}</div>`;
    setTimeout(() => div.innerHTML = '', 5000);
  }
  function showErrorModal(msg) {
    document.getElementById('errorMsg').innerHTML = msg;
    document.getElementById('errorModal').style.display = 'flex';
  }
  function chiudiErrorModal() { document.getElementById('errorModal').style.display = 'none'; }
  function chiudiAssignModal() { document.getElementById('assignModal').style.display = 'none'; currentAssignObj = null; }
  function chiudiEditModal() { document.getElementById('editAssignmentModal').style.display = 'none'; currentEditObj = null; }
  function chiudiConfirmModal() { document.getElementById('confirmRiassegnaModal').style.display = 'none'; pendingAction = null; }

  let currentUser = null;
  let magazzini = [], categorie = [];
  let oggetti = [];
  let currentEditObj = null, pendingAction = null, currentAssignObj = null;

  // Variabili per ordinamento
  let sortColumn = 'codice';
  let sortAsc = true;

  const radioCarico = document.getElementById('sourceCarico');
  const radioMagazzino = document.getElementById('sourceMagazzino');
  const caricoSection = document.getElementById('caricoSection');
  const magazzinoSection = document.getElementById('magazzinoSection');
  const sourceTipo = document.getElementById('sourceTipo');
  const sourceId = document.getElementById('sourceId');
  const includeReferenced = document.getElementById('includeReferenced');
  const magazzinoSelect = document.getElementById('magazzinoSelect');
  const tipoOggettoMagazzino = document.getElementById('tipoOggettoMagazzino');
  const filtroLunghezza = document.getElementById('filtroLunghezza');
  const filtroCategoria = document.getElementById('filtroCategoria');
  const lunghezzaList = document.getElementById('lunghezzaList');

  // ========== SORTING ==========
  function sortOggetti() {
    oggetti.sort((a, b) => {
      let valA = a[sortColumn];
      let valB = b[sortColumn];
      if (sortColumn === 'totale' || sortColumn === 'impegnato' || sortColumn === 'giacenza') {
        valA = parseFloat(valA) || 0;
        valB = parseFloat(valB) || 0;
      } else if (sortColumn === 'lunghezza') {
        valA = parseFloat(valA) || 0;
        valB = parseFloat(valB) || 0;
      } else {
        valA = (valA || '').toString().toLowerCase();
        valB = (valB || '').toString().toLowerCase();
      }
      if (valA < valB) return sortAsc ? -1 : 1;
      if (valA > valB) return sortAsc ? 1 : -1;
      return 0;
    });
  }

  function updateSortArrows() {
    document.querySelectorAll('#tabellaOggetti th[data-sort]').forEach(th => {
      const col = th.getAttribute('data-sort');
      const arrowSpan = th.querySelector('.sort-arrow');
      if (col === sortColumn) {
        arrowSpan.innerHTML = sortAsc ? ' ↑' : ' ↓';
      } else {
        arrowSpan.innerHTML = '';
      }
    });
  }

  function attachSortHandlers() {
    document.querySelectorAll('#tabellaOggetti th[data-sort]').forEach(th => {
      th.addEventListener('click', () => {
        const col = th.getAttribute('data-sort');
        if (col === sortColumn) {
          sortAsc = !sortAsc;
        } else {
          sortColumn = col;
          sortAsc = true;
        }
        sortOggetti();
        popolaTabella();
        updateSortArrows();
      });
    });
  }

  // ========== DENSITÀ, STAMPA, EXPORT ==========
  function changeDensity() {
    const val = document.getElementById('densitySelect').value;
    const wrapper = document.getElementById('tableWrapper');
    wrapper.classList.remove('density-small', 'density-medium', 'density-large');
    wrapper.classList.add(`density-${val}`);
  }
  function stampaTabella() {
    // Imposta data e utente nel footer di stampa
    const now = new Date().toLocaleString();
    document.getElementById('printDate').innerText = now;
    const userDisplay = currentUser?.nome_visualizzato || currentUser?.username || '';
    document.getElementById('printUser').innerText = userDisplay ? `Utente: ${userDisplay}` : '';
    window.print();
  }
  function esportaExcel() {
    const table = document.getElementById('tabellaOggetti');
    const rows = table.querySelectorAll('tr');
    let csv = [];
    for (let row of rows) {
      let rowData = [];
      let cells = row.querySelectorAll('th, td');
      for (let cell of cells) {
        let text = cell.innerText.trim();
        if (text === '✏️') text = '';
        if (cell.tagName === 'TH') text = text.replace(/[↑↓]/g, '').trim();
        rowData.push(text);
      }
      csv.push(rowData.join(','));
    }
    const blob = new Blob(["\uFEFF" + csv.join('\n')], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    const url = URL.createObjectURL(blob);
    link.href = url;
    link.setAttribute('download', 'assegnazioni.csv');
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(url);
  }

  // ========== CARICAMENTO ANAGRAFICHE ==========
  async function caricaMagazzini() {
    try {
      magazzini = await apiFetch('/api/anagrafiche/magazzini');
      magazzinoSelect.innerHTML = '<option value="">Seleziona magazzino</option>';
      magazzini.forEach(m => magazzinoSelect.appendChild(new Option(m.nome, m.id)));
      const defaultMag = magazzini.find(m => m.nome.toLowerCase() === 'race');
      if (defaultMag) magazzinoSelect.value = defaultMag.id;
    } catch(err) { showMessage('Errore magazzini', 'error'); }
  }
  async function caricaCategorie() {
    try {
      const res = await apiFetch('/api/anagrafiche/categorie');
      categorie = res || [];
      filtroCategoria.innerHTML = '<option value="">Tutte</option>';
      categorie.forEach(c => filtroCategoria.appendChild(new Option(c.nome, c.id)));
    } catch(err) { console.error(err); }
  }
  async function caricaSorgentiAdmin() {
    const tipo = sourceTipo.value;
    try {
      const data = await apiFetch(`/api/soggetti/tipo/${tipo}`);
      sourceId.innerHTML = '<option value="">Seleziona...</option>';
      data.forEach(item => {
        let testo = tipo === 'PROMOTER' ? `${item.nome} ${item.cognome || ''}`.trim() : item.nome;
        sourceId.appendChild(new Option(testo, item.id));
      });
      if (sourceId.options.length > 1 && !sourceId.value) sourceId.selectedIndex = 1;
      if (radioCarico.checked) await caricaOggettiInCarico();
    } catch(err) { showMessage('Errore sorgenti', 'error'); }
  }

  // ========== OGGETTI DAL MAGAZZINO ==========
  async function caricaOggettiDaMagazzino() {
    const magId = magazzinoSelect.value;
    if (!magId) { oggetti = []; popolaTabella(); return; }
    const tipo = tipoOggettoMagazzino.value;
    const filtroLung = filtroLunghezza.value.trim();
    const filtroCat = filtroCategoria.value;
    let lista = [];
    try {
      if (tipo === 'TUTTI' || tipo === 'ARTICOLO') {
        const params = new URLSearchParams({ magazzino: magId, min_giacenza: '1' });
        if (filtroLung) params.append('lunghezza', filtroLung);
        if (filtroCat) params.append('categoria', filtroCat);
        const res = await apiFetch(`/api/articoli?${params}`);
        let articoli = res.success ? res.data : [];
        for (let a of articoli) {
          let sigle = [];
          try { sigle = await apiFetch(`/api/articoli/${a.id}/sigle`); } catch(e) {}
          lista.push({
            id: a.id, tipo: 'ARTICOLO',
            codice: a.codice_modello || a.codice,
            descrizione: a.descrizione,
            lunghezza: a.lunghezza || '',
            sigla: sigle.length ? sigle[0].sigla : null,
            totale: a.quantita_totale,
            impegnato: a.quantita_in_kit,
            giacenza: a.quantita_totale - a.quantita_in_kit,
            destinatarioNome: 'Magazzino',
            sigleDisponibili: sigle
          });
        }
      }
      if (tipo === 'TUTTI' || tipo === 'KIT') {
        const res = await apiFetch('/api/kit');
        let kits = (res.success ? res.data : (Array.isArray(res) ? res : [])).filter(k => k.magazzino == magId);
        for (let k of kits) {
          let siglaSci = null, lunghezzaSci = null, catSci = null, sigleDisp = [];
          if (k.dettagli) {
            const sci = k.dettagli.find(d => d.tipo_articolo === 'SCI');
            if (sci && sci.articolo_id) {
              try {
                const sciArt = await apiFetch(`/api/articoli/${sci.articolo_id}`);
                lunghezzaSci = sciArt.lunghezza;
                catSci = sciArt.categoria;
                const sigle = await apiFetch(`/api/articoli/${sci.articolo_id}/sigle`);
                sigleDisp = sigle;
                if (sci.sigla_id) {
                  const found = sigle.find(s => s.id == sci.sigla_id);
                  if (found) siglaSci = found.sigla;
                }
              } catch(e) {}
            }
          }
          if (filtroLung && lunghezzaSci != filtroLung) continue;
          if (filtroCat && catSci != filtroCat) continue;
          let qAssegnata = k.assegnato_a ? k.assegnato_a.quantita : 0;
          let descr = k.descrizione;
          if (descr && descr.startsWith('Kit: ')) descr = descr.substring(5);
          lista.push({
            id: k.id, tipo: 'KIT',
            codice: k.codice_kit,
            descrizione: descr,
            lunghezza: lunghezzaSci || '',
            sigla: siglaSci,
            totale: k.quantita + qAssegnata,
            impegnato: qAssegnata,
            giacenza: k.quantita,
            destinatarioNome: 'Magazzino',
            sigleDisponibili: sigleDisp
          });
        }
      }
      oggetti = lista;
      sortOggetti();
      popolaTabella();
      const lunghezze = [...new Set(lista.map(o => o.lunghezza).filter(v => v))];
      lunghezzaList.innerHTML = '';
      lunghezze.forEach(l => { let opt = document.createElement('option'); opt.value = l; lunghezzaList.appendChild(opt); });
    } catch(err) { showMessage('Errore magazzino: ' + err.message, 'error'); }
  }

  // ========== OGGETTI IN CARICO ==========
  async function caricaOggettiInCarico() {
    const body = {};
    if (currentUser.ruolo === 'admin' && sourceId.value) {
      body.targetTipo = sourceTipo.value;
      body.targetId = parseInt(sourceId.value);
      body.includeReferenced = includeReferenced.checked;
    } else if (currentUser.ruolo !== 'admin') {
      if (!currentUser.riferimento_id) { oggetti = []; popolaTabella(); return; }
      body.targetTipo = currentUser.ruolo.toUpperCase();
      body.targetId = currentUser.riferimento_id;
      body.includeReferenced = includeReferenced.checked;
    } else { oggetti = []; popolaTabella(); return; }
    if (!body.targetTipo || !body.targetId) { oggetti = []; popolaTabella(); return; }
    try {
      const res = await apiFetch('/api/assegnazioni/oggetti', { method: 'POST', body: JSON.stringify(body) });
      if (res.success) {
        let tutti = res.oggetti || [];
        for (let obj of tutti) {
          if (obj.tipo === 'KIT') {
            obj.sigleDisponibili = await getSiglePerOggetto({ tipo: 'KIT', id: obj.ID });
            if (!obj.siglaId) {
              try {
                const kitDetail = await apiFetch(`/api/kit/${obj.ID}`);
                const sciRow = kitDetail.dettagli?.find(d => d.tipo_articolo === 'SCI');
                if (sciRow && sciRow.sigla_id) obj.siglaId = sciRow.sigla_id;
              } catch(e) {}
            }
          } else {
            obj.sigleDisponibili = await getSiglePerOggetto({ tipo: 'ARTICOLO', id: obj.ID });
            if (!obj.siglaId && obj.SIGLA_CORRENTE) {
              const found = obj.sigleDisponibili.find(s => s.sigla === obj.SIGLA_CORRENTE);
              if (found) obj.siglaId = found.id;
            }
          }
        }
        oggetti = tutti.map(obj => {
          let siglaCorrente = null;
          if (obj.siglaId && obj.sigleDisponibili) {
            const found = obj.sigleDisponibili.find(s => s.id == obj.siglaId);
            if (found) siglaCorrente = found.sigla;
          } else if (obj.SIGLA_CORRENTE) siglaCorrente = obj.SIGLA_CORRENTE;
          let descr = obj.descrizione || '';
          if (obj.tipo === 'KIT' && descr.startsWith('Kit: ')) descr = descr.substring(5);
          return {
            id: obj.ID,
            tipo: obj.tipo,
            codice: obj.tipo === 'ARTICOLO' ? (obj.codice_modello || obj.codice) : obj.codice,
            descrizione: descr,
            lunghezza: obj.LUNGHEZZA || '',
            sigla: siglaCorrente,
            totale: obj.quantita,
            impegnato: 0,
            giacenza: obj.quantita,
            destinatarioNome: obj.destinatarioNome || (obj.destinazioneTipo === 'PROMOTER' ? `${obj.destinatario_nome||''} ${obj.destinatario_cognome||''}`.trim() : (obj.destinatario_nome||'Magazzino')),
            sigleDisponibili: obj.sigleDisponibili || [],
            siglaId: obj.siglaId || null,
            destinazioneTipo: obj.destinazioneTipo,
            destinazioneId: obj.destinazioneId
          };
        });
        sortOggetti();
        popolaTabella();
      } else throw new Error(res.message);
    } catch(err) { showMessage('Errore carico: ' + err.message, 'error'); }
  }

  async function getSiglePerOggetto(obj) {
    if (obj.tipo === 'ARTICOLO') {
      try { return await apiFetch(`/api/articoli/${obj.id}/sigle`); } catch(e) { return []; }
    } else {
      try {
        const kit = await apiFetch(`/api/kit/${obj.id}`);
        const sci = kit.dettagli?.find(d => d.tipo_articolo === 'SCI');
        if (sci && sci.sigla_id) return await apiFetch(`/api/articoli/${sci.articolo_id}/sigle`);
        return [];
      } catch(e) { return []; }
    }
  }

  function popolaTabella() {
    const tbody = document.getElementById('tabellaBody');
    if (!oggetti.length) { tbody.innerHTML = '<td colspan="9">Nessun oggetto<\/td>'; return; }
    tbody.innerHTML = '';
    oggetti.forEach((obj, idx) => {
      const row = tbody.insertRow();
      row.insertCell(0).innerText = obj.codice || '-';
      row.insertCell(1).innerText = obj.descrizione || '-';
      row.insertCell(2).innerText = obj.lunghezza || '-';
      row.insertCell(3).innerText = obj.sigla || '-';
      row.insertCell(4).innerText = obj.totale ?? '-';
      row.insertCell(5).innerText = obj.impegnato ?? '-';
      row.insertCell(6).innerText = obj.giacenza ?? '-';
      row.insertCell(7).innerText = obj.destinatarioNome || 'Magazzino';
      const btn = document.createElement('button');
      btn.textContent = '✏️';
      btn.className = 'btn btn-secondary btn-sm';
      if (radioMagazzino.checked) btn.onclick = () => apriModalAssegnazione(obj);
      else btn.onclick = () => apriModificaSingola(obj);
      row.insertCell(8).appendChild(btn);
    });
  }

      <div class="form-group"><label>📊 Giacenza disponibile</label><input type="number" value="${obj.giacenza}" disabled class="form-control"></div>

      try {
        const data = await apiFetch(`/api/soggetti/tipo/${tipo}`);
        destIdSelect.innerHTML = '<option value="">Seleziona...</option>';
        data.forEach(item => {
          let testo = tipo === 'PROMOTER' ? `${item.nome} ${item.cognome || ''}`.trim() : item.nome;
          destIdSelect.appendChild(new Option(testo, item.id));
        });
      } catch(err) { showMessage('Errore destinazioni', 'error'); }
    };
    destTipoSelect.addEventListener('change', caricaDestinazioni);
    await caricaDestinazioni();
    document.getElementById('assignModal').style.display = 'flex';
    document.getElementById('assignConfirmBtn').onclick = () => confermaAssegnazione();

  async function confermaAssegnazione() {
    const obj = currentAssignObj;
    if (!obj) return;
    const qta = parseInt(document.getElementById('assignQta').value);
    const siglaId = document.getElementById('assignSiglaId').value;
    const destTipo = document.getElementById('assignDestTipo').value;
    const destId = document.getElementById('assignDestId').value;
    const note = document.getElementById('assignNote').value;
    if (isNaN(qta) || qta < 1 || qta > obj.giacenza) { showErrorModal('Quantità non valida'); return; }
    if (!destTipo || !destId) { showErrorModal('Seleziona una destinazione'); return; }
    const magazzinoId = magazzinoSelect.value;
    if (!magazzinoId) { showErrorModal('Seleziona un magazzino di partenza'); return; }
    const payload = {
      magazzinoId: parseInt(magazzinoId),
      destinazioneTipo: destTipo,
      destinazioneId: parseInt(destId),
      note: note,
      oggetti: [{
        tipoOggetto: obj.tipo,
        oggettoId: obj.id,
        siglaId: siglaId ? parseInt(siglaId) : null,
        quantita: qta
      }]
    };
    try {
      const res = await apiFetch('/api/assegnazioni/uscita/batch', { method: 'POST', body: JSON.stringify(payload) });
      if (res.success) {
        showMessage('Assegnazione effettuata', 'success');
        chiudiAssignModal();
        await caricaOggettiDaMagazzino();
      } else showErrorModal(res.message);
    } catch(err) { showErrorModal(err.message); }
  }

  // ========== MODIFICA SINGOLA (oggetti in carico) ==========
  async function apriModificaSingola(obj) {
    if (!obj.sigleDisponibili || obj.sigleDisponibili.length === 0) {
      obj.sigleDisponibili = await getSiglePerOggetto({ tipo: obj.tipo, id: obj.id });
    }
    currentEditObj = { ...obj, selectedSiglaId: obj.siglaId || null };
    const modalBody = document.getElementById('editAssignmentContent');
    let siglaOptions = '<option value="">Nessuna sigla</option>';
    let hasOnlyOne = false;
    if (obj.sigleDisponibili && obj.sigleDisponibili.length) {
      if (obj.sigleDisponibili.length === 1) hasOnlyOne = true;
      for (const s of obj.sigleDisponibili) {
        let optionText = s.sigla;
        if (s.durezza) optionText += ` (${s.durezza})`;
        if (s.lunghezza) optionText += ` - ${s.lunghezza}cm`;
        let assegnatoA = null;
        if (obj.destinatarioNome !== 'Magazzino' && s.id) {
          assegnatoA = await verificaSiglaAssegnata(obj.id, obj.tipo, s.id, obj.destinazioneTipo, obj.destinazioneId);
        }
        if (assegnatoA) optionText += ` ⚠️ (già assegnata a ${assegnatoA.nome})`;
        const selectedAttr = (currentEditObj.selectedSiglaId == s.id) ? 'selected' : '';
        siglaOptions += `<option value="${s.id}" data-assigned-to='${JSON.stringify(assegnatoA)}' ${selectedAttr}>${optionText}</option>`;
      }
    } else {
      siglaOptions = '<option value="">Nessuna sigla disponibile</option>';
    }
    modalBody.innerHTML = `
      <div class="form-group"><label>📦 Oggetto</label><input type="text" value="${escapeHtml(obj.codice)} - ${escapeHtml(obj.descrizione)}" disabled class="form-control"></div>
      <div class="form-group"><label>📊 Quantità disponibile</label><input type="number" value="${obj.giacenza}" disabled class="form-control"></div>
      <div class="form-group"><label>🔢 Quantità da trasferire/rientrare</label><input type="number" id="editQta" min="1" max="${obj.giacenza}" value="1" class="form-control"></div>
      <div class="form-group"><label>🏷️ Sigla</label><select id="editSiglaId" class="form-control" ${hasOnlyOne ? 'disabled' : ''}>${siglaOptions}</select><div id="siglaWarning" class="warning-badge" style="display: none;"></div></div>
      <div class="form-group"><label>🎯 Nuova destinazione</label><select id="editDestTipo" class="form-control"><option value="MAGAZZINO">🏭 Magazzino</option><option value="PROMOTER">Promoter</option><option value="NEGOZIO">Negozio</option><option value="CLIENTE">Cliente</option><option value="AGENTE">Agente</option></select><div id="destinazioneContainer" style="margin-top:8px;"></div></div>
      <div class="form-group"><label>📝 Note</label><input type="text" id="editNote" class="form-control"></div>
    `;
    const destTipoSelect = document.getElementById('editDestTipo');
    const destinazioneContainer = document.getElementById('destinazioneContainer');
    const aggiornaCampoDestinazione = async () => {
      const tipo = destTipoSelect.value;
      destinazioneContainer.innerHTML = '';
      if (tipo === 'MAGAZZINO') {
        const selectMagazzino = document.createElement('select');
        selectMagazzino.id = 'editDestId';
        selectMagazzino.className = 'form-control';
        selectMagazzino.innerHTML = '<option value="">Seleziona magazzino</option>';
        magazzini.forEach(m => selectMagazzino.appendChild(new Option(m.nome, m.id)));
        destinazioneContainer.appendChild(selectMagazzino);
      } else if (tipo && tipo !== 'MAGAZZINO') {
        try {
          const data = await apiFetch(`/api/soggetti/tipo/${tipo}`);
          const selectSoggetto = document.createElement('select');
          selectSoggetto.id = 'editDestId';
          selectSoggetto.className = 'form-control';
          selectSoggetto.innerHTML = '<option value="">Seleziona...</option>';
          data.forEach(item => {
            let testo = tipo === 'PROMOTER' ? `${item.nome} ${item.cognome || ''}`.trim() : item.nome;
            selectSoggetto.appendChild(new Option(testo, item.id));
          });
          destinazioneContainer.appendChild(selectSoggetto);
        } catch(err) { showMessage('Errore caricamento destinazioni', 'error'); }
      }
    };
    destTipoSelect.addEventListener('change', aggiornaCampoDestinazione);
    await aggiornaCampoDestinazione();
    const siglaSelect = document.getElementById('editSiglaId');
    const warningDiv = document.getElementById('siglaWarning');
    siglaSelect.addEventListener('change', async () => {
      const selectedOpt = siglaSelect.options[siglaSelect.selectedIndex];
      const assignedData = selectedOpt.getAttribute('data-assigned-to');
      if (assignedData && assignedData !== 'null' && obj.destinatarioNome !== 'Magazzino') {
        const assigned = JSON.parse(assignedData);
        warningDiv.style.display = 'flex';
        warningDiv.innerHTML = `⚠️ Questa sigla è già assegnata a <strong>${assigned.nome}</strong>. Se procedi, verrà trasferita da ${assigned.nome} al nuovo destinatario.`;
      } else {
        warningDiv.style.display = 'none';
      }
    });
    document.getElementById('editAssignmentModal').style.display = 'flex';
    document.getElementById('saveEditBtn').onclick = () => salvaModificaSingola();
  }
  function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }
  async function verificaSiglaAssegnata(oggettoId, tipoOggetto, siglaId, excludeSubjectTipo = null, excludeSubjectId = null) {
    if (!siglaId) return null;
    try {
      const params = new URLSearchParams({ tipo_oggetto: tipoOggetto, oggetto_id: oggettoId, sigla_id: siglaId });
      if (excludeSubjectTipo && excludeSubjectId) { params.append('escludi_tipo', excludeSubjectTipo); params.append('escludi_id', excludeSubjectId); }
      const res = await apiFetch(`/api/assegnazioni/verifica-sigla?${params}`);
      return res.success ? res.assegnato_a : null;
    } catch(e) { return null; }
  }
  async function salvaModificaSingola() {
    const obj = currentEditObj;
    if (!obj) return;
    const qta = parseInt(document.getElementById('editQta').value);
    const siglaId = document.getElementById('editSiglaId').value;
    const destTipo = document.getElementById('editDestTipo').value;
    const destIdElement = document.getElementById('editDestId');
    const destId = destIdElement ? destIdElement.value : null;
    const note = document.getElementById('editNote').value;
    if (isNaN(qta) || qta < 1 || qta > obj.giacenza) { showErrorModal('Quantità non valida'); return; }
    const magazzinoTransito = magazzini.find(m => m.nome.toLowerCase() === 'race')?.id || magazzini[0]?.id;
    if (destTipo === 'MAGAZZINO') {
      if (!destId) { showErrorModal('Seleziona magazzino'); return; }
      const payload = { magazzinoId: parseInt(destId), note, oggetti: [{ tipoOggetto: obj.tipo, oggettoId: obj.id, siglaId: siglaId ? parseInt(siglaId) : null, quantita: qta, daTipo: obj.destinazioneTipo, daId: obj.destinazioneId }] };
      try {
        const res = await apiFetch('/api/assegnazioni/rientro/batch', { method: 'POST', body: JSON.stringify(payload) });
        if (res.success) { showMessage('Rientro effettuato', 'success'); chiudiEditModal(); await caricaOggettiInCarico(); }
        else showErrorModal(res.message);
      } catch(err) { showErrorModal(err.message); }
      return;
    }
    if (!destId) { showErrorModal('Seleziona destinazione'); return; }
    const daTipo = obj.destinazioneTipo || (currentUser.ruolo === 'admin' ? sourceTipo.value : currentUser.ruolo.toUpperCase());
    const daId = obj.destinazioneId || (currentUser.ruolo === 'admin' ? parseInt(sourceId.value) : currentUser.riferimento_id);
    if (siglaId) {
      const assegnatoA = await verificaSiglaAssegnata(obj.id, obj.tipo, siglaId, daTipo, daId);
      if (assegnatoA) {
        pendingAction = { payload: { daTipo, daId, aTipo: destTipo, aId: parseInt(destId), magazzinoId: parseInt(magazzinoTransito), oggetti: [{ tipoOggetto: obj.tipo, oggettoId: obj.id, siglaId: siglaId ? parseInt(siglaId) : null, quantita: qta }], note }, from: assegnatoA.nome };
        document.getElementById('confirmMsg').innerHTML = `La sigla è già assegnata a <strong>${assegnatoA.nome}</strong>. Trasferire?`;
        document.getElementById('confirmRiassegnaModal').style.display = 'flex';
        document.getElementById('confirmOkBtn').onclick = async () => {
          chiudiConfirmModal();
          try {
            const res = await apiFetch('/api/assegnazioni/trasferimento', { method: 'POST', body: JSON.stringify(pendingAction.payload) });
            if (res.success) { showMessage('Trasferimento effettuato', 'success'); chiudiEditModal(); await caricaOggettiInCarico(); }
            else showErrorModal(res.message);
          } catch(err) { showErrorModal(err.message); }
          pendingAction = null;
        };
        return;
      }
    }
    const payload = { daTipo, daId, aTipo: destTipo, aId: parseInt(destId), magazzinoId: parseInt(magazzinoTransito), oggetti: [{ tipoOggetto: obj.tipo, oggettoId: obj.id, siglaId: siglaId ? parseInt(siglaId) : null, quantita: qta }], note };
    try {
      const res = await apiFetch('/api/assegnazioni/trasferimento', { method: 'POST', body: JSON.stringify(payload) });
      if (res.success) { showMessage('Trasferimento effettuato', 'success'); chiudiEditModal(); await caricaOggettiInCarico(); }
      else showErrorModal(res.message);
    } catch(err) { showErrorModal(err.message); }
  }

  function applicaFiltriMagazzino() { if (radioMagazzino.checked) caricaOggettiDaMagazzino(); }
  function resetFiltriMagazzino() { filtroLunghezza.value = ''; filtroCategoria.value = ''; if (radioMagazzino.checked) caricaOggettiDaMagazzino(); }

  function toggleSource() {
    const isMag = radioMagazzino.checked;
    caricoSection.style.display = isMag ? 'none' : 'flex';
    magazzinoSection.style.display = isMag ? 'flex' : 'none';
    caricaOggetti();
  }
  async function caricaOggetti() {
    document.body.style.cursor = 'wait';
    try { if (radioMagazzino.checked) await caricaOggettiDaMagazzino(); else await caricaOggettiInCarico(); }
    finally { document.body.style.cursor = 'default'; }
    updateSortArrows();
  }
  function logout() { localStorage.removeItem('token'); localStorage.removeItem('user'); window.location.href = 'Login.html'; }

  function setup() {
    const isAdmin = currentUser.ruolo === 'admin';
    if (isAdmin) {
      sourceTipo.disabled = false; sourceId.disabled = false; includeReferenced.disabled = false;
      caricaSorgentiAdmin();
      sourceTipo.addEventListener('change', () => caricaSorgentiAdmin());
      sourceId.addEventListener('change', () => { if (radioCarico.checked) caricaOggetti(); });
      includeReferenced.addEventListener('change', () => { if (radioCarico.checked) caricaOggetti(); });
    } else {
      sourceTipo.disabled = true; sourceId.disabled = true; includeReferenced.disabled = true;
      if (radioCarico.checked) caricaOggetti();
    }
    radioCarico.addEventListener('change', toggleSource);
    radioMagazzino.addEventListener('change', toggleSource);
    magazzinoSelect.addEventListener('change', () => { if (radioMagazzino.checked) caricaOggetti(); });
    tipoOggettoMagazzino.addEventListener('change', () => { if (radioMagazzino.checked) caricaOggetti(); });
    toggleSource();
    changeDensity();
    attachSortHandlers();
  }

  window.onload = async () => {
    const token = localStorage.getItem('token');
    if (!token) { document.body.innerHTML = '<div class="container"><h2>Accesso negato</h2><a href="Login.html">Login</a></div>'; return; }
    try {
      currentUser = JSON.parse(localStorage.getItem('user'));
      if (!currentUser.riferimento_id && currentUser.RiferimentoID) currentUser.riferimento_id = parseInt(currentUser.RiferimentoID);
    } catch(e) { logout(); return; }
    document.getElementById('loginInfo').innerHTML = `👤 ${currentUser.nome_visualizzato || currentUser.username} (${currentUser.ruolo})`;
    await caricaMagazzini();
    await caricaCategorie();
    setup();
  };
</script>
</body>
</html>
