<!DOCTYPE html>
<html lang="it">
<head>
  <link rel="icon" type="image/png" href="/images/kastle-logo.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>📦 Assegnazioni e Rientri</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f2f5;
      margin: 0;
      padding: 20px;
    }
    .container {
      max-width: 1400px;
      margin: 0 auto;
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      padding: 12px 20px 20px 20px;
    }
    .header-main {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 10px;
      gap: 10px;
    }
    h2 {
      margin: 0;
      font-size: 1.6rem;
      border-left: 4px solid #1a73e8;
      padding-left: 10px;
      color: #1e2a3a;
    }
    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .density-selector {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.7rem;
    }
    .density-selector select {
      padding: 2px 5px;
      font-size: 0.7rem;
    }
    .btn {
      background: #1a73e8;
      color: white;
      border: none;
      padding: 4px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.7rem;
      font-weight: 500;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .btn:hover { background: #0f5bb5; transform: translateY(-1px); }
    .btn-success { background: #27ae60; }
    .btn-secondary { background: #6c757d; }
    .btn-sm { padding: 2px 6px; font-size: 0.65rem; }

    .header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
      flex-wrap: wrap;
      gap: 6px;
    }
    .logo img { height: 30px; }
    .login-info {
      background: #e8f0fe;
      padding: 2px 8px;
      border-radius: 16px;
      font-size: 0.7rem;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .sep {
      margin: 6px 0 10px 0;
      border-top: 1px solid #e2e8f0;
    }

    .source-selector, .source-selection {
      background: #f8f9fa;
      border-radius: 10px;
      border: 1px solid #e2e8f0;
    }
    .source-selector {
      padding: 5px 12px;
      margin-bottom: 8px;
      display: flex;
      gap: 20px;
      align-items: center;
      flex-wrap: wrap;
    }
    .source-option {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.75rem;
    }
    .source-selection {
      padding: 5px 12px;
      margin-bottom: 8px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: flex-end;
    }
    .form-group {
      margin-bottom: 0;
      flex: 1;
      min-width: 120px;
    }
    .form-group label {
      display: block;
      font-weight: 600;
      font-size: 0.6rem;
      margin-bottom: 2px;
      color: #2c3e50;
      text-transform: uppercase;
    }
    .form-group input, .form-group select {
      width: 100%;
      padding: 4px 6px;
      border: 1px solid #cbd5e0;
      border-radius: 6px;
      font-size: 0.7rem;
    }

    .filter-bar {
      background: #f8f9fa;
      border-radius: 10px;
      padding: 8px 12px;
      margin-bottom: 12px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: flex-end;
      border: 1px solid #e2e8f0;
    }
    .filter-group {
      flex: 1;
      min-width: 120px;
    }

    .table-wrapper {
      overflow-x: auto;
      overflow-y: auto;
      max-height: 70vh;
      border-radius: 12px;
      border: 1px solid #e2e8f0;
      background: white;
      position: relative;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.75rem;
      white-space: nowrap;
    }
    th, td {
      border-bottom: 1px solid #e2e8f0;
      padding: 6px 8px;
      text-align: left;
      vertical-align: middle;
    }
    th {
      background: #f8fafc;
      font-weight: 600;
      position: sticky;
      top: 0;
      z-index: 10;
      cursor: pointer;
      user-select: none;
    }
    th:hover { background: #e2e8f0; }
    th .sort-arrow {
      display: inline-block;
      margin-left: 6px;
      font-size: 0.7rem;
    }
    tr:hover td { background: #fefce8; }

    .density-small th, .density-small td { padding: 2px 5px; font-size: 0.65rem; }
    .density-medium th, .density-medium td { padding: 5px 7px; font-size: 0.75rem; }
    .density-large th, .density-large td { padding: 8px 10px; font-size: 0.85rem; }

    @media print {
      @page { margin: 0.5cm; size: auto; }
      body { background: white; padding: 0; margin: 0; }
      .container { max-width: 100%; padding: 0; margin: 0; box-shadow: none; }
      .no-print { display: none !important; }
      .login-info { display: none !important; }
      .header-bar .btn-secondary { display: none !important; }
      .header-bar .logo { display: block !important; }
      .header-bar { justify-content: center; }
      .table-wrapper { overflow: visible; max-height: none; }
      table { page-break-inside: avoid; width: 100%; }
      th, td { border: 1px solid #ccc; }
      th { position: static; }
      .logo img { height: 20px !important; }
      h2 { font-size: 1.8rem !important; }
      #tabellaOggetti th:last-child,
      #tabellaOggetti td:last-child { display: none; }
      .print-footer-right {
        display: block !important;
        position: fixed;
        bottom: 5px;
        right: 5px;
        font-size: 8px;
        color: #666;
        text-align: right;
      }
      header, footer { display: none !important; }
    }
    .print-footer-right { display: none; }

    .message {
      padding: 4px 8px;
      border-radius: 6px;
      margin-bottom: 8px;
      font-size: 0.7rem;
    }
    .success { background: #d4edda; color: #155724; border-left: 3px solid #38a169; }
    .error { background: #f8d7da; color: #721c24; border-left: 3px solid #e53e3e; }
    .info { background: #e8f0fe; color: #1a73e8; border-left: 3px solid #1a73e8; }
    .text-center { text-align: center; }

    .modal {
      display: none;
      position: fixed;
      top:0; left:0;
      width:100%; height:100%;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .modal-content {
      background: white;
      border-radius: 16px;
      width: 90%;
      max-width: 500px;
      max-height: 85vh;
      overflow-y: auto;
      padding: 0;
    }
    .modal-header {
      padding: 10px 15px;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .modal-header h3 { margin: 0; font-size: 1.1rem; }
    .close {
      font-size: 1.3rem;
      font-weight: bold;
      cursor: pointer;
      color: #aaa;
    }
    .close:hover { color: black; }
    .modal-body { padding: 12px 15px; }
    .modal-footer {
      padding: 10px 15px;
      border-top: 1px solid #e2e8f0;
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      background: #f8fafc;
    }
    .form-group { margin-bottom: 10px; }
    .form-control {
      width: 100%;
      padding: 5px 8px;
      border: 1px solid #cbd5e0;
      border-radius: 8px;
      font-size: 0.75rem;
    }
    .warning-badge {
      background: #fef3c7;
      color: #92400e;
      padding: 4px 8px;
      border-radius: 8px;
      font-size: 0.65rem;
      margin-top: 4px;
    }

    @media (max-width: 768px) {
      body { padding: 8px; }
      .container { padding: 8px 12px; }
      .source-selector, .source-selection { flex-direction: column; align-items: stretch; }
      .source-selection { gap: 8px; }
      .form-group { min-width: auto; }
      .header-main { flex-direction: column; align-items: stretch; }
      .toolbar { justify-content: flex-start; }
      .density-medium th, .density-medium td { padding: 4px 6px; font-size: 0.65rem; }
      .table-wrapper { max-height: 60vh; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header-bar">
    <div class="logo"><img src="/images/kastle-logo.png" alt="Kastle"></div>
    <div style="display: flex; gap: 6px; align-items: center;">
      <span id="loginInfo" class="login-info"></span>
      <button class="btn btn-secondary no-print" onclick="window.location.href='MenuPrincipale.html'">🏠 Menu</button>
      <button class="btn btn-secondary no-print" onclick="logout()">🚪 Logout</button>
      <button class="btn btn-secondary no-print" onclick="caricaOggetti()">🔄 Ricarica</button>
    </div>
  </div>
  <div class="sep"></div>

  <div class="header-main">
    <h2>📦 Assegnazioni e Rientri</h2>
    <div class="toolbar no-print">
      <div class="density-selector">
        <span>📏 Densità:</span>
        <select id="densitySelect" onchange="changeDensity()">
          <option value="small">Piccola</option>
          <option value="medium" selected>Media</option>
          <option value="large">Grande</option>
        </select>
      </div>
      <button class="btn btn-secondary" onclick="stampaTabella()">🖨️ Stampa</button>
      <button class="btn btn-success" onclick="esportaExcel()">📎 Esporta Excel</button>
    </div>
  </div>

  <div id="messageArea"></div>

  <div class="source-selector no-print">
    <div class="source-option">
      <input type="radio" name="source" id="sourceCarico" value="carico" checked>
      <label for="sourceCarico">📦 In carico (da soggetto)</label>
    </div>
    <div class="source-option">
      <input type="radio" name="source" id="sourceMagazzino" value="magazzino">
      <label for="sourceMagazzino">🏭 Dal magazzino</label>
    </div>
  </div>

  <!-- Sezione "In carico" (originale, con radio per tipo vista) -->
  <div id="caricoSection" class="source-selection no-print">
    <div class="form-group">
      <label>Sorgente (soggetto)</label>
      <select id="sourceTipo">
        <option value="PROMOTER">👤 Promoter</option>
        <option value="NEGOZIO">🏪 Negozio</option>
        <option value="CLIENTE">👥 Cliente</option>
        <option value="AGENTE">🤝 Agente</option>
      </select>
    </div>
    <div class="form-group">
      <label>Seleziona soggetto</label>
      <select id="sourceId"><option value="">Seleziona...</option></select>
    </div>
    <div class="form-group">
      <div style="display: flex; gap: 20px; margin-top: 10px;">
        <label style="display: flex; align-items: center; gap: 5px;">
          <input type="radio" name="viewMode" id="viewCompleto" value="completo" checked>
          <span>📋 Completo (con assegnazioni)</span>
        </label>
        <label style="display: flex; align-items: center; gap: 5px;">
          <input type="radio" name="viewMode" id="viewAssegnazioni" value="assegnazioni">
          <span>📤 Assegnazioni</span>
        </label>
      </div>
    </div>
  </div>

  <!-- Sezione "Dal magazzino" (invariata) -->
  <div id="magazzinoSection" style="display: none;" class="no-print">
    <div class="source-selection">
      <div class="form-group">
        <label>Magazzino</label>
        <select id="magazzinoSelect"></select>
      </div>
      <div class="form-group">
        <label>Tipo oggetto</label>
        <select id="tipoOggettoMagazzino">
          <option value="TUTTI">Tutti</option>
          <option value="ARTICOLO">Articoli</option>
          <option value="KIT">Kit</option>
        </select>
      </div>
    </div>
    <div class="source-selection">
      <div class="form-group">
        <label>Lunghezza</label>
        <input type="text" id="filtroLunghezza" list="lunghezzaList" placeholder="Esatta">
        <datalist id="lunghezzaList"></datalist>
      </div>
      <div class="form-group">
        <label>Categoria</label>
        <select id="filtroCategoria">
          <option value="">Tutte</option>
        </select>
      </div>
      <div style="display: flex; gap: 8px; align-items: flex-end;">
        <button class="btn" onclick="applicaFiltriMagazzino()">🔍 Filtra</button>
        <button class="btn btn-secondary" onclick="resetFiltriMagazzino()">🔄 Reset</button>
      </div>
    </div>
  </div>

  <!-- Filtri per la modalità "In carico" (visibili solo in carico) -->
  <div id="caricoFiltri" class="filter-bar no-print" style="display: none;">
    <div class="filter-group">
      <label>Magazzino</label>
      <select id="caricoFiltroMagazzino">
        <option value="">Tutti</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Lunghezza</label>
      <input type="text" id="caricoFiltroLunghezza" list="caricoLunghezzaList" placeholder="Esatta">
      <datalist id="caricoLunghezzaList"></datalist>
    </div>
    <div class="filter-group">
      <label>Sigla</label>
      <input type="text" id="caricoFiltroSigla" list="caricoSiglaList" placeholder="Esatta">
      <datalist id="caricoSiglaList"></datalist>
    </div>
    <div style="display: flex; gap: 8px; align-items: flex-end;">
      <button class="btn" onclick="applicaFiltriCarico()">🔍 Filtra</button>
      <button class="btn btn-secondary" onclick="resetFiltriCarico()">🔄 Reset</button>
    </div>
  </div>

  <!-- Tabella -->
  <div class="table-wrapper" id="tableWrapper">
    <table id="tabellaOggetti">
      <thead id="tabellaHeader">
         <th id="colonnaPrimaria" data-sort="codice">Codice <span class="sort-arrow"></span></th>
         <th data-sort="descrizione">Descrizione <span class="sort-arrow"></span></th>
         <th data-sort="lunghezza">Lunghezza <span class="sort-arrow"></span></th>
         <th data-sort="sigla">Sigla <span class="sort-arrow"></span></th>
         <th data-sort="totale">Qtà <span class="sort-arrow"></span></th>
         <th data-sort="destinatario">Destinatario <span class="sort-arrow"></span></th>
         <th data-sort="data">Data <span class="sort-arrow"></span></th>
         <th>Azioni</th>
      </thead>
      <tbody id="tabellaBody"><td colspan="8" class="text-center">Caricamento...<\/td></tbody>
    </table>
  </div>

  <div class="print-footer-right">
    <span id="printDate"></span><br>
    <span id="printUser"></span>
  </div>
</div>

<!-- Modali (stessi identici alla versione originale, qui omessi per brevità, ma nel file finale vanno inclusi) -->
<div id="assignModal" class="modal">...</div>
<div id="editAssignmentModal" class="modal">...</div>
<div id="confirmRiassegnaModal" class="modal">...</div>
<div id="errorModal" class="modal">...</div>

<script>
  // ========== UTILITY (invariata) ==========
  function getAuthHeader() { /* ... */ }
  async function apiFetch(endpoint, options = {}) { /* ... */ }
  function showMessage(msg, type) { /* ... */ }
  function showErrorModal(msg) { /* ... */ }
  function chiudiErrorModal() { /* ... */ }
  function chiudiAssignModal() { /* ... */ }
  function chiudiEditModal() { /* ... */ }
  function chiudiConfirmModal() { /* ... */ }

  let currentUser = null;
  let magazzini = [], categorie = [];
  let oggetti = [];
  let oggettiOriginali = [];
  let currentEditObj = null, pendingAction = null, currentAssignObj = null;
  let sortColumn = 'codice', sortAsc = true;

  const radioCarico = document.getElementById('sourceCarico');
  const radioMagazzino = document.getElementById('sourceMagazzino');
  const caricoSection = document.getElementById('caricoSection');
  const magazzinoSection = document.getElementById('magazzinoSection');
  const sourceTipo = document.getElementById('sourceTipo');
  const sourceId = document.getElementById('sourceId');
  const viewCompleto = document.getElementById('viewCompleto');
  const viewAssegnazioni = document.getElementById('viewAssegnazioni');
  const caricoFiltriDiv = document.getElementById('caricoFiltri');
  const caricoFiltroMagazzino = document.getElementById('caricoFiltroMagazzino');
  const caricoFiltroLunghezza = document.getElementById('caricoFiltroLunghezza');
  const caricoFiltroSigla = document.getElementById('caricoFiltroSigla');
  const caricoLunghezzaList = document.getElementById('caricoLunghezzaList');
  const caricoSiglaList = document.getElementById('caricoSiglaList');
  const magazzinoSelect = document.getElementById('magazzinoSelect');
  const tipoOggettoMagazzino = document.getElementById('tipoOggettoMagazzino');
  const filtroLunghezza = document.getElementById('filtroLunghezza');
  const filtroCategoria = document.getElementById('filtroCategoria');
  const lunghezzaList = document.getElementById('lunghezzaList');

  // ========== FORMATTAZIONE DATA ==========
  function formatDate(dateString) {
    if (!dateString) return '';
    const date = new Date(dateString);
    if (isNaN(date.getTime())) return dateString.split('T')[0];
    const day = String(date.getDate()).padStart(2, '0');
    const month = String(date.getMonth() + 1).padStart(2, '0');
    const year = date.getFullYear();
    return `${day}-${month}-${year}`;
  }

  // ========== SORTING ==========
  function sortOggetti() {
    oggetti.sort((a, b) => {
      let valA = a[sortColumn];
      let valB = b[sortColumn];
      if (sortColumn === 'totale') {
        valA = parseFloat(valA) || 0;
        valB = parseFloat(valB) || 0;
      } else if (sortColumn === 'lunghezza') {
        valA = parseFloat(valA) || 0;
        valB = parseFloat(valB) || 0;
      } else if (sortColumn === 'data') {
        valA = valA ? new Date(valA).getTime() : 0;
        valB = valB ? new Date(valB).getTime() : 0;
      } else {
        valA = (valA || '').toString().toLowerCase();
        valB = (valB || '').toString().toLowerCase();
      }
      if (valA < valB) return sortAsc ? -1 : 1;
      if (valA > valB) return sortAsc ? 1 : -1;
      return 0;
    });
  }

  function updateSortArrows() {
    document.querySelectorAll('#tabellaOggetti th[data-sort]').forEach(th => {
      const col = th.getAttribute('data-sort');
      const arrowSpan = th.querySelector('.sort-arrow');
      if (col === sortColumn) arrowSpan.innerHTML = sortAsc ? ' ↑' : ' ↓';
      else arrowSpan.innerHTML = '';
    });
    const colonnaPrimaria = document.getElementById('colonnaPrimaria');
    if (colonnaPrimaria) {
      const arrowSpan = colonnaPrimaria.querySelector('.sort-arrow');
      const isCarico = radioCarico.checked;
      const col = isCarico && viewAssegnazioni.checked ? 'data' : 'codice';
      if (sortColumn === col) arrowSpan.innerHTML = sortAsc ? ' ↑' : ' ↓';
      else arrowSpan.innerHTML = '';
    }
  }

  function attachSortHandlers() {
    document.querySelectorAll('#tabellaOggetti th[data-sort]').forEach(th => {
      th.removeEventListener('click', handleSortClick);
      th.addEventListener('click', handleSortClick);
    });
    const colonnaPrimaria = document.getElementById('colonnaPrimaria');
    if (colonnaPrimaria) {
      colonnaPrimaria.removeEventListener('click', handleSortClick);
      colonnaPrimaria.addEventListener('click', () => {
        const isCarico = radioCarico.checked;
        const col = isCarico && viewAssegnazioni.checked ? 'data' : 'codice';
        if (sortColumn === col) sortAsc = !sortAsc;
        else { sortColumn = col; sortAsc = true; }
        sortOggetti();
        popolaTabella();
        updateSortArrows();
      });
    }
  }

  function handleSortClick(e) {
    const th = e.currentTarget;
    const col = th.getAttribute('data-sort');
    if (!col) return;
    if (sortColumn === col) sortAsc = !sortAsc;
    else { sortColumn = col; sortAsc = true; }
    sortOggetti();
    popolaTabella();
    updateSortArrows();
  }

  // ========== DENSITÀ, STAMPA, EXPORT ==========
  function changeDensity() {
    const val = document.getElementById('densitySelect').value;
    document.getElementById('tableWrapper').className = `table-wrapper density-${val}`;
  }

  async function stampaTabella() {
    const now = new Date().toLocaleString();
    document.getElementById('printDate').innerText = now;
    const userDisplay = currentUser?.nome_visualizzato || currentUser?.username || '';
    document.getElementById('printUser').innerText = userDisplay ? `Utente: ${userDisplay}` : '';
    window.print();
  }

  function esportaExcel() {
    const table = document.getElementById('tabellaOggetti');
    const rows = table.querySelectorAll('tr');
    let csv = [];
    for (let row of rows) {
      let rowData = [];
      let cells = row.querySelectorAll('th, td');
      for (let cell of cells) {
        let text = cell.innerText.trim();
        if (text === '✏️') text = '';
        if (cell.tagName === 'TH') text = text.replace(/[↑↓]/g, '').trim();
        rowData.push(`"${text.replace(/"/g, '""')}"`);
      }
      csv.push(rowData.join(','));
    }
    const blob = new Blob(["\uFEFF" + csv.join('\n')], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    const url = URL.createObjectURL(blob);
    link.href = url;
    link.setAttribute('download', 'assegnazioni.csv');
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(url);
  }

  // ========== OGGETTI IN CARICO (ORIGINALE CON REFERENTI) ==========
  async function caricaOggettiInCarico() {
    const tipo = sourceTipo.value;
    const id = sourceId.value;
    if (!tipo || !id) { oggetti = []; oggettiOriginali = []; popolaTabella(); return; }
    try {
      let items = [];
      if (viewCompleto.checked) {
        // Modalità "Completo (con assegnazioni)" = usa l'API originale con referenti
        const body = { targetTipo: tipo, targetId: parseInt(id), includeReferenced: true };
        const res = await apiFetch('/api/assegnazioni/oggetti', { method: 'POST', body: JSON.stringify(body) });
        if (!res.success) throw new Error(res.message);
        items = res.oggetti || [];
        // Arricchisci con dettagli (sigla, lunghezza)
        for (let obj of items) {
          if (obj.tipo === 'KIT') {
            const kit = await apiFetch(`/api/kit/${obj.ID}`);
            const sciDetail = kit.dettagli?.find(d => d.tipo_articolo === 'SCI');
            obj.sigla = sciDetail?.sigla || '';
            obj.lunghezza = sciDetail?.lunghezza || '';
            if (!obj.lunghezza && sciDetail?.articolo_id) {
              const art = await apiFetch(`/api/articoli/${sciDetail.articolo_id}`);
              obj.lunghezza = art.lunghezza || '';
            }
          } else {
            obj.sigla = obj.SIGLA_CORRENTE || '';
            obj.lunghezza = obj.LUNGHEZZA || '';
          }
          obj.destinatario = obj.destinatarioNome || (obj.destinazioneTipo === 'PROMOTER' ? `${obj.destinatario_nome||''} ${obj.destinatario_cognome||''}`.trim() : (obj.destinatario_nome||'Magazzino'));
        }
        items = items.map(obj => ({
          id: obj.ID,
          tipo: obj.tipo,
          codice: obj.codice,
          descrizione: obj.descrizione,
          lunghezza: obj.lunghezza || '',
          sigla: obj.sigla || '',
          totale: obj.quantita,
          destinatario: obj.destinatario,
          data: null
        }));
      } else {
        // Modalità "Assegnazioni" = oggetti inviati dal soggetto (movimenti USCITA)
        const params = new URLSearchParams({
          tipo: 'USCITA',
          da_magazzino: `${tipo}-${id}`,
          _order: 'DESC',
          _limit: '1000'
        });
        const res = await apiFetch(`/api/movimenti?${params.toString()}`);
        if (!res.success) throw new Error(res.message);
        const movimenti = res.data || [];
        const mappa = new Map();
        for (const mov of movimenti) {
          const key = `${mov.tipo_oggetto}|${mov.id_articolo_kit}`;
          if (!mappa.has(key)) {
            let dettaglio = null;
            if (mov.tipo_oggetto === 'ARTICOLO') {
              const art = await apiFetch(`/api/articoli/${mov.id_articolo_kit}`);
              dettaglio = {
                id: mov.id_articolo_kit,
                tipo: 'ARTICOLO',
                codice: art.codice,
                descrizione: art.descrizione_completa,
                lunghezza: art.lunghezza || '',
                sigla: art.sigla || '',
                totale: mov.quantita,
                data: mov.data,
                destinatario: ''
              };
            } else {
              const kit = await apiFetch(`/api/kit/${mov.id_articolo_kit}`);
              let sigla = '', lunghezza = '';
              if (kit.dettagli) {
                const sci = kit.dettagli.find(d => d.tipo_articolo === 'SCI');
                if (sci) {
                  sigla = sci.sigla || '';
                  lunghezza = sci.lunghezza || '';
                  if (!lunghezza && sci.articolo_id) {
                    const art = await apiFetch(`/api/articoli/${sci.articolo_id}`);
                    lunghezza = art.lunghezza || '';
                  }
                }
              }
              dettaglio = {
                id: mov.id_articolo_kit,
                tipo: 'KIT',
                codice: kit.codice_kit,
                descrizione: kit.descrizione,
                lunghezza: lunghezza,
                sigla: sigla,
                totale: mov.quantita,
                data: mov.data,
                destinatario: ''
              };
            }
            mappa.set(key, dettaglio);
          }
          const obj = mappa.get(key);
          if (mov.a_magazzino && mov.a_magazzino.includes('-')) {
            const parts = mov.a_magazzino.split('-');
            const destTipo = parts[0];
            const destId = parseInt(parts[1]);
            const destNome = await getNomeSoggetto(destTipo, destId);
            obj.destinatario = destNome;
          } else {
            obj.destinatario = mov.a_magazzino || 'Destinazione sconosciuta';
          }
        }
        items = Array.from(mappa.values());
      }
      oggettiOriginali = items;
      // Cambia intestazione colonna primaria
      const colonnaPrimaria = document.getElementById('colonnaPrimaria');
      if (colonnaPrimaria) {
        if (viewCompleto.checked) colonnaPrimaria.innerText = 'Codice';
        else colonnaPrimaria.innerText = 'Data';
        colonnaPrimaria.appendChild(document.createElement('span')).className = 'sort-arrow';
      }
      // Imposta colonna di ordinamento di default
      if (viewCompleto.checked) sortColumn = 'codice';
      else sortColumn = 'data';
      sortAsc = true;
      // Aggiorna i datalist per i filtri
      const lunghezze = [...new Set(items.map(o => o.lunghezza).filter(v => v))];
      caricoLunghezzaList.innerHTML = '';
      lunghezze.forEach(l => { let opt = document.createElement('option'); opt.value = l; caricoLunghezzaList.appendChild(opt); });
      const sigle = [...new Set(items.map(o => o.sigla).filter(v => v))];
      caricoSiglaList.innerHTML = '';
      sigle.forEach(s => { let opt = document.createElement('option'); opt.value = s; caricoSiglaList.appendChild(opt); });
      // Applica filtri
      applicaFiltriCarico();
    } catch(err) {
      showMessage('Errore: ' + err.message, 'error');
      oggetti = []; oggettiOriginali = [];
      popolaTabella();
    }
  }

  async function getNomeSoggetto(tipo, id) {
    try {
      const res = await apiFetch(`/api/soggetti/${id}`);
      return tipo === 'PROMOTER' ? `${res.nome} ${res.cognome || ''}`.trim() : res.nome;
    } catch(e) { return `${tipo} ${id}`; }
  }

  // ========== FILTRI PER MODALITÀ IN CARICO ==========
  function applicaFiltriCarico() {
    const magId = caricoFiltroMagazzino.value;
    const lung = caricoFiltroLunghezza.value.trim();
    const sig = caricoFiltroSigla.value.trim();
    let filtrati = [...oggettiOriginali];
    if (magId) filtrati = filtrati.filter(o => o.magazzinoId == magId);
    if (lung) filtrati = filtrati.filter(o => o.lunghezza == lung);
    if (sig) filtrati = filtrati.filter(o => o.sigla && o.sigla.toLowerCase().includes(sig.toLowerCase()));
    oggetti = filtrati;
    sortOggetti();
    popolaTabella();
    updateSortArrows();
  }

  function resetFiltriCarico() {
    caricoFiltroMagazzino.value = '';
    caricoFiltroLunghezza.value = '';
    caricoFiltroSigla.value = '';
    applicaFiltriCarico();
  }

  // ========== OGGETTI DAL MAGAZZINO (invariato) ==========
  async function caricaOggettiDaMagazzino() {
    const magId = magazzinoSelect.value;
    if (!magId) { oggetti = []; popolaTabella(); return; }
    const tipo = tipoOggettoMagazzino.value;
    const filtroLung = filtroLunghezza.value.trim();
    const filtroCat = filtroCategoria.value;
    let lista = [];
    try {
      if (tipo === 'TUTTI' || tipo === 'ARTICOLO') {
        const params = new URLSearchParams({ magazzino: magId, min_giacenza: '1' });
        if (filtroLung) params.append('lunghezza', filtroLung);
        if (filtroCat) params.append('categoria', filtroCat);
        const res = await apiFetch(`/api/articoli?${params}`);
        let articoli = res.success ? res.data : [];
        for (let a of articoli) {
          let sigle = [];
          try { sigle = await apiFetch(`/api/articoli/${a.id}/sigle`); } catch(e) {}
          const magObj = magazzini.find(m => m.id == a.magazzino);
          const magNome = magObj ? magObj.nome : 'Magazzino';
          lista.push({
            id: a.id, tipo: 'ARTICOLO',
            codice: a.codice_modello || a.codice,
            descrizione: a.descrizione,
            lunghezza: a.lunghezza || '',
            sigla: sigle.length ? sigle[0].sigla : null,
            totale: a.quantita_totale,
            destinatario: magNome,
            data: null
          });
        }
      }
      if (tipo === 'TUTTI' || tipo === 'KIT') {
        const res = await apiFetch('/api/kit');
        let kits = res.success ? res.data : (Array.isArray(res) ? res : []);
        if (magId) kits = kits.filter(k => k.magazzino == magId);
        for (let k of kits) {
          let siglaSci = null, lunghezzaSci = null;
          if (k.dettagli) {
            const sci = k.dettagli.find(d => d.tipo_articolo === 'SCI');
            if (sci && sci.articolo_id) {
              try {
                const sciArt = await apiFetch(`/api/articoli/${sci.articolo_id}`);
                lunghezzaSci = sciArt.lunghezza;
                const sigle = await apiFetch(`/api/articoli/${sci.articolo_id}/sigle`);
                if (sci.sigla_id) {
                  const found = sigle.find(s => s.id == sci.sigla_id);
                  if (found) siglaSci = found.sigla;
                }
              } catch(e) {}
            }
          }
          if (filtroLung && lunghezzaSci != filtroLung) continue;
          let descr = k.descrizione;
          if (descr && descr.startsWith('Kit: ')) descr = descr.substring(5);
          const magObj = magazzini.find(m => m.id == k.magazzino);
          const magNome = magObj ? magObj.nome : 'Magazzino';
          let qAssegnata = k.assegnato_a ? k.assegnato_a.quantita : 0;
          lista.push({
            id: k.id, tipo: 'KIT',
            codice: k.codice_kit,
            descrizione: descr,
            lunghezza: lunghezzaSci || '',
            sigla: siglaSci,
            totale: k.quantita,
            destinatario: magNome,
            data: null
          });
        }
      }
      oggetti = lista;
      sortOggetti();
      popolaTabella();
      const lunghezze = [...new Set(lista.map(o => o.lunghezza).filter(v => v))];
      lunghezzaList.innerHTML = '';
      lunghezze.forEach(l => { let opt = document.createElement('option'); opt.value = l; lunghezzaList.appendChild(opt); });
    } catch(err) { showMessage('Errore magazzino: ' + err.message, 'error'); }
  }

  // ========== POPOLA TABELLA ==========
  function popolaTabella() {
    const tbody = document.getElementById('tabellaBody');
    const isCarico = radioCarico.checked;
    const isCompleto = isCarico && viewCompleto.checked;
    if (!oggetti.length) {
      tbody.innerHTML = `<td colspan="8" class="text-center">Nessun oggetto disponibile<\/td>`;
      return;
    }
    tbody.innerHTML = '';
    oggetti.forEach((obj, idx) => {
      const row = tbody.insertRow();
      if (isCarico && !isCompleto) {
        row.insertCell(0).innerText = obj.data ? formatDate(obj.data) : '-';
      } else {
        row.insertCell(0).innerText = obj.codice || '-';
      }
      row.insertCell(1).innerText = obj.descrizione || '-';
      row.insertCell(2).innerText = obj.lunghezza || '-';
      row.insertCell(3).innerText = obj.sigla || '-';
      row.insertCell(4).innerText = obj.totale ?? '-';
      row.insertCell(5).innerText = obj.destinatario || 'Magazzino';
      row.insertCell(6).innerText = obj.data ? formatDate(obj.data) : '-';
      const btn = document.createElement('button');
      btn.textContent = '✏️';
      btn.className = 'btn btn-secondary btn-sm';
      if (radioMagazzino.checked) btn.onclick = () => apriModalAssegnazione(obj);
      else btn.onclick = () => apriModificaSingola(obj);
      row.insertCell(7).appendChild(btn);
    });
    updateSortArrows();
  }

  // ========== GESTIONE UI ==========
  function toggleSource() {
    const isMagazzino = radioMagazzino.checked;
    caricoSection.style.display = isMagazzino ? 'none' : 'flex';
    magazzinoSection.style.display = isMagazzino ? 'flex' : 'none';
    caricoFiltriDiv.style.display = isMagazzino ? 'none' : 'flex';
    if (isMagazzino) {
      caricaOggettiDaMagazzino();
    } else {
      caricaOggettiInCarico();
    }
  }

  async function caricaOggetti() {
    document.body.style.cursor = 'wait';
    try {
      if (radioMagazzino.checked) {
        await caricaOggettiDaMagazzino();
      } else {
        await caricaOggettiInCarico();
      }
    } finally {
      document.body.style.cursor = 'default';
    }
  }

  // ========== CARICAMENTO ANAGRAFICHE ==========
  async function caricaMagazzini() {
    try {
      magazzini = await apiFetch('/api/anagrafiche/magazzini');
      magazzinoSelect.innerHTML = '<option value="">Tutti</option>';
      magazzini.forEach(m => magazzinoSelect.appendChild(new Option(m.nome, m.id)));
      const defaultMag = magazzini.find(m => m.nome.toLowerCase() === 'race');
      if (defaultMag) magazzinoSelect.value = defaultMag.id;
      // Popola anche il filtro per la modalità carico
      caricoFiltroMagazzino.innerHTML = '<option value="">Tutti</option>';
      magazzini.forEach(m => caricoFiltroMagazzino.appendChild(new Option(m.nome, m.id)));
    } catch(err) { showMessage('Errore magazzini', 'error'); }
  }

  async function caricaCategorie() {
    try {
      const res = await apiFetch('/api/anagrafiche/categorie');
      categorie = res || [];
      filtroCategoria.innerHTML = '<option value="">Tutte</option>';
      categorie.forEach(c => filtroCategoria.appendChild(new Option(c.nome, c.id)));
    } catch(err) { console.error(err); }
  }

  async function caricaSorgentiAdmin() {
    const tipo = sourceTipo.value;
    try {
      const data = await apiFetch(`/api/soggetti/tipo/${tipo}`);
      sourceId.innerHTML = '<option value="">Seleziona...</option>';
      data.forEach(item => {
        let testo = tipo === 'PROMOTER' ? `${item.nome} ${item.cognome || ''}`.trim() : item.nome;
        sourceId.appendChild(new Option(testo, item.id));
      });
      if (sourceId.options.length > 1 && !sourceId.value) sourceId.selectedIndex = 1;
      if (radioCarico.checked) await caricaOggettiInCarico();
    } catch(err) { showMessage('Errore sorgenti', 'error'); }
  }

  function applicaFiltriMagazzino() { if (radioMagazzino.checked) caricaOggettiDaMagazzino(); }
  function resetFiltriMagazzino() { filtroLunghezza.value = ''; filtroCategoria.value = ''; if (radioMagazzino.checked) caricaOggettiDaMagazzino(); }

  function logout() { localStorage.removeItem('token'); localStorage.removeItem('user'); window.location.href = 'Login.html'; }

  // ========== SETUP ==========
  function setup() {
  const isAdmin = currentUser.ruolo === 'admin';
  if (isAdmin) {
    sourceTipo.disabled = false;
    sourceId.disabled = false;
    // Carica tutti i soggetti per tipo (come prima)
    caricaSorgentiAdmin();
    sourceTipo.addEventListener('change', () => caricaSorgentiAdmin());
    sourceId.addEventListener('change', () => { if (radioCarico.checked) caricaOggettiInCarico(); });
  } else {
    // Non admin: abilita i select ma popola solo i soggetti visibili
    sourceTipo.disabled = true;   // il tipo è fisso (ruolo dell'utente)
    sourceId.disabled = false;
    // Imposta il tipo al ruolo dell'utente
    sourceTipo.value = currentUser.ruolo.toUpperCase();
    // Carica i soggetti visibili
    caricaSorgentiVisibili();
    sourceId.addEventListener('change', () => { if (radioCarico.checked) caricaOggettiInCarico(); });
  }
  // ... resto invariato

    // Eventi per cambio vista
    viewCompleto.addEventListener('change', () => { if (radioCarico.checked) caricaOggettiInCarico(); });
    viewAssegnazioni.addEventListener('change', () => { if (radioCarico.checked) caricaOggettiInCarico(); });
    caricoFiltroMagazzino.addEventListener('change', () => { if (radioCarico.checked) applicaFiltriCarico(); });
    caricoFiltroLunghezza.addEventListener('input', () => { if (radioCarico.checked) applicaFiltriCarico(); });
    caricoFiltroSigla.addEventListener('input', () => { if (radioCarico.checked) applicaFiltriCarico(); });
    radioCarico.addEventListener('change', toggleSource);
    radioMagazzino.addEventListener('change', toggleSource);
    magazzinoSelect.addEventListener('change', () => { if (radioMagazzino.checked) caricaOggettiDaMagazzino(); });
    tipoOggettoMagazzino.addEventListener('change', () => { if (radioMagazzino.checked) caricaOggettiDaMagazzino(); });
    toggleSource();
    changeDensity();
    attachSortHandlers();
  }
  
async function caricaSorgentiVisibili() {
  try {
    const data = await apiFetch('/api/soggetti/visibili');
    sourceId.innerHTML = '<option value="">Seleziona...</option>';
    data.forEach(item => {
      let testo = item.tipo === 'PROMOTER' ? `${item.nome} ${item.cognome || ''}`.trim() : item.nome;
      if (item.livello) testo += ` (liv. ${item.livello})`;
      sourceId.appendChild(new Option(testo, item.id));
    });
    if (sourceId.options.length > 1 && !sourceId.value) sourceId.selectedIndex = 1;
    if (radioCarico.checked) await caricaOggettiInCarico();
  } catch(err) { showMessage('Errore caricamento soggetti visibili', 'error'); }
}

  async function apriModalAssegnazione(obj) { /* ... */ }
  async function confermaAssegnazione() { /* ... */ }
  async function apriModificaSingola(obj) { /* ... */ }
  async function salvaModificaSingola() { /* ... */ }
  async function verificaSiglaAssegnata(oggettoId, tipoOggetto, siglaId, excludeSubjectTipo, excludeSubjectId) { return null; }
  function escapeHtml(str) { return str ? str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;') : ''; }

  window.onload = async () => {
    const token = localStorage.getItem('token');
    if (!token) { document.body.innerHTML = '<div class="container"><h2>Accesso negato</h2><a href="Login.html">Login</a></div>'; return; }
    try {
      currentUser = JSON.parse(localStorage.getItem('user'));
      if (!currentUser.riferimento_id && currentUser.RiferimentoID) currentUser.riferimento_id = parseInt(currentUser.RiferimentoID);
    } catch(e) { logout(); return; }
    document.getElementById('loginInfo').innerHTML = `👤 ${currentUser.nome_visualizzato || currentUser.username} (${currentUser.ruolo})`;
    await caricaMagazzini();
    await caricaCategorie();
    setup();
  };
