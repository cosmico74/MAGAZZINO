<!DOCTYPE html>
<html lang="it">
<head>
  <link rel="icon" type="image/png" href="/images/kastle-logo.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📦 Assegnazioni e Rientri</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f2f5;
      margin: 0;
      padding: 20px;
    }
    .container {
      max-width: 1400px;
      margin: 0 auto;
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      padding: 25px;
    }
    h2 {
      margin-top: 0;
      border-left: 5px solid #1a73e8;
      padding-left: 15px;
      color: #1e2a3a;
      font-weight: 600;
    }
    .source-selector {
      background: #f8f9fa;
      border-radius: 16px;
      padding: 12px 20px;
      margin-bottom: 20px;
      display: flex;
      gap: 30px;
      align-items: center;
      border: 1px solid #e2e8f0;
    }
    .source-option {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 500;
    }
    .filters {
      background: #f8f9fa;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 25px;
      border: 1px solid #e2e8f0;
    }
    .filter-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 15px;
      margin-bottom: 15px;
    }
    .filter-group label {
      display: block;
      font-weight: 600;
      font-size: 0.7rem;
      margin-bottom: 5px;
      color: #2c3e50;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .filter-group input, .filter-group select {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #cbd5e0;
      border-radius: 10px;
      font-size: 0.8rem;
      transition: 0.2s;
    }
    .btn {
      background: #1a73e8;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 500;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn:hover { background: #0f5bb5; transform: translateY(-1px); }
    .btn-success { background: #27ae60; }
    .btn-success:hover { background: #219653; }
    .btn-secondary { background: #6c757d; }
    .btn-secondary:hover { background: #5a6268; }
    .btn-warning { background: #f39c12; }
    .btn-warning:hover { background: #e67e22; }
    .btn-sm { padding: 4px 8px; font-size: 0.7rem; }
    .table-wrapper {
      overflow-x: auto;
      margin-bottom: 25px;
      border-radius: 16px;
      border: 1px solid #e2e8f0;
      background: white;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8rem;
    }
    th, td {
      border-bottom: 1px solid #e2e8f0;
      padding: 10px 12px;
      text-align: left;
      vertical-align: middle;
    }
    th {
      background: #f8fafc;
      font-weight: 600;
      color: #1e293b;
    }
    tr:hover td { background: #fefce8; }
    .selected-info {
      background: #e8f0fe;
      padding: 10px 16px;
      border-radius: 12px;
      margin-bottom: 20px;
      font-size: 0.85rem;
      display: inline-block;
      border-left: 4px solid #1a73e8;
    }
    .message {
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 20px;
      font-size: 0.85rem;
    }
    .success { background: #d4edda; color: #155724; border-left: 4px solid #38a169; }
    .error { background: #f8d7da; color: #721c24; border-left: 4px solid #e53e3e; }
    .info { background: #e8f0fe; color: #1a73e8; border-left: 4px solid #1a73e8; }
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #e2e8f0;
      border-top-color: #1a73e8;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .text-center { text-align: center; }
    .login-info {
      background: #e8f0fe;
      padding: 5px 12px;
      border-radius: 20px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .header-bar {
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }
    input:disabled, select:disabled, button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .source-selection {
      background: #f8f9fa;
      border-radius: 16px;
      padding: 12px 20px;
      margin-bottom: 20px;
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      align-items: flex-end;
      border: 1px solid #e2e8f0;
    }
    .action-buttons {
      display: flex;
      gap: 12px;
      margin-top: 15px;
    }
    .inline-refresh {
      display: flex;
      align-items: flex-end;
      gap: 5px;
    }
    .modal {
      display: none;
      position: fixed;
      top:0; left:0;
      width:100%; height:100%;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .modal-content {
      background: white;
      border-radius: 24px;
      width: 90%;
      max-width: 650px;
      max-height: 85vh;
      overflow-y: auto;
      padding: 0;
      box-shadow: 0 20px 35px rgba(0,0,0,0.2);
    }
    .modal-header {
      padding: 20px 25px 10px 25px;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .modal-header h3 {
      margin: 0;
      font-weight: 600;
      color: #1e293b;
    }
    .modal-body {
      padding: 20px 25px;
    }
    .modal-footer {
      padding: 15px 25px 20px 25px;
      border-top: 1px solid #e2e8f0;
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      background: #f8fafc;
      border-radius: 0 0 24px 24px;
    }
    .form-group {
      margin-bottom: 18px;
    }
    .form-group label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
      font-size: 0.8rem;
      color: #334155;
    }
    .form-control {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #cbd5e0;
      border-radius: 12px;
      font-size: 0.85rem;
    }
    .sigla-select {
      width: 100%;
      padding: 6px 10px;
      font-size: 0.8rem;
      border-radius: 10px;
      border: 1px solid #cbd5e0;
      background: white;
    }
    .warning-badge {
      background: #fef3c7;
      color: #92400e;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.7rem;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-top: 6px;
    }
    .info-badge {
      background: #e0f2fe;
      color: #0369a1;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.7rem;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    hr {
      margin: 15px 0;
      border-color: #e2e8f0;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header-bar">
    <div class="logo"><img src="/images/kastle-logo.png" alt="Kastle" style="height: 40px;"></div>
    <div style="display: flex; gap: 10px; align-items: center;">
      <span id="loginInfo" class="login-info"></span>
      <button class="btn btn-secondary" onclick="window.location.href='MenuPrincipale.html'">🏠 Menu</button>
      <button class="btn btn-secondary" onclick="logout()">🚪 Logout</button>
      <button class="btn btn-secondary" onclick="caricaOggetti()">🔄 Ricarica</button>
    </div>
  </div>

  <h2>📦 Assegnazioni e Rientri</h2>
  <div id="messageArea"></div>

  <div class="source-selector">
    <div class="source-option">
      <input type="radio" name="source" id="sourceMagazzino" value="magazzino">
      <label for="sourceMagazzino">🏭 Dal magazzino</label>
    </div>
    <div class="source-option">
      <input type="radio" name="source" id="sourceCarico" value="carico" checked>
      <label for="sourceCarico">📦 In carico (da redistribuire)</label>
    </div>
  </div>

  <div id="adminSourceSection" style="display: none;" class="source-selection">
    <div class="form-group">
      <label>Sorgente</label>
      <select id="sourceTipo" disabled>
        <option value="PROMOTER">👤 Promoter</option>
        <option value="NEGOZIO">🏪 Negozio</option>
        <option value="CLIENTE">👥 Cliente</option>
        <option value="AGENTE">🤝 Agente</option>
      </select>
    </div>
    <div class="form-group">
      <label>Seleziona soggetto</label>
      <select id="sourceId" disabled><option value="">Seleziona...</option></select>
    </div>
    <div class="form-group">
      <label><input type="checkbox" id="includeReferenced"> Includi referenti</label>
    </div>
  </div>

  <div class="filters">
    <div class="filter-row">
      <div class="filter-group" id="magazzinoGroup">
        <label id="magazzinoLabel">Magazzino *</label>
        <select id="magazzino"></select>
      </div>
      <div class="filter-group"><label>Tipo oggetto</label><select id="tipoOggetto"><option value="">Tutti</option><option value="ARTICOLO">📦 Articolo</option><option value="KIT">🔧 Kit</option></select></div>
      <div class="filter-group"><label>Settore</label><select id="settore"></select></div>
      <div class="filter-group"><label>Marca</label><select id="marca"></select></div>
    </div>
    <div class="filter-row">
      <div class="filter-group"><label>Descrizione</label><input type="text" id="filtroDescrizione" list="descrizioneList" placeholder="Contiene..."><datalist id="descrizioneList"></datalist></div>
      <div class="filter-group"><label>Lunghezza</label><input type="text" id="filtroLunghezza" list="lunghezzaList" placeholder="Esatta"><datalist id="lunghezzaList"></datalist></div>
      <div class="filter-group"><label>Durezza</label><input type="text" id="filtroDurezza" list="durezzaList" placeholder="Esatta"><datalist id="durezzaList"></datalist></div>
      <div class="filter-group"><label>Sigla</label><input type="text" id="filtroSigla" list="siglaList" placeholder="Esatta"><datalist id="siglaList"></datalist></div>
    </div>
    <div class="filter-row">
      <button class="btn" onclick="applicaFiltri()">🔍 Filtra</button>
      <button class="btn btn-secondary" onclick="resetFiltri()">🔄 Reset</button>
    </div>
  </div>

  <div class="table-wrapper">
    <table id="tabellaOggetti">
      <thead>
         <th style="width:30px"><input type="checkbox" id="selectAll"></th>
         <th>Codice / Descrizione</th>
         <th>Disponibile</th>
         <th>Quantità</th>
         <th>Sigla</th>
         <th>Assegnato a</th>
         <th style="width:80px">Azioni</th>
      </thead>
      <tbody id="tabellaBody"><td colspan="7" class="text-center">Caricamento...<\/td></tbody>
    </table>
  </div>

  <div class="selected-info" id="selectedInfo">Nessun oggetto selezionato</div>

  <div class="filter-row" id="destinazioneRow">
    <div class="filter-group">
      <label>Destinazione (batch)</label>
      <div class="inline-refresh">
        <select id="destinazioneTipo" onchange="caricaDestinazioni()">
          <option value="PROMOTER">👤 Promoter</option>
          <option value="NEGOZIO">🏪 Negozio</option>
          <option value="CLIENTE">👥 Cliente</option>
          <option value="AGENTE">🤝 Agente</option>
        </select>
        <button class="btn btn-secondary" style="padding: 4px 8px;" onclick="caricaDestinazioni()" title="Aggiorna">🔄</button>
      </div>
    </div>
    <div class="filter-group"><label>Seleziona destinazione</label><select id="destinazioneId"></select></div>
    <div class="filter-group"><label>Note</label><input type="text" id="noteUscita" placeholder="Note (opzionale)"></div>
  </div>

  <div class="action-buttons">
    <button class="btn btn-success" id="assegnaBtn" onclick="assegnaSelezionati()">📤 Assegna selezionati</button>
    <button class="btn btn-warning" id="rientroBtn" onclick="rientraSelezionati()" style="display: none;">📦 Rientra in magazzino</button>
  </div>
</div>

<!-- MODALE MODIFICA SINGOLA (migliorato graficamente) -->
<div id="editAssignmentModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3>✏️ Modifica Assegnazione</h3>
      <button class="btn btn-secondary btn-sm" onclick="chiudiEditModal()" style="background: none; color: #6c757d; font-size: 1.5rem; padding: 0;">&times;</button>
    </div>
    <div class="modal-body" id="editAssignmentContent"></div>
    <div class="modal-footer">
      <button class="btn btn-success" id="saveEditBtn">💾 Salva modifiche</button>
      <button class="btn btn-secondary" onclick="chiudiEditModal()">Annulla</button>
    </div>
  </div>
</div>

<div id="errorModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3>⚠️ Errore</h3>
      <button class="btn btn-secondary btn-sm" onclick="chiudiErrorModal()" style="background: none; color: #6c757d; font-size: 1.5rem; padding: 0;">&times;</button>
    </div>
    <div class="modal-body">
      <p id="errorMsg"></p>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="chiudiErrorModal()">Chiudi</button>
    </div>
  </div>
</div>

<script>
  // ========== UTILITY ==========
  function getAuthHeader() { const token = localStorage.getItem('token'); return token ? { 'Authorization': 'Bearer ' + token } : {}; }
  async function apiFetch(endpoint, options = {}) {
    const headers = { 'Content-Type': 'application/json', ...getAuthHeader(), ...options.headers };
    const res = await fetch(endpoint, { ...options, headers });
    if (!res.ok) { let err = `Errore ${res.status}`; try { const data = await res.json(); err = data.message || err; } catch(e) {} throw new Error(err); }
    return res.json();
  }
  function showMessage(msg, type) { const div = document.getElementById('messageArea'); div.innerHTML = `<div class="message ${type}">${msg}</div>`; setTimeout(() => div.innerHTML = '', 5000); }
  function showErrorModal(msg) { document.getElementById('errorMsg').innerHTML = msg.replace(/\n/g, '<br>'); document.getElementById('errorModal').style.display = 'flex'; }
  function chiudiErrorModal() { document.getElementById('errorModal').style.display = 'none'; }

  let currentUser = null;
  let magazzini = [], settori = [], marche = [];
  let oggetti = [];
  let magazzinoKey = 'id';
  let currentEditObj = null;

  const radioMagazzino = document.getElementById('sourceMagazzino');
  const radioCarico = document.getElementById('sourceCarico');
  const magazzinoSelect = document.getElementById('magazzino');
  const magazzinoLabel = document.getElementById('magazzinoLabel');
  const tipoOggettoSelect = document.getElementById('tipoOggetto');
  const settoreSelect = document.getElementById('settore');
  const marcaSelect = document.getElementById('marca');
  const filtroDescrizione = document.getElementById('filtroDescrizione');
  const filtroLunghezza = document.getElementById('filtroLunghezza');
  const filtroDurezza = document.getElementById('filtroDurezza');
  const filtroSigla = document.getElementById('filtroSigla');
  const destinazioneTipo = document.getElementById('destinazioneTipo');
  const destinazioneId = document.getElementById('destinazioneId');
  const assegnaBtn = document.getElementById('assegnaBtn');
  const rientroBtn = document.getElementById('rientroBtn');
  const adminSourceSection = document.getElementById('adminSourceSection');
  const sourceTipo = document.getElementById('sourceTipo');
  const sourceId = document.getElementById('sourceId');
  const includeReferenced = document.getElementById('includeReferenced');

  // ========== VERIFICA SE UNA SIGLA È GIÀ ASSEGNATA (a qualsiasi soggetto escluso l'attuale) ==========
  async function verificaSiglaAssegnata(oggettoId, tipoOggetto, siglaId, excludeSubjectTipo = null, excludeSubjectId = null) {
    if (!siglaId) return null; // nessuna sigla, nessun problema
    try {
      // Chiamata a un ipotetico endpoint /api/assegnazioni/verifica-sigla
      // Se non esiste, puoi implementarlo lato backend.
      // Simuliamo per ora: cerchiamo in carico_sintesi via API generica? Meglio implementare un endpoint specifico.
      // Per ora assumiamo che il backend abbia una rotta GET /api/assegnazioni/verifica-sigla
      const params = new URLSearchParams();
      params.append('tipo_oggetto', tipoOggetto);
      params.append('oggetto_id', oggettoId);
      params.append('sigla_id', siglaId);
      if (excludeSubjectTipo && excludeSubjectId) {
        params.append('escludi_tipo', excludeSubjectTipo);
        params.append('escludi_id', excludeSubjectId);
      }
      const res = await apiFetch(`/api/assegnazioni/verifica-sigla?${params.toString()}`);
      return res.success ? res.assegnato_a : null; // restituisce { tipo, id, nome } o null
    } catch(e) {
      console.warn('Verifica sigla fallita:', e);
      return null;
    }
  }

  // ========== CARICAMENTO ANAGRAFICHE ==========
  async function caricaAnagrafiche() {
    try {
      magazzini = await apiFetch('/api/anagrafiche/magazzini');
      settori = await apiFetch('/api/anagrafiche/settori');
      marche = await apiFetch('/api/anagrafiche/marche');
      if (magazzini.length) {
        const first = magazzini[0];
        if (first.hasOwnProperty('magazzino_id')) magazzinoKey = 'magazzino_id';
        else if (first.hasOwnProperty('id')) magazzinoKey = 'id';
        else magazzinoKey = Object.keys(first).find(k => !isNaN(parseInt(k))) || 'id';
      }
      function popolaSelect(select, items, valueKey, textKey, conVuoto = true) {
        if (!select) return;
        select.innerHTML = '';
        if (conVuoto) select.appendChild(new Option('Tutti', ''));
        items.forEach(i => select.appendChild(new Option(i[textKey], i[valueKey])));
      }
      popolaSelect(magazzinoSelect, magazzini, magazzinoKey, 'nome', false);
      popolaSelect(settoreSelect, settori, 'settore_id', 'nome', true);
      popolaSelect(marcaSelect, marche, 'marca_id', 'nome', true);
      const defaultMag = magazzini.find(m => m.nome.toLowerCase() === 'race');
      if (defaultMag) magazzinoSelect.value = defaultMag[magazzinoKey];
    } catch(err) { console.error(err); showMessage('Errore caricamento dati', 'error'); }
  }

  async function caricaSorgentiAdmin() {
    const tipo = sourceTipo.value;
    try {
      const data = await apiFetch(`/api/soggetti/tipo/${tipo}`);
      sourceId.innerHTML = '<option value="">Seleziona...</option>';
      data.forEach(item => {
        let testo = tipo === 'PROMOTER' ? `${item.nome} ${item.cognome || ''}`.trim() : item.nome;
        sourceId.appendChild(new Option(testo, item.id));
      });
      if (sourceId.options.length > 1 && !sourceId.value) sourceId.selectedIndex = 1;
      if (radioCarico.checked) await caricaOggettiInCarico();
    } catch(err) { showMessage('Errore sorgenti', 'error'); }
  }

  async function caricaDestinazioni() {
    const tipo = destinazioneTipo.value;
    try {
      const data = await apiFetch(`/api/soggetti/tipo/${tipo}`);
      destinazioneId.innerHTML = '<option value="">Seleziona...</option>';
      data.forEach(item => {
        let testo = tipo === 'PROMOTER' ? `${item.nome} ${item.cognome || ''}`.trim() : item.nome;
        destinazioneId.appendChild(new Option(testo, item.id));
      });
      if (destinazioneId.options.length > 1 && !destinazioneId.value) destinazioneId.selectedIndex = 1;
    } catch(err) { showMessage('Errore destinazioni', 'error'); }
  }

  async function getSiglePerOggetto(obj) {
    if (obj.tipo === 'ARTICOLO') {
      try { return await apiFetch(`/api/articoli/${obj.id}/sigle`); } catch(e) { return []; }
    } else if (obj.tipo === 'KIT') {
      try {
        const kit = await apiFetch(`/api/kit/${obj.id}`);
        const sciDetail = kit.dettagli?.find(d => d.tipo_articolo === 'SCI');
        if (sciDetail && sciDetail.sigla_id) return await apiFetch(`/api/articoli/${sciDetail.articolo_id}/sigle`);
        return [];
      } catch(e) { return []; }
    }
    return [];
  }

  async function caricaOggettiDaMagazzino() {
    const magId = magazzinoSelect.value;
    if (!magId) { oggetti = []; popolaTabella(); showMessage('Seleziona un magazzino', 'info'); return; }
    const tipo = tipoOggettoSelect.value;
    let lista = [];
    try {
      const paramsArticoli = new URLSearchParams();
      paramsArticoli.append('magazzino', magId);
      if (settoreSelect.value) paramsArticoli.append('settore', settoreSelect.value);
      if (marcaSelect.value) paramsArticoli.append('marca', marcaSelect.value);
      if (filtroDescrizione.value) paramsArticoli.append('descrizione', filtroDescrizione.value);
      if (filtroLunghezza.value) paramsArticoli.append('lunghezza', filtroLunghezza.value);
      if (filtroDurezza.value) paramsArticoli.append('durezza', filtroDurezza.value);
      if (filtroSigla.value) paramsArticoli.append('sigla', filtroSigla.value);
      paramsArticoli.append('min_giacenza', '1');

      if (tipo === '' || tipo === 'ARTICOLO') {
        const res = await apiFetch(`/api/articoli?${paramsArticoli.toString()}`);
        let articoli = res.success ? res.data : (res.data || []);
        for (let a of articoli) a.sigleDisponibili = await getSiglePerOggetto({ tipo: 'ARTICOLO', id: a.id });
        lista.push(...articoli.map(a => ({ ...a, tipo: 'ARTICOLO', tipoAssegnazione: 'me', destinatarioNome: 'Magazzino' })));
      }
      if (tipo === '' || tipo === 'KIT') {
        const res = await apiFetch('/api/kit');
        let kits = res.success ? res.data : (Array.isArray(res) ? res : []);
        kits = kits.filter(k => k.magazzino == magId);
        for (let k of kits) k.sigleDisponibili = await getSiglePerOggetto({ tipo: 'KIT', id: k.id });
        lista.push(...kits.map(k => ({ ...k, tipo: 'KIT', tipoAssegnazione: 'me', destinatarioNome: 'Magazzino' })));
      }
      oggetti = lista.map(item => ({
        id: item.id,
        tipo: item.tipo,
        codice: item.tipo === 'ARTICOLO' ? item.codice : item.codice_kit,
        descrizione: item.descrizione,
        disponibile: item.tipo === 'ARTICOLO' ? (item.quantita_totale - item.quantita_in_kit) : item.quantita,
        sigleDisponibili: item.sigleDisponibili || [],
        siglaId: null,
        destinatarioNome: 'Magazzino',
        tipoAssegnazione: 'me'
      }));
      popolaTabella();
      assegnaBtn.disabled = false;
    } catch(err) { showMessage('Errore caricamento', 'error'); }
  }

  async function caricaOggettiInCarico() {
    const body = {};
    if (currentUser.ruolo === 'admin' && sourceId.value) {
      body.targetTipo = sourceTipo.value;
      body.targetId = parseInt(sourceId.value);
      body.includeReferenced = includeReferenced.checked;
    } else if (currentUser.ruolo !== 'admin') {
      if (!currentUser.riferimento_id) { oggetti = []; popolaTabella(); return; }
      body.targetTipo = currentUser.ruolo.toUpperCase();
      body.targetId = currentUser.riferimento_id;
      body.includeReferenced = includeReferenced.checked;
    } else { oggetti = []; popolaTabella(); return; }
    if (!body.targetTipo || !body.targetId) { oggetti = []; popolaTabella(); return; }
    try {
      const res = await apiFetch('/api/assegnazioni/oggetti', { method: 'POST', body: JSON.stringify(body) });
      if (res.success) {
        let tutti = res.oggetti || [];
        const tipoFiltro = tipoOggettoSelect.value;
        if (tipoFiltro) tutti = tutti.filter(item => item.tipo === tipoFiltro);
        if (settoreSelect.value) tutti = tutti.filter(o => o.SETTORE == settoreSelect.value);
        if (marcaSelect.value) tutti = tutti.filter(o => o.MARCA == marcaSelect.value);
        if (filtroDescrizione.value) tutti = tutti.filter(o => o.descrizione?.toLowerCase().includes(filtroDescrizione.value.toLowerCase()));
        if (filtroLunghezza.value) tutti = tutti.filter(o => o.LUNGHEZZA == filtroLunghezza.value);
        if (filtroDurezza.value) tutti = tutti.filter(o => o.DUREZZA == filtroDurezza.value);
        if (filtroSigla.value) tutti = tutti.filter(o => o.SIGLA_CORRENTE == filtroSigla.value);
        for (let obj of tutti) {
          if (obj.tipo === 'KIT') obj.sigleDisponibili = await getSiglePerOggetto({ tipo: 'KIT', id: obj.ID });
          else obj.sigleDisponibili = await getSiglePerOggetto({ tipo: 'ARTICOLO', id: obj.ID });
        }
        oggetti = tutti.map(obj => ({
          id: obj.ID,
          tipo: obj.tipo,
          codice: obj.codice,
          descrizione: obj.descrizione,
          disponibile: obj.quantita,
          sigleDisponibili: obj.sigleDisponibili || [],
          siglaId: obj.siglaId || null,
          destinatarioNome: obj.destinatarioNome || (obj.destinazioneTipo === 'PROMOTER' ? `${obj.destinatario_nome||''} ${obj.destinatario_cognome||''}`.trim() : (obj.destinatario_nome||'Magazzino')),
          tipoAssegnazione: obj.tipoAssegnazione,
          destinazioneTipo: obj.destinazioneTipo,
          destinazioneId: obj.destinazioneId
        }));
        popolaTabella();
        assegnaBtn.disabled = false;
      } else throw new Error(res.message);
    } catch(err) { showMessage('Errore caricamento', 'error'); }
  }

  function popolaTabella() {
    const tbody = document.getElementById('tabellaBody');
    if (!oggetti.length) { tbody.innerHTML = '<td colspan="7" class="text-center">Nessun oggetto disponibile<\/td>'; return; }
    tbody.innerHTML = '';
    oggetti.forEach((obj, idx) => {
      const row = tbody.insertRow();
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.className = 'select-item';
      cb.dataset.idx = idx;
      const isReferenced = obj.tipoAssegnazione === 'referente';
      const isDisabled = obj.disponibile <= 0 || isReferenced;
      if (isDisabled) cb.disabled = true;
      row.insertCell(0).appendChild(cb);
      row.insertCell(1).innerText = `${obj.codice || ''} - ${obj.descrizione || ''}`;
      row.insertCell(2).innerText = obj.disponibile;
      const qtaInput = document.createElement('input');
      qtaInput.type = 'number'; qtaInput.min = 1; qtaInput.max = obj.disponibile; qtaInput.value = 1; qtaInput.style.width = '70px';
      if (isDisabled) qtaInput.disabled = true;
      row.insertCell(3).appendChild(qtaInput);
      const cellSigla = row.insertCell(4);
      if (obj.sigleDisponibili && obj.sigleDisponibili.length > 0) {
        const select = document.createElement('select');
        select.className = 'sigla-select';
        select.innerHTML = '<option value="">Nessuna sigla</option>';
        obj.sigleDisponibili.forEach(s => {
          const opt = document.createElement('option');
          opt.value = s.id;
          opt.text = s.sigla + (s.durezza ? ` (${s.durezza})` : '') + (s.lunghezza ? ` - ${s.lunghezza}cm` : '');
          if (obj.siglaId && obj.siglaId == s.id) opt.selected = true;
          select.appendChild(opt);
        });
        if (obj.sigleDisponibili.length === 1) {
          select.value = obj.sigleDisponibili[0].id;
          select.disabled = true;
        }
        select.addEventListener('change', async (e) => {
          const newSiglaId = e.target.value ? parseInt(e.target.value) : null;
          obj.selectedSiglaId = newSiglaId;
          // Verifica se la sigla è già assegnata (solo se non siamo in modalità magazzino e l'oggetto è già assegnato a un soggetto)
          if (!radioMagazzino.checked && obj.destinatarioNome !== 'Magazzino' && newSiglaId) {
            const assegnatoA = await verificaSiglaAssegnata(obj.id, obj.tipo, newSiglaId, obj.destinazioneTipo, obj.destinazioneId);
            if (assegnatoA) {
              showMessage(`⚠️ Attenzione: la sigla selezionata è già assegnata a ${assegnatoA.nome}. L'assegnazione potrebbe causare conflitti.`, 'error');
            }
          }
        });
        cellSigla.appendChild(select);
      } else {
        cellSigla.innerText = '-';
        obj.selectedSiglaId = null;
      }
      let assegnatoANome = obj.destinatarioNome;
      if (isReferenced && obj.referenteDa) assegnatoANome = `${obj.destinatarioNome} (referente)`;
      else if (!assegnatoANome) assegnatoANome = 'Magazzino';
      row.insertCell(5).innerText = assegnatoANome;
      const cellAzioni = row.insertCell(6);
      const editBtn = document.createElement('button');
      editBtn.textContent = '✏️';
      editBtn.className = 'btn btn-secondary btn-sm';
      editBtn.onclick = () => apriModificaSingola(idx);
      if (isDisabled || obj.tipoAssegnazione === 'referente') editBtn.disabled = true;
      cellAzioni.appendChild(editBtn);
    });
    document.getElementById('selectAll').onclick = () => toggleSelectAll();
    aggiornaSelezione();
  }

  function toggleSelectAll() {
    const all = document.getElementById('selectAll');
    document.querySelectorAll('.select-item').forEach(cb => { if (!cb.disabled) cb.checked = all.checked; });
    aggiornaSelezione();
  }
  function aggiornaSelezione() {
    let count = 0, total = 0;
    document.querySelectorAll('#tabellaBody tr').forEach(row => {
      const cb = row.querySelector('.select-item');
      if (cb && cb.checked && !cb.disabled) {
        const qta = parseInt(row.querySelector('input[type="number"]').value) || 1;
        count++; total += qta;
      }
    });
    document.getElementById('selectedInfo').innerText = count ? `Selezionati: ${count} oggetti, totale pezzi: ${total}` : 'Nessun oggetto selezionato';
  }

  // ========== MODIFICA SINGOLA (migliorata con verifica sigla) ==========
  async function apriModificaSingola(idx) {
    const obj = oggetti[idx];
    currentEditObj = { ...obj, idx, selectedSiglaId: obj.selectedSiglaId || obj.siglaId || null };
    const modalBody = document.getElementById('editAssignmentContent');
    let siglaOptions = '<option value="">Nessuna sigla</option>';
    if (obj.sigleDisponibili && obj.sigleDisponibili.length) {
      obj.sigleDisponibili.forEach(s => {
        siglaOptions += `<option value="${s.id}" ${currentEditObj.selectedSiglaId == s.id ? 'selected' : ''}>${s.sigla}${s.durezza ? ` (${s.durezza})` : ''}${s.lunghezza ? ` - ${s.lunghezza}cm` : ''}</option>`;
      });
    } else {
      siglaOptions = '<option value="">Nessuna sigla disponibile</option>';
    }
    modalBody.innerHTML = `
      <div class="form-group">
        <label>📦 Oggetto</label>
        <input type="text" value="${escapeHtml(obj.codice)} - ${escapeHtml(obj.descrizione)}" disabled class="form-control">
      </div>
      <div class="form-group">
        <label>📊 Quantità disponibile</label>
        <input type="number" value="${obj.disponibile}" disabled class="form-control">
      </div>
      <div class="form-group">
        <label>🔢 Quantità da trasferire/rientrare</label>
        <input type="number" id="editQta" min="1" max="${obj.disponibile}" value="1" class="form-control">
      </div>
      <div class="form-group">
        <label>🏷️ Sigla</label>
        <select id="editSiglaId" class="form-control">${siglaOptions}</select>
        <div id="siglaWarning" class="warning-badge" style="display: none;">⚠️</div>
      </div>
      <div class="form-group">
        <label>🎯 Nuova destinazione (solo se trasferisci)</label>
        <div class="inline-refresh">
          <select id="editDestTipo" class="form-control" style="flex:1;">
            <option value="PROMOTER">Promoter</option>
            <option value="NEGOZIO">Negozio</option>
            <option value="CLIENTE">Cliente</option>
            <option value="AGENTE">Agente</option>
          </select>
          <button class="btn btn-secondary" onclick="caricaEditDestinazioni()">🔄</button>
        </div>
        <select id="editDestId" class="form-control" style="margin-top:8px;"></select>
      </div>
      <div class="form-group">
        <label>📝 Note</label>
        <input type="text" id="editNote" class="form-control" placeholder="Note opzionali">
      </div>
    `;
    await caricaEditDestinazioni();
    const siglaSelect = document.getElementById('editSiglaId');
    siglaSelect.addEventListener('change', async () => {
      const newSiglaId = siglaSelect.value ? parseInt(siglaSelect.value) : null;
      const warningDiv = document.getElementById('siglaWarning');
      if (!radioMagazzino.checked && obj.destinatarioNome !== 'Magazzino' && newSiglaId) {
        const assegnatoA = await verificaSiglaAssegnata(obj.id, obj.tipo, newSiglaId, obj.destinazioneTipo, obj.destinazioneId);
        if (assegnatoA) {
          warningDiv.style.display = 'flex';
          warningDiv.innerHTML = `⚠️ Questa sigla è già assegnata a <strong>${assegnatoA.nome}</strong>. La modifica potrebbe causare conflitti.`;
        } else {
          warningDiv.style.display = 'none';
        }
      } else {
        warningDiv.style.display = 'none';
      }
    });
    document.getElementById('editAssignmentModal').style.display = 'flex';
    document.getElementById('saveEditBtn').onclick = () => salvaModificaSingola();
  }
  function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }
  async function caricaEditDestinazioni() {
    const tipo = document.getElementById('editDestTipo').value;
    try {
      const data = await apiFetch(`/api/soggetti/tipo/${tipo}`);
      const destSelect = document.getElementById('editDestId');
      destSelect.innerHTML = '<option value="">Seleziona...</option>';
      data.forEach(item => destSelect.appendChild(new Option(item.nome, item.id)));
    } catch(err) { showMessage('Errore destinazioni', 'error'); }
  }
  async function salvaModificaSingola() {
    const obj = currentEditObj;
    if (!obj) return;
    const qta = parseInt(document.getElementById('editQta').value);
    const siglaId = document.getElementById('editSiglaId').value;
    const destTipo = document.getElementById('editDestTipo').value;
    const destId = document.getElementById('editDestId').value;
    const note = document.getElementById('editNote').value;
    if (isNaN(qta) || qta < 1 || qta > obj.disponibile) { showErrorModal('Quantità non valida'); return; }
    const isInMagazzino = (obj.destinatarioNome === 'Magazzino' || !obj.destinatarioNome);
    const magazzinoId = magazzinoSelect.value;
    if (!magazzinoId) { showErrorModal('Seleziona un magazzino'); return; }
    if (isInMagazzino) {
      if (!destId) { showErrorModal('Seleziona una destinazione'); return; }
      const payload = { magazzinoId: parseInt(magazzinoId), destinazioneTipo: destTipo, destinazioneId: parseInt(destId), note, oggetti: [{ tipoOggetto: obj.tipo, oggettoId: obj.id, siglaId: siglaId ? parseInt(siglaId) : null, quantita: qta }] };
      try {
        const res = await apiFetch('/api/assegnazioni/uscita/batch', { method: 'POST', body: JSON.stringify(payload) });
        if (res.success) { showMessage('Assegnazione effettuata', 'success'); chiudiEditModal(); await caricaOggetti(); }
        else showErrorModal(res.message);
      } catch(err) { showErrorModal(err.message); }
    } else {
      if (!destId) { showErrorModal('Seleziona una destinazione'); return; }
      const daTipo = obj.destinazioneTipo || (currentUser.ruolo === 'admin' ? sourceTipo.value : currentUser.ruolo.toUpperCase());
      const daId = obj.destinazioneId || (currentUser.ruolo === 'admin' ? parseInt(sourceId.value) : currentUser.riferimento_id);
      const payload = { daTipo, daId, aTipo: destTipo, aId: parseInt(destId), magazzinoId: parseInt(magazzinoId), oggetti: [{ tipoOggetto: obj.tipo, oggettoId: obj.id, siglaId: siglaId ? parseInt(siglaId) : null, quantita: qta }], note };
      try {
        const res = await apiFetch('/api/assegnazioni/trasferimento', { method: 'POST', body: JSON.stringify(payload) });
        if (res.success) { showMessage('Trasferimento effettuato', 'success'); chiudiEditModal(); await caricaOggetti(); }
        else showErrorModal(res.message);
      } catch(err) { showErrorModal(err.message); }
    }
  }
  function chiudiEditModal() { document.getElementById('editAssignmentModal').style.display = 'none'; currentEditObj = null; }

  // ========== FILTRI ==========
  async function getDistinctFilterValues(field, exceptField = null) {
    const params = new URLSearchParams();
    if (magazzinoSelect.value) params.append('magazzino', magazzinoSelect.value);
    if (settoreSelect.value) params.append('settore', settoreSelect.value);
    if (marcaSelect.value) params.append('marca', marcaSelect.value);
    if (exceptField !== 'descrizione' && filtroDescrizione.value) params.append('descrizione', filtroDescrizione.value);
    if (exceptField !== 'lunghezza' && filtroLunghezza.value) params.append('lunghezza', filtroLunghezza.value);
    if (exceptField !== 'durezza' && filtroDurezza.value) params.append('durezza', filtroDurezza.value);
    if (exceptField !== 'sigla' && filtroSigla.value) params.append('sigla', filtroSigla.value);
    const data = await apiFetch(`/api/articoli/valori/${field}?${params.toString()}`);
    const map = { descrizioni: 'descrizione', sigle: 'sigla', lunghezze: 'lunghezza', durezze: 'durezza' };
    const col = map[field] || field;
    return data.map(item => item[col]).filter(v => v && v !== '');
  }
  async function popolaFilterDatalist(field, datalistId, exceptField = null) {
    try {
      const values = await getDistinctFilterValues(field, exceptField);
      const dl = document.getElementById(datalistId);
      if (dl) { dl.innerHTML = ''; values.forEach(v => { const opt = document.createElement('option'); opt.value = v; dl.appendChild(opt); }); }
    } catch(err) { console.error(err); }
  }
  async function refreshFilterDatalists() {
    if (!magazzinoSelect.value) return;
    await popolaFilterDatalist('descrizioni', 'descrizioneList', 'descrizione');
    await popolaFilterDatalist('sigle', 'siglaList', 'sigla');
    await popolaFilterDatalist('lunghezze', 'lunghezzaList', 'lunghezza');
    await popolaFilterDatalist('durezze', 'durezzaList', 'durezza');
  }

  let debounceTimer;
  async function handleFilterChange() {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(async () => { await refreshFilterDatalists(); await caricaOggetti(); }, 300);
  }
  function attachFilterEvents() {
    [filtroDescrizione, filtroLunghezza, filtroDurezza, filtroSigla].forEach(inp => inp?.addEventListener('input', handleFilterChange));
    [magazzinoSelect, settoreSelect, marcaSelect, tipoOggettoSelect].forEach(sel => sel?.addEventListener('change', handleFilterChange));
  }
  async function caricaOggetti() {
    if (radioMagazzino.checked) await caricaOggettiDaMagazzino();
    else await caricaOggettiInCarico();
  }
  async function applicaFiltri() { await refreshFilterDatalists(); await caricaOggetti(); }
  async function resetFiltri() {
    settoreSelect.value = ''; marcaSelect.value = ''; filtroDescrizione.value = ''; filtroLunghezza.value = ''; filtroDurezza.value = ''; filtroSigla.value = '';
    await refreshFilterDatalists(); await caricaOggetti();
  }

  // ========== BATCH OPERATIONS con verifica sigle ==========
  async function assegnaSelezionati() {
    const isCarico = radioCarico.checked;
    const magazzinoId = magazzinoSelect.value;
    const destTipo = destinazioneTipo.value;
    const destId = destinazioneId.value;
    const note = document.getElementById('noteUscita').value;
    if (isCarico) {
      if (!destId) { showMessage('Seleziona una destinazione', 'error'); return; }
      let daTipo, daId;
      if (currentUser.ruolo === 'admin' && sourceId.value) { daTipo = sourceTipo.value; daId = parseInt(sourceId.value); }
      else { if (!currentUser.riferimento_id) { showMessage('Utente non associato', 'error'); return; } daTipo = currentUser.ruolo.toUpperCase(); daId = parseInt(currentUser.riferimento_id); }
      const selezionati = [];
      const errors = [];
      for (let row of document.querySelectorAll('#tabellaBody tr')) {
        const cb = row.querySelector('.select-item');
        if (cb && cb.checked && !cb.disabled) {
          const idx = parseInt(cb.dataset.idx);
          const obj = oggetti[idx];
          if (obj.tipoAssegnazione === 'referente') continue;
          const qta = parseInt(row.querySelector('input[type="number"]').value) || 1;
          const selectSigla = row.querySelector('.sigla-select');
          const siglaId = selectSigla ? (selectSigla.value ? parseInt(selectSigla.value) : null) : (obj.selectedSiglaId || null);
          if (siglaId) {
            const assegnatoA = await verificaSiglaAssegnata(obj.id, obj.tipo, siglaId, daTipo, daId);
            if (assegnatoA) {
              errors.push(`La sigla "${selectSigla.options[selectSigla.selectedIndex]?.text}" dell'oggetto ${obj.codice} è già assegnata a ${assegnatoA.nome}`);
            }
          }
          selezionati.push({ tipoOggetto: obj.tipo, oggettoId: obj.id, siglaId, quantita: qta });
        }
      }
      if (errors.length) { showErrorModal(errors.join('<br>')); return; }
      if (!selezionati.length) { showMessage('Seleziona almeno un oggetto', 'error'); return; }
      const payload = { daTipo, daId, aTipo: destTipo, aId: parseInt(destId), magazzinoId: parseInt(magazzinoId), oggetti: selezionati, note };
      assegnaBtn.disabled = true; assegnaBtn.innerHTML = '<span class="spinner"></span>';
      try {
        const res = await apiFetch('/api/assegnazioni/trasferimento', { method: 'POST', body: JSON.stringify(payload) });
        showMessage(res.message, res.success ? 'success' : 'error');
        if (res.success) await caricaOggetti();
      } catch(err) { showErrorModal(err.message); }
      finally { assegnaBtn.disabled = false; assegnaBtn.innerHTML = '📤 Assegna selezionati'; }
      return;
    }
    if (!magazzinoId) { showMessage('Seleziona un magazzino', 'error'); return; }
    if (!destId) { showMessage('Seleziona una destinazione', 'error'); return; }
    const selezionati = [];
    const errors = [];
    for (let row of document.querySelectorAll('#tabellaBody tr')) {
      const cb = row.querySelector('.select-item');
      if (cb && cb.checked && !cb.disabled) {
        const idx = parseInt(cb.dataset.idx);
        const obj = oggetti[idx];
        let qta = parseInt(row.querySelector('input[type="number"]').value) || 1;
        const max = parseInt(row.querySelector('input[type="number"]').max);
        if (qta > max) qta = max;
        const selectSigla = row.querySelector('.sigla-select');
        const siglaId = selectSigla ? (selectSigla.value ? parseInt(selectSigla.value) : null) : (obj.selectedSiglaId || null);
        if (siglaId) {
          const assegnatoA = await verificaSiglaAssegnata(obj.id, obj.tipo, siglaId, null, null);
          if (assegnatoA) {
            errors.push(`La sigla "${selectSigla.options[selectSigla.selectedIndex]?.text}" dell'oggetto ${obj.codice} è già assegnata a ${assegnatoA.nome}`);
          }
        }
        selezionati.push({ tipoOggetto: obj.tipo, oggettoId: obj.id, siglaId, quantita: qta });
      }
    }
    if (errors.length) { showErrorModal(errors.join('<br>')); return; }
    if (!selezionati.length) { showMessage('Seleziona almeno un oggetto', 'error'); return; }
    const payload = { magazzinoId: parseInt(magazzinoId), destinazioneTipo: destTipo, destinazioneId: parseInt(destId), note, oggetti: selezionati };
    assegnaBtn.disabled = true; assegnaBtn.innerHTML = '<span class="spinner"></span>';
    try {
      const res = await apiFetch('/api/assegnazioni/uscita/batch', { method: 'POST', body: JSON.stringify(payload) });
      showMessage(res.message, res.success ? 'success' : 'error');
      if (res.success) await caricaOggetti();
    } catch(err) { showErrorModal(err.message); }
    finally { assegnaBtn.disabled = false; assegnaBtn.innerHTML = '📤 Assegna selezionati'; }
  }

  async function rientraSelezionati() {
    if (!radioCarico.checked) { showMessage('Funzione solo in modalità "In carico"', 'error'); return; }
    const magazzinoId = magazzinoSelect.value;
    if (!magazzinoId) { showMessage('Seleziona un magazzino', 'error'); return; }
    const note = document.getElementById('noteUscita').value;
    let daTipo, daId;
    if (currentUser.ruolo === 'admin' && sourceId.value) { daTipo = sourceTipo.value; daId = parseInt(sourceId.value); }
    else { if (!currentUser.riferimento_id) { showMessage('Utente non associato', 'error'); return; } daTipo = currentUser.ruolo.toUpperCase(); daId = parseInt(currentUser.riferimento_id); }
    const selezionati = [];
    for (let row of document.querySelectorAll('#tabellaBody tr')) {
      const cb = row.querySelector('.select-item');
      if (cb && cb.checked && !cb.disabled) {
        const idx = parseInt(cb.dataset.idx);
        const obj = oggetti[idx];
        const qta = parseInt(row.querySelector('input[type="number"]').value) || 1;
        const selectSigla = row.querySelector('.sigla-select');
        const siglaId = selectSigla ? (selectSigla.value ? parseInt(selectSigla.value) : null) : (obj.selectedSiglaId || null);
        selezionati.push({ tipoOggetto: obj.tipo, oggettoId: obj.id, siglaId, quantita: qta });
      }
    }
    if (!selezionati.length) { showMessage('Seleziona almeno un oggetto', 'error'); return; }
    const payload = { magazzinoId: parseInt(magazzinoId), note, oggetti: selezionati.map(o => ({ ...o, daTipo, daId })) };
    rientroBtn.disabled = true; rientroBtn.innerHTML = '<span class="spinner"></span>';
    try {
      const res = await apiFetch('/api/assegnazioni/rientro/batch', { method: 'POST', body: JSON.stringify(payload) });
      showMessage(res.message, res.success ? 'success' : 'error');
      if (res.success) await caricaOggetti();
    } catch(err) { showErrorModal(err.message); }
    finally { rientroBtn.disabled = false; rientroBtn.innerHTML = '📦 Rientra in magazzino'; }
  }

  function logout() { localStorage.removeItem('token'); localStorage.removeItem('user'); window.location.href = 'Login.html'; }

  function setupExternalMode() {
    const isAdmin = currentUser.ruolo === 'admin';
    const canUseWarehouse = isAdmin || (currentUser.ruolo === 'promoter' && currentUser.livello === 1) || currentUser.ruolo === 'agente';
    if (canUseWarehouse) radioMagazzino.disabled = false;
    else { radioMagazzino.disabled = true; radioMagazzino.checked = false; radioCarico.checked = true; showMessage('Ruolo non permette prelievo dal magazzino', 'info'); }
    if (isAdmin) {
      adminSourceSection.style.display = 'flex';
      sourceTipo.disabled = false; sourceId.disabled = false; includeReferenced.disabled = false;
      caricaSorgentiAdmin();
      sourceTipo.addEventListener('change', () => { if (radioCarico.checked) caricaSorgentiAdmin(); });
      sourceId.addEventListener('change', () => { if (radioCarico.checked) caricaOggettiInCarico(); });
      includeReferenced.addEventListener('change', () => { if (radioCarico.checked) caricaOggettiInCarico(); });
    }
    function updateUIBasedOnMode() {
      if (radioMagazzino.checked) {
        magazzinoLabel.innerText = 'Magazzino *';
        destinazioneRow.style.display = 'flex';
        assegnaBtn.style.display = 'inline-block';
        rientroBtn.style.display = 'none';
        assegnaBtn.innerText = '📤 Assegna selezionati';
      } else {
        magazzinoLabel.innerText = 'Magazzino di rientro *';
        destinazioneRow.style.display = 'flex';
        assegnaBtn.style.display = 'inline-block';
        rientroBtn.style.display = 'inline-block';
        assegnaBtn.innerText = '🔄 Trasferisci selezionati';
      }
    }
    radioMagazzino.addEventListener('change', () => { updateUIBasedOnMode(); caricaOggetti(); });
    radioCarico.addEventListener('change', () => { updateUIBasedOnMode(); caricaOggetti(); });
    updateUIBasedOnMode();
  }

  window.onload = async () => {
    const token = localStorage.getItem('token');
    const userStr = localStorage.getItem('user');
    if (!token || !userStr) { window.location.href = 'Login.html'; return; }
    try {
      currentUser = JSON.parse(userStr);
      if (!currentUser.riferimento_id && currentUser.RiferimentoID) { currentUser.riferimento_id = parseInt(currentUser.RiferimentoID); localStorage.setItem('user', JSON.stringify(currentUser)); }
    } catch(e) { localStorage.removeItem('token'); localStorage.removeItem('user'); window.location.href = 'Login.html'; return; }
    document.getElementById('loginInfo').innerHTML = `👤 ${currentUser.nome_visualizzato || currentUser.username} (${currentUser.ruolo})`;
    await caricaAnagrafiche();
    await caricaDestinazioni();
    attachFilterEvents();
    setupExternalMode();
    await refreshFilterDatalists();
    await caricaOggetti();
  };
</script>
</body>
</html>
