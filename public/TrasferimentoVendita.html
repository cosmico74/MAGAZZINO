<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Trasferimento / Vendita</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    .form-group { margin-bottom: 15px; }
    label { display: block; font-weight: bold; margin-bottom: 5px; }
    select, input, textarea { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
    .btn { padding: 8px 16px; background: #1a73e8; color: white; border: none; border-radius: 4px; cursor: pointer; }
  </style>
  <script>
    // ========== LIBRERIA COMUNE ==========
    (function() { /* common.js */ })();

    let magazzini = [], soggetti = [];

    window.onload = function() {
      if (!window.restoreSession()) {
        document.body.innerHTML = '<div style="padding:20px;text-align:center">Devi effettuare il login. <a href="?login">Login</a></div>';
        return;
      }
      caricaDati();
    };

    function caricaDati() {
      callServer('getMagazzini', {}, function(data) {
        magazzini = data;
        const select = document.getElementById('magazzino');
        select.innerHTML = '<option value="">Seleziona magazzino</option>';
        magazzini.forEach(m => select.innerHTML += `<option value="${m.ID}">${m.NOME}</option>`);
      });
      callServer('getAllSoggetti', {}, function(data) {
        soggetti = data;
        const select = document.getElementById('destinatario');
        select.innerHTML = '<option value="">Seleziona destinatario</option>';
        soggetti.forEach(s => select.innerHTML += `<option value="${s.TIPO}_${s.ID}">${s.NOME} (${s.TIPO})</option>`);
      });
    }

    function trasferisci() {
      const tipoOperazione = document.getElementById('tipoOperazione').value;
      const magazzinoId = document.getElementById('magazzino').value;
      const destinatarioVal = document.getElementById('destinatario').value;
      const note = document.getElementById('note').value;
      if (!magazzinoId || !destinatarioVal) {
        showMessage('Seleziona magazzino e destinatario', 'error');
        return;
      }
      const [destinazioneTipo, destinazioneId] = destinatarioVal.split('_');
      // In una versione completa, qui ci sarebbe la selezione degli oggetti
      showMessage('Funzionalità in sviluppo. Usa la gestione movimenti.', 'warning');
    }
  </script>
</head>
<body>
  <h2>🔄 Trasferimento / Vendita</h2>
  <div class="form-group">
    <label>Tipo operazione</label>
    <select id="tipoOperazione">
      <option value="trasferimento">Trasferimento a soggetto</option>
      <option value="vendita">Vendita diretta</option>
    </select>
  </div>
  <div class="form-group">
    <label>Magazzino di origine</label>
    <select id="magazzino"></select>
  </div>
  <div class="form-group">
    <label>Destinatario</label>
    <select id="destinatario"></select>
  </div>
  <div class="form-group">
    <label>Note</label>
    <textarea id="note" rows="2"></textarea>
  </div>
  <button class="btn" onclick="trasferisci()">📤 Conferma trasferimento</button>
  <!-- Qui andrebbe una tabella per selezionare articoli/kit -->
</body>
</html>
