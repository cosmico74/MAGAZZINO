<!DOCTYPE html>
<html lang="it">
<head>
  <link rel="icon" type="image/png" href="/images/kastle-logo.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔧 Gestione Kit Assegnati</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px;
      height: 100%;
      overflow: hidden;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      padding: 20px;
      height: 100%;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }
    .header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 10px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo img {
      height: 40px;
    }
    h2 {
      margin: 0;
      font-size: 1.5rem;
      border-left: 5px solid #1a73e8;
      padding-left: 12px;
      color: #1e2a3a;
    }
    .menu-btn {
      background: #6c757d;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      color: white;
      font-size: 0.8rem;
    }
    .card {
      background: #f8f9fa;
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 20px;
    }
    .card h3 {
      margin-top: 0;
      margin-bottom: 15px;
      color: #1e2a3a;
      border-left: 4px solid #1a73e8;
      padding-left: 10px;
    }
    .form-row-3col {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      margin-bottom: 15px;
    }
    .form-group {
      margin-bottom: 15px;
    }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 5px;
      color: #2c3e50;
      font-size: 0.8rem;
    }
    select, input, textarea {
      width: 100%;
      padding: 8px;
      border: 1px solid #cbd5e0;
      border-radius: 6px;
      font-size: 0.85rem;
    }
    .btn {
      background: #1a73e8;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      margin-right: 10px;
    }
    .btn-danger {
      background: #dc3545;
    }
    .btn-danger:hover {
      background: #bb2d3b;
    }
    .btn:hover {
      background: #0f5bb5;
    }
    .message {
      padding: 10px;
      margin-bottom: 15px;
      border-radius: 6px;
      font-size: 0.85rem;
    }
    .success {
      background: #d4edda;
      color: #155724;
    }
    .error {
      background: #f8d7da;
      color: #721c24;
    }
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #e2e8f0;
      border-top-color: #1a73e8;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 4px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .info-note {
      font-size: 0.7rem;
      color: #6c757d;
      margin-top: 5px;
    }
    hr {
      margin: 20px 0;
      border: none;
      border-top: 1px solid #dee2e6;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header-bar">
    <div class="logo">
      <img src="/images/kastle-logo.png" alt="Kastle">
      <h2>🔧 Gestione Kit Assegnati</h2>
    </div>
    <button class="menu-btn" onclick="window.location.href='MenuPrincipale.html'">🏠 Torna al Menu</button>
  </div>

  <div id="messageArea"></div>

  <!-- Selezione comune: magazzino e soggetto (con filtro per tipo) -->
  <div class="form-row-3col">
    <div class="form-group">
      <label>Magazzino *</label>
      <select id="magazzino" required>
        <option value="">Caricamento...</option>
      </select>
    </div>
    <div class="form-group">
      <label>Tipo soggetto *</label>
      <select id="tipoSoggetto">
        <option value="">Seleziona tipo...</option>
        <option value="PROMOTER">👤 Promoter</option>
        <option value="NEGOZIO">🏪 Negozio</option>
        <option value="CLIENTE">👥 Cliente</option>
        <option value="AGENTE">🤝 Agente</option>
      </select>
    </div>
    <div class="form-group">
      <label>Soggetto *</label>
      <select id="soggetto" required disabled>
        <option value="">Seleziona prima il tipo</option>
      </select>
    </div>
  </div>

  <!-- Sezione Crea Kit (usi stock magazzino) -->
  <div class="card">
    <h3>➕ Crea Kit da magazzino</h3>
    <div class="form-row-3col">
      <div class="form-group">
        <label>Sci *</label>
        <select id="sciId" required>
          <option value="">Seleziona magazzino prima</option>
        </select>
      </div>
      <div class="form-group">
        <label>Attacchi *</label>
        <select id="attacchiId" required>
          <option value="">Seleziona magazzino prima</option>
        </select>
      </div>
      <div class="form-group">
        <label>Skistopper (opzionale)</label>
        <select id="skistopperId">
          <option value="">Nessuno</option>
        </select>
      </div>
    </div>
    <div class="form-row-3col">
      <div class="form-group">
        <label>Quantità kit *</label>
        <input type="number" id="quantita" value="1" min="1" step="1" required>
      </div>
      <div class="form-group">
        <label>Note</label>
        <textarea id="note" rows="1" placeholder="Note aggiuntive (opzionali)"></textarea>
      </div>
      <div class="form-group">
        <button type="button" class="btn" id="creaBtn" onclick="creaKit()">🔧 Crea Kit</button>
      </div>
    </div>
    <div class="info-note">
      ⚠️ I componenti vengono prelevati dal magazzino selezionato. Il kit verrà assegnato al soggetto scelto.
    </div>
  </div>

  <!-- Sezione Spacchetta Kit -->
  <div class="card">
    <h3>🔓 Spacchetta Kit</h3>
    <div class="form-row-3col">
      <div class="form-group">
        <label>Kit assegnato al soggetto</label>
        <select id="kitDaSpacchettare">
          <option value="">Seleziona soggetto prima</option>
        </select>
      </div>
      <div class="form-group">
        <label>Quantità da spacchettare</label>
        <input type="number" id="quantitaSpacchetta" value="1" min="1" step="1">
      </div>
      <div class="form-group">
        <button type="button" class="btn btn-danger" id="spacchettaBtn" onclick="spacchettaKit()">🔓 Spacchetta Kit</button>
      </div>
    </div>
    <div class="info-note">
      ⚠️ Lo spacchettamento rimuove il kit e restituisce i componenti (sci, attacchi, skistopper) al soggetto.
    </div>
  </div>
</div>

<script>
  // ========== UTILITY ==========
  function getAuthHeader() {
    const token = localStorage.getItem('token');
    return token ? { 'Authorization': 'Bearer ' + token } : {};
  }

  function showMessage(msg, type) {
    const div = document.getElementById('messageArea');
    div.innerHTML = `<div class="message ${type}">${msg}</div>`;
    setTimeout(() => div.innerHTML = '', 5000);
  }

  async function apiFetch(endpoint, options = {}) {
    const headers = { 'Content-Type': 'application/json', ...getAuthHeader(), ...options.headers };
    const response = await fetch(endpoint, { ...options, headers });
    if (!response.ok) {
      let errMsg = `Errore ${response.status}`;
      try { const err = await response.json(); errMsg = err.message || errMsg; } catch(e) {}
      throw new Error(errMsg);
    }
    return response.json();
  }

  function restoreSession() {
    const token = localStorage.getItem('token');
    if (!token) return false;
    return true;
  }

  // ---------- GLOBALI ----------
  let currentUser = null;
  let magazzini = [];
  let tuttiSoggetti = [];
  let categoryIds = { sci: null, attacchi: null, skistopper: null };
  let assignedKits = [];           // kit assegnati al soggetto corrente (per spacchettamento)

  // DOM elements
  const magazzinoSelect = document.getElementById('magazzino');
  const tipoSoggettoSelect = document.getElementById('tipoSoggetto');
  const soggettoSelect = document.getElementById('soggetto');
  const sciSelect = document.getElementById('sciId');
  const attacchiSelect = document.getElementById('attacchiId');
  const skistopperSelect = document.getElementById('skistopperId');
  const quantitaInput = document.getElementById('quantita');
  const kitSpacchettaSelect = document.getElementById('kitDaSpacchettare');
  const quantitaSpacchettaInput = document.getElementById('quantitaSpacchetta');

  // ---------- CARICA ANAGRAFICHE ----------
  async function caricaMagazzini() {
    try {
      const data = await apiFetch('/api/anagrafiche/magazzini');
      magazzini = data;
      magazzinoSelect.innerHTML = '<option value="">Seleziona magazzino</option>';
      magazzini.forEach(m => magazzinoSelect.appendChild(new Option(m.nome, m.id)));
      const defaultMag = magazzini.find(m => m.nome.toLowerCase() === 'race');
      if (defaultMag) magazzinoSelect.value = defaultMag.id;
    } catch (err) {
      console.error('Errore caricamento magazzini:', err);
      showMessage('Errore caricamento magazzini', 'error');
    }
  }

  async function caricaCategorie() {
    try {
      const data = await apiFetch('/api/anagrafiche/categorie');
      const findCatId = (nome) => {
        const cat = data.find(c => c.nome.toLowerCase() === nome.toLowerCase());
        return cat ? cat.id : null;
      };
      categoryIds.sci = findCatId('sci');
      categoryIds.attacchi = findCatId('attacchi');
      categoryIds.skistopper = findCatId('skistopper');
      console.log('ID categorie:', categoryIds);
    } catch (err) {
      console.error('Errore caricamento categorie:', err);
      showMessage('Errore caricamento categorie', 'error');
    }
  }

  async function caricaTuttiSoggetti() {
    try {
      const data = await apiFetch('/api/soggetti');
      tuttiSoggetti = data;
    } catch (err) {
      console.error('Errore caricamento soggetti:', err);
      showMessage('Errore caricamento soggetti', 'error');
    }
  }

  // Aggiorna il secondo dropdown in base al tipo selezionato
  function filtraSoggetti() {
    const tipo = tipoSoggettoSelect.value;
    if (!tipo) {
      soggettoSelect.disabled = true;
      soggettoSelect.innerHTML = '<option value="">Seleziona prima il tipo</option>';
      // Resetta i dati di spacchettamento
      kitSpacchettaSelect.innerHTML = '<option value="">Seleziona soggetto prima</option>';
      assignedKits = [];
      return;
    }

    const filtrati = tuttiSoggetti.filter(s => s.tipo === tipo);
    soggettoSelect.disabled = false;
    soggettoSelect.innerHTML = '<option value="">Seleziona soggetto...</option>';
    filtrati.forEach(s => {
      let nome = s.tipo === 'PROMOTER' ? `${s.nome} ${s.cognome || ''}`.trim() : s.nome;
      soggettoSelect.appendChild(new Option(nome, `${s.tipo}|${s.id}`));
    });
    if (filtrati.length === 1) {
      soggettoSelect.value = `${filtrati[0].tipo}|${filtrati[0].id}`;
      onSoggettoChange();  // carica i kit per spacchettamento
    } else {
      soggettoSelect.value = '';
      kitSpacchettaSelect.innerHTML = '<option value="">Seleziona soggetto prima</option>';
    }
  }

  // ---------- CARICA ARTICOLI DAL MAGAZZINO (per creazione kit) ----------
  async function caricaArticoliMagazzino() {
    const magazzinoId = magazzinoSelect.value;
    if (!magazzinoId) {
      sciSelect.innerHTML = '<option value="">Seleziona magazzino prima</option>';
      attacchiSelect.innerHTML = '<option value="">Seleziona magazzino prima</option>';
      skistopperSelect.innerHTML = '<option value="">Nessuno</option>';
      return;
    }

    try {
      const fetchCategory = async (catId) => {
        if (!catId) return [];
        const params = new URLSearchParams({
          magazzino: magazzinoId,
          min_giacenza: '1',
          categoria: catId
        });
        const url = `/api/articoli?${params.toString()}`;
        const res = await apiFetch(url);
        if (res.success) return res.data;
        return [];
      };

      const [sciList, attacchiList, skistopperList] = await Promise.all([
        fetchCategory(categoryIds.sci),
        fetchCategory(categoryIds.attacchi),
        fetchCategory(categoryIds.skistopper)
      ]);

      function formatAndPopulate(select, lista, optional = false) {
        if (!select) return;
        select.innerHTML = optional ? '<option value="">Nessuno</option>' : '<option value="">Seleziona...</option>';
        lista.forEach(art => {
          let text = art.descrizione_completa || art.descrizione;
          if (art.sigla) text = `[${art.sigla}] ${text}`;
          const giacenza = art.quantita_totale - art.quantita_in_kit;
          text += ` (disp. ${giacenza})`;
          const option = document.createElement('option');
          option.value = art.id;
          option.textContent = text;
          option.setAttribute('data-giacenza', giacenza);
          select.appendChild(option);
        });
      }

      formatAndPopulate(sciSelect, sciList);
      formatAndPopulate(attacchiSelect, attacchiList);
      formatAndPopulate(skistopperSelect, skistopperList, true);
    } catch (err) {
      console.error('Errore caricamento articoli magazzino:', err);
      showMessage('Errore caricamento articoli dal magazzino', 'error');
    }
  }

  // ---------- CARICA KIT ASSEGNATI PER SPACCHETTAMENTO ----------
  async function caricaKitsAssegnati(tipo, id) {
    try {
      const body = { targetTipo: tipo, targetId: id };
      if (currentUser.ruolo === 'admin') body.includeReferenced = true;
      const res = await apiFetch('/api/assegnazioni/oggetti', { method: 'POST', body: JSON.stringify(body) });
      if (!res.success) throw new Error(res.message);

      const oggetti = res.oggetti || [];
      // Filtra esplicitamente per destinazione (sicurezza extra)
      assignedKits = oggetti.filter(o => 
        o.tipo === 'KIT' && 
        o.quantita > 0 &&
        o.destinazioneTipo === tipo &&
        o.destinazioneId === id
      ).map(k => ({
        id: k.ID,
        quantita: k.quantita,
        descrizione: k.descrizione || '',
        codice: k.codice || ''
      }));

      // Popola il dropdown
      kitSpacchettaSelect.innerHTML = '<option value="">Seleziona kit...</option>';
      if (assignedKits.length === 0) {
        kitSpacchettaSelect.innerHTML = '<option value="">Nessun kit assegnato</option>';
        return;
      }
      assignedKits.forEach(k => {
        const option = document.createElement('option');
        option.value = k.id;
        let display = k.codice || `Kit #${k.id}`;
        if (k.descrizione) display += ` - ${k.descrizione}`;
        if (k.quantita > 1) display += ` (x${k.quantita})`;
        option.textContent = display;
        option.setAttribute('data-quantita', k.quantita);
        kitSpacchettaSelect.appendChild(option);
      });
      quantitaSpacchettaInput.value = 1;
      if (assignedKits.length) quantitaSpacchettaInput.max = assignedKits[0].quantita;
      else quantitaSpacchettaInput.max = 1;
    } catch (err) {
      console.error('Errore caricamento kit assegnati:', err);
      showMessage('Errore caricamento kit assegnati: ' + err.message, 'error');
    }
  }

  // ---------- CREAZIONE KIT (da magazzino, assegnato al soggetto) ----------
  async function creaKit() {
    const magazzino = magazzinoSelect.value;
    const soggettoVal = soggettoSelect.value;
    if (!magazzino) {
      showMessage('Seleziona un magazzino', 'error');
      return;
    }
    if (!soggettoVal) {
      showMessage('Seleziona un soggetto destinatario', 'error');
      return;
    }

    const sciId = sciSelect.value;
    const attacchiId = attacchiSelect.value;
    const skistopperId = skistopperSelect.value;
    const quantita = parseInt(quantitaInput.value);
    const note = document.getElementById('note').value.trim();

    if (!sciId || !attacchiId || quantita < 1) {
      showMessage('Seleziona sci, attacchi e quantità valida', 'error');
      return;
    }

    // Verifica giacenza
    const sciOption = sciSelect.selectedOptions[0];
    const attOption = attacchiSelect.selectedOptions[0];
    if (sciOption && parseInt(sciOption.getAttribute('data-giacenza')) < quantita) {
      showMessage('Giacenza sci insufficiente nel magazzino', 'error');
      return;
    }
    if (attOption && parseInt(attOption.getAttribute('data-giacenza')) < quantita) {
      showMessage('Giacenza attacchi insufficiente nel magazzino', 'error');
      return;
    }
    if (skistopperId) {
      const skOption = skistopperSelect.selectedOptions[0];
      if (skOption && parseInt(skOption.getAttribute('data-giacenza')) < quantita) {
        showMessage('Giacenza skistopper insufficiente nel magazzino', 'error');
        return;
      }
    }

    const [destinazioneTipo, destinazioneId] = soggettoVal.split('_');

    const payload = {
      magazzino: parseInt(magazzino),
      quantita: quantita,
      id_sci: parseInt(sciId),
      id_attacchi: parseInt(attacchiId),
      id_skistopper: skistopperId ? parseInt(skistopperId) : null,
      sigla: null,
      note: note || null,
      componiDaAssegnati: false,
      destinazioneTipo: destinazioneTipo,
      destinazioneId: parseInt(destinazioneId)
    };

    const creaBtn = document.getElementById('creaBtn');
    creaBtn.disabled = true;
    creaBtn.innerHTML = '<span class="spinner"></span> Creazione...';

    try {
      const result = await apiFetch('/api/kit', { method: 'POST', body: JSON.stringify(payload) });
      if (result.success) {
        showMessage(result.message, 'success');
        // Reset campi creazione
        sciSelect.value = '';
        attacchiSelect.value = '';
        skistopperSelect.value = '';
        quantitaInput.value = 1;
        document.getElementById('note').value = '';
        // Ricarica gli articoli dal magazzino (per aggiornare le giacenze)
        await caricaArticoliMagazzino();
        // Ricarica i kit assegnati al soggetto (potrebbe essere cambiata la lista)
        await caricaKitsAssegnati(destinazioneTipo, parseInt(destinazioneId));
      } else {
        showMessage(result.message, 'error');
      }
    } catch (err) {
      showMessage('Errore: ' + err.message, 'error');
    } finally {
      creaBtn.disabled = false;
      creaBtn.innerHTML = '🔧 Crea Kit';
    }
  }

  // ---------- SPACCHETTAMENTO KIT ----------
  async function spacchettaKit() {
    const soggettoVal = soggettoSelect.value;
    if (!soggettoVal) {
      showMessage('Seleziona un soggetto', 'error');
      return;
    }
    const kitId = kitSpacchettaSelect.value;
    if (!kitId) {
      showMessage('Seleziona un kit da spacchettare', 'error');
      return;
    }
    const quantita = parseInt(quantitaSpacchettaInput.value);
    const kit = assignedKits.find(k => k.id == kitId);
    if (!kit) {
      showMessage('Kit non trovato', 'error');
      return;
    }
    if (quantita > kit.quantita) {
      showMessage(`Quantità richiesta (${quantita}) supera quella disponibile (${kit.quantita})`, 'error');
      return;
    }

    const [destinazioneTipo, destinazioneId] = soggettoVal.split('_');

    const payload = {
      kitId: parseInt(kitId),
      quantita: quantita,
      destinazioneTipo: destinazioneTipo,
      destinazioneId: parseInt(destinazioneId)
    };

    const spacchettaBtn = document.getElementById('spacchettaBtn');
    spacchettaBtn.disabled = true;
    spacchettaBtn.innerHTML = '<span class="spinner"></span> Spacchettamento...';

    try {
      const result = await apiFetch('/api/kit/spacchetta', { method: 'POST', body: JSON.stringify(payload) });
      if (result.success) {
        showMessage(result.message, 'success');
        // Ricarica i kit assegnati al soggetto
        await caricaKitsAssegnati(destinazioneTipo, parseInt(destinazioneId));
        // Ricarica anche gli articoli del magazzino (per eventuali variazioni)
        await caricaArticoliMagazzino();
      } else {
        showMessage(result.message, 'error');
      }
    } catch (err) {
      showMessage('Errore: ' + err.message, 'error');
    } finally {
      spacchettaBtn.disabled = false;
      spacchettaBtn.innerHTML = '🔓 Spacchetta Kit';
    }
  }

  // ---------- GESTIONE EVENTI ----------
  async function onSoggettoChange() {
    const val = soggettoSelect.value;
    if (!val) {
      kitSpacchettaSelect.innerHTML = '<option value="">Seleziona soggetto prima</option>';
      return;
    }
    const [tipo, id] = val.split('_');
    await caricaKitsAssegnati(tipo, parseInt(id));
  }

  function attachEvents() {
    tipoSoggettoSelect.addEventListener('change', filtraSoggetti);
    soggettoSelect.addEventListener('change', onSoggettoChange);
    magazzinoSelect.addEventListener('change', caricaArticoliMagazzino);
    kitSpacchettaSelect.addEventListener('change', () => {
      const selected = kitSpacchettaSelect.selectedOptions[0];
      if (selected && selected.getAttribute('data-quantita')) {
        const maxQ = parseInt(selected.getAttribute('data-quantita'));
        quantitaSpacchettaInput.max = maxQ;
        quantitaSpacchettaInput.value = 1;
      } else {
        quantitaSpacchettaInput.max = 1;
      }
    });
  }

  // ---------- INIZIALIZZAZIONE ----------
  window.onload = async () => {
    if (!restoreSession()) {
      document.body.innerHTML = '<div class="container"><h2>Accesso non autorizzato</h2><p>Devi effettuare il login.</p><a href="Login.html">Vai al login</a></div>';
      return;
    }
    try {
      currentUser = JSON.parse(localStorage.getItem('user'));
    } catch(e) {
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      window.location.href = 'Login.html';
      return;
    }

    await caricaCategorie();
    await caricaMagazzini();
    await caricaTuttiSoggetti();
    attachEvents();
    if (magazzinoSelect.value) await caricaArticoliMagazzino();
  };
</script>
</body>
</html>
