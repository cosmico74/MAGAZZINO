<!DOCTYPE html>
<html lang="it">
<head>
  <link rel="icon" type="image/png" href="/images/kastle-logo.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📦 Articoli Unificato - Inserisci e Modifica</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px;
    }
    .container {
      max-width: 1400px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      padding: 20px;
    }
    h2 {
      margin: 0 0 15px 0;
      font-size: 1.5rem;
      border-left: 5px solid #1a73e8;
      padding-left: 12px;
      color: #1e2a3a;
    }
    .form-row-5col {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
      margin-bottom: 12px;
      align-items: center;
    }
    .form-row-3col {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }
    .form-row-4col-slim {
      display: grid;
      grid-template-columns: 1fr 1fr auto auto;
      gap: 12px;
      margin-bottom: 12px;
    }
    .form-row-2col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }
    .form-group {
      margin-bottom: 0;
    }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 2px;
      color: #2c3e50;
      font-size: 0.7rem;
    }
    input, select, textarea {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #cbd5e0;
      border-radius: 6px;
      font-size: 0.8rem;
    }
    .quantity-input {
      width: 100%;
    }
    .btn {
      background: #1a73e8;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.8rem;
    }
    .btn:hover {
      background: #0f5bb5;
    }
    .btn-primary {
      background: #1a73e8;
      width: 100%;
    }
    .btn-danger {
      background: #dc3545;
    }
    .btn-danger:hover {
      background: #bb2d3b;
    }
    .btn-secondary {
      background: #6c757d;
    }
    .btn-secondary:hover {
      background: #5a6268;
    }
    .filter-section {
      background: #f8f9fa;
      border-radius: 10px;
      padding: 10px;
      margin: 15px 0;
    }
    .filter-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 10px;
    }
    .filter-group label {
      font-size: 0.7rem;
    }
    .toolbar {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }
    .table-wrapper {
      overflow-x: auto;
      margin-top: 20px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.75rem;
    }
    th {
      background: #f8f9fa;
      font-weight: 600;
      position: sticky;
      top: 0;
      border: 1px solid #ddd;
      padding: 8px;
      cursor: pointer;
      user-select: none;
    }
    td {
      border: 1px solid #ddd;
      padding: 6px;
    }
    .message {
      padding: 10px;
      margin-bottom: 15px;
      border-radius: 6px;
      font-size: 0.8rem;
    }
    .success {
      background: #d4edda;
      color: #155724;
    }
    .error {
      background: #f8d7da;
      color: #721c24;
    }
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #e2e8f0;
      border-top-color: #1a73e8;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 4px;
      vertical-align: middle;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .assignment-group {
      background: #f8f9fa;
      padding: 12px;
      border-radius: 10px;
      margin: 15px 0;
    }
    .inline-checkbox {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 0;
    }
    .inline-checkbox input {
      width: auto;
    }
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .modal-content {
      background: white;
      border-radius: 12px;
      width: 90%;
      max-width: 800px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 20px;
    }
    .modal-buttons {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 20px;
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }
    .text-center {
      text-align: center;
    }
    .header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 10px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo img {
      height: 40px;
    }
    .menu-btn {
      background: #6c757d;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      color: white;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header-bar">
    <div class="logo">
      <img src="/images/kastle-logo.png" alt="Kastle">
      <h2>📦 Articoli Unificato</h2>
    </div>
    <button class="menu-btn" onclick="window.location.href='GestioneMagazzino.html'">🏠 Torna al Menu</button>
  </div>
  <div id="messageArea"></div>

  <!-- Form di inserimento -->
  <form id="articleForm" onsubmit="return false;">
    <div class="form-row-5col">
      <div class="form-group">
        <label>Magazzino *</label>
        <select id="magazzino" required></select>
      </div>
      <div class="form-group">
        <label>Settore *</label>
        <select id="settore" required></select>
      </div>
      <div class="form-group">
        <label>Categoria *</label>
        <select id="categoria" required></select>
      </div>
      <div class="form-group">
        <label>Marca *</label>
        <select id="marca" required></select>
      </div>
      <div class="form-group">
        <div class="inline-checkbox">
          <input type="checkbox" id="assegnaCheckbox">
          <label for="assegnaCheckbox">📤 Assegna a destinatario</label>
        </div>
      </div>
    </div>

    <div class="form-row-3col">
      <div class="form-group">
        <label>Descrizione *</label>
        <input type="text" id="descrizione" list="descrizioneList" required autocomplete="off">
        <datalist id="descrizioneList"></datalist>
      </div>
      <div class="form-group">
        <label>Codice Modello</label>
        <input type="text" id="codice_modello" list="codice_modelloList" autocomplete="off">
        <datalist id="codice_modelloList"></datalist>
      </div>
      <div class="form-group">
        <label>Sigla</label>
        <input type="text" id="sigla" list="siglaList" autocomplete="off">
        <datalist id="siglaList"></datalist>
      </div>
    </div>

    <div class="form-row-4col-slim">
      <div class="form-group" id="gruppoLunghezza">
        <label>Lunghezza (cm)</label>
        <input type="text" id="lunghezza" list="lunghezzaList" autocomplete="off">
        <datalist id="lunghezzaList"></datalist>
      </div>
      <div class="form-group" id="gruppoDurezza">
        <label>Durezza</label>
        <input type="text" id="durezza" list="durezzaList" autocomplete="off">
        <datalist id="durezzaList"></datalist>
      </div>
      <div class="form-group">
        <label>Quantità *</label>
        <input type="number" id="quantita" value="1" min="1" step="1" required>
      </div>
      <div class="form-group">
        <label>Versione</label>
        <input type="text" id="versione" value="1.0">
      </div>
    </div>

    <div class="form-row-2col">
      <div class="form-group">
        <label>Note</label>
        <textarea id="note" rows="2"></textarea>
      </div>
      <div class="form-group">
        <button type="button" class="btn btn-primary" id="saveBtn" onclick="salvaArticolo()">💾 Salva Articolo</button>
      </div>
    </div>

    <div id="assegnaSection" style="display:none;" class="assignment-group">
      <div class="form-row-2col">
        <div class="form-group">
          <label>Destinazione</label>
          <select id="destinazioneTipo">
            <option value="PROMOTER">👤 Promoter</option>
            <option value="NEGOZIO">🏪 Negozio</option>
            <option value="CLIENTE">👥 Cliente</option>
            <option value="AGENTE">🤝 Agente</option>
          </select>
        </div>
        <div class="form-group">
          <label>Seleziona destinazione *</label>
          <select id="destinazioneId">
            <option value="">Seleziona...</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Note per l'assegnazione (opzionale)</label>
        <input type="text" id="assegnaNote">
      </div>
    </div>
  </form>

  <!-- Filtri e tabella -->
  <div class="filter-section">
    <div class="filter-row">
      <div class="filter-group"><label>Magazzino</label><select id="filtroMagazzino"><option value="">Tutti</option></select></div>
      <div class="filter-group"><label>Settore</label><select id="filtroSettore"><option value="">Tutti</option></select></div>
      <div class="filter-group"><label>Categoria</label><select id="filtroCategoria"><option value="">Tutti</option></select></div>
      <div class="filter-group"><label>Marca</label><select id="filtroMarca"><option value="">Tutti</option></select></div>
    </div>
    <div class="filter-row">
      <div class="filter-group"><label>Descrizione</label><input type="text" id="filtroDescrizione" placeholder="Contiene..."></div>
      <div class="filter-group"><label>Sigla</label><input type="text" id="filtroSigla" placeholder="Contiene..."></div>
      <div class="filter-group"><label>Codice Modello</label><input type="text" id="filtroCodiceModello" placeholder="Contiene..."></div>
      <div class="filter-group"><label>Lunghezza</label><input type="text" id="filtroLunghezza" placeholder="Esatta"></div>
      <div class="filter-group"><label>Durezza</label><input type="text" id="filtroDurezza" placeholder="Esatta"></div>
    </div>
    <div class="toolbar">
      <button class="btn" onclick="filtraArticoli()">🔍 Filtra</button>
      <button class="btn btn-secondary" onclick="resetFiltri()">🔄 Reset filtri</button>
    </div>
  </div>

  <div class="table-wrapper">
    <table id="tabellaArticoli">
      <thead>
         <th data-sort="id">ID</th>
         <th data-sort="codice">Codice</th>
         <th data-sort="descrizione">Descrizione</th>
         <th data-sort="descrizione_completa">Descrizione Completa</th>
         <th data-sort="magazzino_nome">Magazzino</th>
         <th data-sort="categoria_nome">Categoria</th>
         <th data-sort="marca_nome">Marca</th>
         <th data-sort="lunghezza">Lunghezza</th>
         <th data-sort="durezza">Durezza</th>
         <th data-sort="quantita_totale">Qtà Tot</th>
         <th data-sort="quantita_in_kit">In Kit</th>
         <th data-sort="giacenza">Giacenza</th>
         <th data-sort="stato">Stato</th>
         <th>Azioni</th>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<!-- Modal Modifica -->
<div id="modalEdit" class="modal">
  <div class="modal-content">
    <h3>✏️ Modifica Articolo</h3>
    <form id="editForm" onsubmit="return false;">
      <input type="hidden" id="editId">
      <div class="form-row">
        <div class="form-group"><label>Magazzino *</label><select id="editMagazzino" required></select></div>
        <div class="form-group"><label>Settore *</label><select id="editSettore" required></select></div>
        <div class="form-group"><label>Categoria *</label><select id="editCategoria" required></select></div>
        <div class="form-group"><label>Marca *</label><select id="editMarca" required></select></div>
      </div>
      <div class="form-group"><label>Descrizione *</label><input type="text" id="editDescrizione" list="editDescrizioneList" required autocomplete="off"><datalist id="editDescrizioneList"></datalist></div>
      <div class="form-row">
        <div class="form-group"><label>Codice Modello</label><input type="text" id="editCodiceModello" list="editModelloList"><datalist id="editModelloList"></datalist></div>
        <div class="form-group"><label>Sigla</label><input type="text" id="editSigla" list="editSiglaList"><datalist id="editSiglaList"></datalist></div>
      </div>
      <div class="form-row">
        <div class="form-group" id="editGruppoLunghezza"><label>Lunghezza (cm)</label><input type="text" id="editLunghezza" list="editLunghezzaList"><datalist id="editLunghezzaList"></datalist></div>
        <div class="form-group" id="editGruppoDurezza"><label>Durezza</label><input type="text" id="editDurezza" list="editDurezzaList"><datalist id="editDurezzaList"></datalist></div>
      </div>
      <div class="form-group"><label>Quantità Totale *</label><input type="number" id="editQuantita" required step="1" min="0"></div>
      <div class="form-group"><label>Note</label><textarea id="editNote" rows="2"></textarea></div>
      <div class="modal-buttons">
        <button type="button" class="btn" onclick="salvaModifica()">💾 Salva</button>
        <button type="button" class="btn btn-danger" onclick="chiudiModale()">Annulla</button>
      </div>
    </form>
  </div>
</div>

<script>
  // ========== UTILITY ==========
  function getAuthHeader() {
    const token = localStorage.getItem('token');
    if (!token) return null;
    return { 'Authorization': 'Bearer ' + token };
  }

  function showMessage(message, type = 'success') {
    const msgDiv = document.getElementById('messageArea');
    msgDiv.innerHTML = `<div class="message ${type}">${message}</div>`;
    setTimeout(() => {
      if (msgDiv.firstChild) msgDiv.removeChild(msgDiv.firstChild);
    }, 5000);
  }

  async function apiFetch(endpoint, options = {}) {
    const headers = {
      'Content-Type': 'application/json',
      ...getAuthHeader(),
      ...options.headers
    };
    const response = await fetch(endpoint, { ...options, headers });
    if (!response.ok) {
      const errorText = await response.text();
      throw new Error(`Errore ${response.status}: ${errorText}`);
    }
    return response.json();
  }

  function restoreSession() {
    const token = localStorage.getItem('token');
    if (!token) return false;
    return true;
  }

  // ========== DATI GLOBALI ==========
  let magazzini = [], settori = [], categorieCompleto = [], marche = [];
  let articoliCorrente = [];
  let sortColumn = 'descrizione';
  let sortAsc = true;

  // Elementi form inserimento
  const magazzinoSelect = document.getElementById('magazzino');
  const settoreSelect = document.getElementById('settore');
  const categoriaSelect = document.getElementById('categoria');
  const marcaSelect = document.getElementById('marca');

  // Elementi filtri tabella
  const filtroMagazzino = document.getElementById('filtroMagazzino');
  const filtroSettore = document.getElementById('filtroSettore');
  const filtroCategoria = document.getElementById('filtroCategoria');
  const filtroMarca = document.getElementById('filtroMarca');
  const filtroDescrizione = document.getElementById('filtroDescrizione');
  const filtroSigla = document.getElementById('filtroSigla');
  const filtroCodiceModello = document.getElementById('filtroCodiceModello');
  const filtroLunghezza = document.getElementById('filtroLunghezza');
  const filtroDurezza = document.getElementById('filtroDurezza');

  // ========== CARICAMENTO ANAGRAFICHE ==========
  async function caricaAnagrafiche() {
    try {
      const [mag, set, cat, mar] = await Promise.all([
        apiFetch('/api/anagrafiche/magazzini'),
        apiFetch('/api/anagrafiche/settori'),
        apiFetch('/api/anagrafiche/categorie'),
        apiFetch('/api/anagrafiche/marche')
      ]);
      magazzini = mag;
      settori = set;
      categorieCompleto = cat;
      marche = mar;

      // Popola select inserimento
      magazzinoSelect.innerHTML = '<option value="">Seleziona magazzino</option>';
      magazzini.forEach(m => magazzinoSelect.appendChild(new Option(m.nome, m.id)));
      settoreSelect.innerHTML = '<option value="">Seleziona settore</option>';
      settori.forEach(s => settoreSelect.appendChild(new Option(s.nome, s.id)));
      categoriaSelect.innerHTML = '<option value="">Seleziona categoria</option>';
      categorieCompleto.forEach(c => categoriaSelect.appendChild(new Option(c.nome, c.id)));
      marcaSelect.innerHTML = '<option value="">Seleziona marca</option>';
      marche.forEach(m => marcaSelect.appendChild(new Option(m.nome, m.id)));

      // Popola select filtri
      filtroMagazzino.innerHTML = '<option value="">Tutti</option>';
      magazzini.forEach(m => filtroMagazzino.appendChild(new Option(m.nome, m.id)));
      filtroSettore.innerHTML = '<option value="">Tutti</option>';
      settori.forEach(s => filtroSettore.appendChild(new Option(s.nome, s.id)));
      filtroCategoria.innerHTML = '<option value="">Tutti</option>';
      categorieCompleto.forEach(c => filtroCategoria.appendChild(new Option(c.nome, c.id)));
      filtroMarca.innerHTML = '<option value="">Tutti</option>';
      marche.forEach(m => filtroMarca.appendChild(new Option(m.nome, m.id)));

      // Imposta default (es. Race, Sci Alpino, Sci, Kastle)
      setDefaultSelect(magazzinoSelect, ['race']);
      setDefaultSelect(settoreSelect, ['sci alpino', 'alpino']);
      setDefaultSelect(categoriaSelect, ['sci']);
      setDefaultSelect(marcaSelect, ['kastle', 'Kastle']);

      toggleLunghezzaDurezza();
    } catch (err) {
      console.error(err);
      showMessage('Errore caricamento dati anagrafici', 'error');
    }
  }

  function setDefaultSelect(selectElement, testiValidi) {
    for (let i = 0; i < selectElement.options.length; i++) {
      const opt = selectElement.options[i];
      const testoMin = opt.text.toLowerCase();
      for (let valido of testiValidi) {
        if (testoMin === valido.toLowerCase()) {
          selectElement.value = opt.value;
          return true;
        }
      }
    }
    return false;
  }

  function toggleLunghezzaDurezza() {
    const catId = categoriaSelect.value;
    const categoria = categorieCompleto.find(c => c.id == catId);
    const mostraLunghezza = categoria ? categoria.mostra_lunghezza === 'SI' : false;
    const mostraDurezza = categoria ? categoria.mostra_durezza === 'SI' : false;
    document.getElementById('gruppoLunghezza').style.display = mostraLunghezza ? 'block' : 'none';
    document.getElementById('gruppoDurezza').style.display = mostraDurezza ? 'block' : 'none';
  }

  // ========== DATALIST PER FORM INSERIMENTO ==========
  const filterFields = ['magazzino', 'settore', 'categoria', 'marca', 'descrizione', 'sigla', 'lunghezza', 'durezza', 'codice_modello'];
  const endpointMap = {
    descrizione: '/api/articoli/valori/descrizioni',
    sigla: '/api/articoli/valori/sigle',
    lunghezza: '/api/articoli/valori/lunghezze',
    durezza: '/api/articoli/valori/durezze',
    codice_modello: '/api/articoli/valori/modelli'
  };

  function getCurrentFilters() {
    const filters = {};
    for (let field of filterFields) {
      let el;
      if (field === 'magazzino') el = magazzinoSelect;
      else if (field === 'settore') el = settoreSelect;
      else if (field === 'categoria') el = categoriaSelect;
      else if (field === 'marca') el = marcaSelect;
      else el = document.getElementById(field);
      if (el) filters[field] = el.value;
    }
    return filters;
  }

  async function aggiornaDatalist(campo, endpoint) {
    const filters = getCurrentFilters();
    delete filters[campo];
    const params = new URLSearchParams();
    for (let [key, value] of Object.entries(filters)) {
      if (value && value !== '') params.append(key, value);
    }
    const url = `${endpoint}?${params.toString()}`;
    try {
      const data = await apiFetch(url);
      const datalist = document.getElementById(`${campo}List`);
      if (!datalist) return;
      datalist.innerHTML = '';
      data.forEach(item => {
        const option = document.createElement('option');
        option.value = item[campo];
        datalist.appendChild(option);
      });
    } catch (err) {
      console.error(`Errore datalist ${campo}:`, err);
    }
  }

  async function refreshAllDatalists() {
    for (let [campo, endpoint] of Object.entries(endpointMap)) {
      await aggiornaDatalist(campo, endpoint);
    }
  }

  function attachFormEvents() {
    magazzinoSelect.addEventListener('change', () => { refreshAllDatalists(); caricaArticoli(); });
    settoreSelect.addEventListener('change', () => { refreshAllDatalists(); caricaArticoli(); });
    categoriaSelect.addEventListener('change', () => { toggleLunghezzaDurezza(); refreshAllDatalists(); });
    marcaSelect.addEventListener('change', () => { refreshAllDatalists(); caricaArticoli(); });

    const textFields = ['descrizione', 'sigla', 'lunghezza', 'durezza', 'codice_modello'];
    textFields.forEach(field => {
      const input = document.getElementById(field);
      if (input) {
        input.addEventListener('input', () => { refreshAllDatalists(); caricaArticoli(); });
      }
    });
  }

  // ========== ASSEGNAZIONE ==========
  const assegnaCheckbox = document.getElementById('assegnaCheckbox');
  const assegnaSection = document.getElementById('assegnaSection');
  const destinazioneTipo = document.getElementById('destinazioneTipo');
  const destinazioneId = document.getElementById('destinazioneId');
  const assegnaNote = document.getElementById('assegnaNote');

  assegnaCheckbox.addEventListener('change', () => {
    assegnaSection.style.display = assegnaCheckbox.checked ? 'block' : 'none';
    if (assegnaCheckbox.checked && destinazioneId.options.length <= 1) {
      caricaDestinazioni();
    }
  });

  async function caricaDestinazioni() {
    const tipo = destinazioneTipo.value;
    try {
      const data = await apiFetch(`/api/soggetti/tipo/${tipo}`);
      destinazioneId.innerHTML = '<option value="">Seleziona...</option>';
      data.forEach(item => {
        let testo = tipo === 'PROMOTER' ? `${item.nome} ${item.cognome || ''}`.trim() : item.nome;
        destinazioneId.appendChild(new Option(testo, item.id));
      });
    } catch (err) {
      console.error(err);
      showMessage('Errore caricamento destinazioni', 'error');
    }
  }

  destinazioneTipo.addEventListener('change', () => {
    if (assegnaCheckbox.checked) caricaDestinazioni();
  });

  // ========== SALVATAGGIO ARTICOLO ==========
  async function salvaArticolo() {
    const descrizione = document.getElementById('descrizione').value.trim();
    const magazzino = magazzinoSelect.value;
    const settore = settoreSelect.value;
    const categoria = categoriaSelect.value;
    const marca = marcaSelect.value;
    const lunghezza = document.getElementById('lunghezza').value.trim();
    const durezza = document.getElementById('durezza').value.trim();
    const quantita = parseInt(document.getElementById('quantita').value);
    const versione = document.getElementById('versione').value.trim();
    const note = document.getElementById('note').value.trim();
    const sigla = document.getElementById('sigla').value.trim();
    const codiceModello = document.getElementById('codice_modello').value.trim();

    if (!descrizione || !magazzino || !settore || !categoria || !marca || !quantita) {
      showMessage('Compila tutti i campi obbligatori', 'error');
      return;
    }

    const payload = {
      descrizione,
      magazzino: parseInt(magazzino),
      settore: parseInt(settore),
      categoria: parseInt(categoria),
      marca: parseInt(marca),
      lunghezza: lunghezza || '',
      durezza: durezza || '',
      quantita,
      versione: versione || '1.0',
      note: note || '',
      sigla: sigla || null,
      codiceModello: codiceModello || null
    };

    const saveBtn = document.getElementById('saveBtn');
    saveBtn.disabled = true;
    saveBtn.innerHTML = '<span class="spinner"></span> Salvataggio...';

    try {
      const articleResult = await apiFetch('/api/articoli', {
        method: 'POST',
        body: JSON.stringify(payload)
      });
      if (!articleResult.success) throw new Error(articleResult.message);
      const articleId = articleResult.id;
      showMessage(articleResult.message, 'success');

      if (assegnaCheckbox.checked) {
        const destinazioneTipoVal = destinazioneTipo.value;
        const destinazioneIdVal = destinazioneId.value;
        if (!destinazioneIdVal) {
          showMessage('Articolo salvato, ma manca il destinatario per l\'assegnazione.', 'error');
        } else {
          const assignPayload = {
            magazzinoId: parseInt(magazzino),
            destinazioneTipo: destinazioneTipoVal,
            destinazioneId: parseInt(destinazioneIdVal),
            note: assegnaNote.value.trim() || note,
            oggetti: [{
              tipoOggetto: 'ARTICOLO',
              oggettoId: articleId,
              quantita: quantita
            }]
          };
          const assignResult = await apiFetch('/api/assegnazioni/uscita/batch', {
            method: 'POST',
            body: JSON.stringify(assignPayload)
          });
          if (assignResult.success) {
            showMessage(`Articolo assegnato a ${destinazioneTipoVal} con successo`, 'success');
          } else {
            showMessage(`Articolo salvato ma assegnazione fallita: ${assignResult.message}`, 'error');
          }
        }
      }

      // Reset campi (opzionale)
      document.getElementById('descrizione').value = '';
      document.getElementById('sigla').value = '';
      document.getElementById('lunghezza').value = '';
      document.getElementById('durezza').value = '';
      document.getElementById('codice_modello').value = '';
      document.getElementById('quantita').value = 1;
      document.getElementById('note').value = '';
      assegnaCheckbox.checked = false;
      assegnaSection.style.display = 'none';
      refreshAllDatalists();
      caricaArticoli();
    } catch (err) {
      showMessage('Errore: ' + err.message, 'error');
    } finally {
      saveBtn.disabled = false;
      saveBtn.innerHTML = '💾 Salva Articolo';
    }
  }

  // ========== TABELLA ARTICOLI ==========
  async function caricaArticoli() {
    try {
      const params = new URLSearchParams();
      if (filtroMagazzino.value) params.append('magazzino', filtroMagazzino.value);
      if (filtroSettore.value) params.append('settore', filtroSettore.value);
      if (filtroCategoria.value) params.append('categoria', filtroCategoria.value);
      if (filtroMarca.value) params.append('marca', filtroMarca.value);
      if (filtroDescrizione.value) params.append('descrizione', filtroDescrizione.value);
      if (filtroSigla.value) params.append('sigla', filtroSigla.value);
      if (filtroCodiceModello.value) params.append('codice_modello', filtroCodiceModello.value);
      if (filtroLunghezza.value) params.append('lunghezza', filtroLunghezza.value);
      if (filtroDurezza.value) params.append('durezza', filtroDurezza.value);

      const res = await apiFetch(`/api/articoli?${params.toString()}`);
      if (res.success) {
        articoliCorrente = res.data;
        renderTabella();
      } else {
        showMessage('Errore caricamento articoli', 'error');
      }
    } catch (err) {
      showMessage('Errore: ' + err.message, 'error');
    }
  }

  function compare(a, b, column) {
    let valA = a[column];
    let valB = b[column];
    if (column === 'lunghezza') {
      valA = parseFloat(valA) || 0;
      valB = parseFloat(valB) || 0;
    } else if (column === 'quantita_totale' || column === 'quantita_in_kit' || column === 'giacenza') {
      valA = Number(valA) || 0;
      valB = Number(valB) || 0;
    } else {
      valA = (valA || '').toString().toLowerCase();
      valB = (valB || '').toString().toLowerCase();
    }
    if (valA < valB) return -1;
    if (valA > valB) return 1;
    return 0;
  }

  function ordinaArticoli() {
    articoliCorrente.sort((a, b) => {
      let result = compare(a, b, sortColumn);
      if (!sortAsc) result = -result;
      if (result === 0 && sortColumn !== 'descrizione') {
        let descCompare = compare(a, b, 'descrizione');
        if (descCompare !== 0) return descCompare;
        let lenCompare = compare(a, b, 'lunghezza');
        if (lenCompare !== 0) return lenCompare;
      }
      return result;
    });
  }

  function aggiornaIndicatoriOrdine() {
    const headers = document.querySelectorAll('#tabellaArticoli th');
    headers.forEach(th => {
      const column = th.getAttribute('data-sort');
      if (column === sortColumn) {
        th.innerHTML = th.innerText.replace(/[↑↓]/g, '') + (sortAsc ? ' ↑' : ' ↓');
      } else {
        th.innerHTML = th.innerText.replace(/[↑↓]/g, '');
      }
    });
  }

  function renderTabella() {
    ordinaArticoli();
    const tbody = document.querySelector('#tabellaArticoli tbody');
    tbody.innerHTML = '';
    if (articoliCorrente.length === 0) {
      tbody.innerHTML = '<tr><td colspan="14" class="text-center">Nessun articolo trovato</td> </tr>';
      return;
    }
    articoliCorrente.forEach(a => {
      const mag = magazzini.find(m => m.id == a.magazzino)?.nome || a.magazzino;
      const cat = categorieCompleto.find(c => c.id == a.categoria)?.nome || a.categoria;
      const mar = marche.find(m => m.id == a.marca)?.nome || a.marca;
      const row = tbody.insertRow();
      row.insertCell(0).innerText = a.id;
      row.insertCell(1).innerText = a.codice;
      row.insertCell(2).innerText = a.descrizione;
      row.insertCell(3).innerText = a.descrizione_completa;
      row.insertCell(4).innerText = mag;
      row.insertCell(5).innerText = cat;
      row.insertCell(6).innerText = mar;
      row.insertCell(7).innerText = a.lunghezza || '';
      row.insertCell(8).innerText = a.durezza || '';
      row.insertCell(9).innerText = a.quantita_totale;
      row.insertCell(10).innerText = a.quantita_in_kit;
      row.insertCell(11).innerText = a.GIACENZA_REALE;
      row.insertCell(12).innerText = a.stato;
      const actions = row.insertCell(13);
      actions.innerHTML = `<button class="btn" onclick="modificaArticolo(${a.id})">✏️ Modifica</button>
                           <button class="btn btn-danger" onclick="eliminaArticolo(${a.id})">🗑️ Elimina</button>`;
    });
    aggiornaIndicatoriOrdine();
  }

  function handleSort(column) {
    if (sortColumn === column) {
      sortAsc = !sortAsc;
    } else {
      sortColumn = column;
      sortAsc = true;
    }
    renderTabella();
  }

  function attachSortListeners() {
    const headers = document.querySelectorAll('#tabellaArticoli th');
    headers.forEach(th => {
      const column = th.getAttribute('data-sort');
      if (column) {
        th.addEventListener('click', () => handleSort(column));
      }
    });
  }

  let debounceTimer;
  function handleFilterChange() {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => caricaArticoli(), 300);
  }

  function attachFilterEvents() {
    const inputs = [filtroDescrizione, filtroSigla, filtroCodiceModello, filtroLunghezza, filtroDurezza];
    inputs.forEach(el => el.addEventListener('input', handleFilterChange));
    const selects = [filtroMagazzino, filtroSettore, filtroCategoria, filtroMarca];
    selects.forEach(el => el.addEventListener('change', handleFilterChange));
  }

  function filtraArticoli() { caricaArticoli(); }
  function resetFiltri() {
    filtroMagazzino.value = '';
    filtroSettore.value = '';
    filtroCategoria.value = '';
    filtroMarca.value = '';
    filtroDescrizione.value = '';
    filtroSigla.value = '';
    filtroCodiceModello.value = '';
    filtroLunghezza.value = '';
    filtroDurezza.value = '';
    caricaArticoli();
  }

  async function eliminaArticolo(id) {
    if (!confirm('Eliminare questo articolo? Operazione irreversibile.')) return;
    try {
      const result = await apiFetch(`/api/articoli/${id}`, { method: 'DELETE' });
      if (result.success) {
        showMessage(result.message, 'success');
        caricaArticoli();
      } else {
        showMessage(result.message, 'error');
      }
    } catch (err) {
      showMessage('Errore eliminazione: ' + err.message, 'error');
    }
  }

  // ========== MODALE MODIFICA ==========
  let currentEditId = null;

  async function caricaSelectsModale() {
    try {
      const [mag, set, cat, mar] = await Promise.all([
        apiFetch('/api/anagrafiche/magazzini'),
        apiFetch('/api/anagrafiche/settori'),
        apiFetch('/api/anagrafiche/categorie'),
        apiFetch('/api/anagrafiche/marche')
      ]);
      const selMag = document.getElementById('editMagazzino');
      selMag.innerHTML = '<option value="">Seleziona magazzino</option>';
      mag.forEach(m => selMag.appendChild(new Option(m.nome, m.id)));
      const selSet = document.getElementById('editSettore');
      selSet.innerHTML = '<option value="">Seleziona settore</option>';
      set.forEach(s => selSet.appendChild(new Option(s.nome, s.id)));
      const selCat = document.getElementById('editCategoria');
      selCat.innerHTML = '<option value="">Seleziona categoria</option>';
      cat.forEach(c => selCat.appendChild(new Option(c.nome, c.id)));
      const selMar = document.getElementById('editMarca');
      selMar.innerHTML = '<option value="">Seleziona marca</option>';
      mar.forEach(m => selMar.appendChild(new Option(m.nome, m.id)));
    } catch (err) {
      console.error(err);
    }
  }

  async function modificaArticolo(id) {
    try {
      const articolo = await apiFetch(`/api/articoli/${id}`);
      currentEditId = id;
      await caricaSelectsModale();

      document.getElementById('editMagazzino').value = articolo.magazzino;
      document.getElementById('editSettore').value = articolo.settore;
      document.getElementById('editCategoria').value = articolo.categoria;
      document.getElementById('editMarca').value = articolo.marca;
      document.getElementById('editDescrizione').value = articolo.descrizione || '';
      document.getElementById('editSigla').value = articolo.sigla || '';
      document.getElementById('editLunghezza').value = articolo.lunghezza || '';
      document.getElementById('editDurezza').value = articolo.durezza || '';
      document.getElementById('editCodiceModello').value = articolo.codice_modello || '';
      document.getElementById('editQuantita').value = articolo.quantita_totale;
      document.getElementById('editNote').value = articolo.note || '';

      toggleEditLunghezzaDurezza();
      attachEditEvents();
      await refreshEditDatalists();

      document.getElementById('modalEdit').style.display = 'flex';
    } catch (err) {
      showMessage('Errore caricamento articolo: ' + err.message, 'error');
    }
  }

  function toggleEditLunghezzaDurezza() {
    const catId = document.getElementById('editCategoria').value;
    const categoria = categorieCompleto.find(c => c.id == catId);
    const mostraLunghezza = categoria ? categoria.mostra_lunghezza === 'SI' : true;
    const mostraDurezza = categoria ? categoria.mostra_durezza === 'SI' : true;
    document.getElementById('editGruppoLunghezza').style.display = mostraLunghezza ? 'block' : 'none';
    document.getElementById('editGruppoDurezza').style.display = mostraDurezza ? 'block' : 'none';
  }

  const editFilterFields = ['magazzino', 'settore', 'categoria', 'marca', 'descrizione', 'sigla', 'lunghezza', 'durezza', 'codice_modello'];
  const editEndpointMap = {
    descrizione: '/api/articoli/valori/descrizioni',
    sigla: '/api/articoli/valori/sigle',
    lunghezza: '/api/articoli/valori/lunghezze',
    durezza: '/api/articoli/valori/durezze',
    codice_modello: '/api/articoli/valori/modelli'
  };

  function getEditCurrentFilters() {
    const filters = {};
    for (let field of editFilterFields) {
      let el;
      if (field === 'magazzino') el = document.getElementById('editMagazzino');
      else if (field === 'settore') el = document.getElementById('editSettore');
      else if (field === 'categoria') el = document.getElementById('editCategoria');
      else if (field === 'marca') el = document.getElementById('editMarca');
      else el = document.getElementById('edit' + field.charAt(0).toUpperCase() + field.slice(1));
      if (el) filters[field] = el.value;
    }
    return filters;
  }

  async function aggiornaEditDatalist(campo, endpoint) {
    const filters = getEditCurrentFilters();
    delete filters[campo];
    const params = new URLSearchParams();
    for (let [key, value] of Object.entries(filters)) {
      if (value && value !== '') params.append(key, value);
    }
    const url = `${endpoint}?${params.toString()}`;
    try {
      const data = await apiFetch(url);
      const datalist = document.getElementById(`edit${campo.charAt(0).toUpperCase() + campo.slice(1)}List`);
      if (!datalist) return;
      datalist.innerHTML = '';
      data.forEach(item => {
        const option = document.createElement('option');
        option.value = item[campo];
        datalist.appendChild(option);
      });
    } catch (err) {
      console.error(`Errore datalist ${campo}:`, err);
    }
  }

  async function refreshEditDatalists() {
    for (let [campo, endpoint] of Object.entries(editEndpointMap)) {
      await aggiornaEditDatalist(campo, endpoint);
    }
  }

  function attachEditEvents() {
    const selects = ['editMagazzino', 'editSettore', 'editCategoria', 'editMarca'];
    selects.forEach(id => {
      const el = document.getElementById(id);
      el.removeEventListener('change', handleEditChange);
      el.addEventListener('change', handleEditChange);
    });
    const textFields = ['descrizione', 'sigla', 'lunghezza', 'durezza', 'codice_modello'];
    textFields.forEach(field => {
      const input = document.getElementById(`edit${field.charAt(0).toUpperCase() + field.slice(1)}`);
      if (input) {
        input.removeEventListener('change', handleEditChange);
        input.addEventListener('change', handleEditChange);
      }
    });
  }

  async function handleEditChange(e) {
    if (e.target.id === 'editCategoria') toggleEditLunghezzaDurezza();
    await refreshEditDatalists();
  }

  async function salvaModifica() {
    const id = currentEditId;
    const dati = {
      descrizione: document.getElementById('editDescrizione').value.trim(),
      lunghezza: document.getElementById('editLunghezza').value.trim(),
      durezza: document.getElementById('editDurezza').value.trim(),
      quantita_totale: parseInt(document.getElementById('editQuantita').value),
      note: document.getElementById('editNote').value.trim(),
      sigla: document.getElementById('editSigla').value.trim(),
      codiceModello: document.getElementById('editCodiceModello').value.trim()
    };
    if (!dati.descrizione) {
      showMessage('La descrizione è obbligatoria', 'error');
      return;
    }
    if (isNaN(dati.quantita_totale) || dati.quantita_totale < 0) {
      showMessage('Quantità non valida', 'error');
      return;
    }
    dati.magazzino = parseInt(document.getElementById('editMagazzino').value);
    dati.settore = parseInt(document.getElementById('editSettore').value);
    dati.categoria = parseInt(document.getElementById('editCategoria').value);
    dati.marca = parseInt(document.getElementById('editMarca').value);

    try {
      const result = await apiFetch(`/api/articoli/${id}`, { method: 'PUT', body: JSON.stringify(dati) });
      if (result.success) {
        showMessage('Articolo aggiornato con successo', 'success');
        chiudiModale();
        caricaArticoli();
      } else {
        showMessage(result.message, 'error');
      }
    } catch (err) {
      showMessage('Errore: ' + err.message, 'error');
    }
  }

  function chiudiModale() {
    document.getElementById('modalEdit').style.display = 'none';
  }

  // ========== LOGOUT ==========
  function logout() {
    localStorage.removeItem('token');
    localStorage.removeItem('user');
    window.location.href = 'Login.html';
  }

  // ========== INIZIALIZZAZIONE ==========
  window.onload = async () => {
    if (!restoreSession()) {
      document.body.innerHTML = '<div class="container"><h2>Accesso non autorizzato</h2><p>Devi effettuare il login.</p><a href="Login.html">Vai al login</a></div>';
      return;
    }
    await caricaAnagrafiche();
    attachFormEvents();
    attachFilterEvents();
    attachSortListeners();
    await caricaArticoli();
    await refreshAllDatalists();
  };
</script>
