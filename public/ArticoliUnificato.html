<!DOCTYPE html>
<html lang="it">
<head>
  <link rel="icon" type="image/png" href="/images/kastle-logo.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📦 Gestione Articoli - Inserisci e Modifica</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 15px;
      height: 100vh;
      overflow: hidden;
    }
    .container {
      max-width: 1600px;
      margin: 0 auto;
      background: rgba(255,255,255,0.98);
      border-radius: 20px;
      box-shadow: 0 20px 35px rgba(0,0,0,0.2);
      padding: 15px 20px;
      height: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    h2 {
      margin: 0 0 12px 0;
      font-size: 1.4rem;
      border-left: 5px solid #1a73e8;
      padding-left: 12px;
      color: #1e2a3a;
    }
    /* Form compattato */
    .form-row-5col, .form-row-3col, .form-row-4col-slim, .form-row-2col {
      display: grid;
      gap: 8px;
      margin-bottom: 6px;
    }
    .form-row-5col { grid-template-columns: repeat(5, 1fr); }
    .form-row-3col { grid-template-columns: 2fr 1fr 1fr; }
    .form-row-4col-slim { grid-template-columns: 1fr 1fr auto auto; }
    .form-row-2col { grid-template-columns: 2fr 1fr 1fr; }
    .form-group {
      margin-bottom: 0;
    }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 2px;
      color: #2c3e50;
      font-size: 0.7rem;
    }
    input, select, textarea {
      width: 100%;
      padding: 4px 6px;
      border: 1px solid #cbd5e0;
      border-radius: 6px;
      font-size: 0.75rem;
      background: #f9fafb;
    }
    .btn {
      background: linear-gradient(135deg, #1a73e8, #0f5bb5);
      color: white;
      border: none;
      padding: 4px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.75rem;
      transition: 0.1s;
    }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
    .btn-danger { background: linear-gradient(135deg, #dc3545, #b02a37); }
    .btn-secondary { background: linear-gradient(135deg, #6c757d, #565e64); }
    .table-wrapper {
      overflow-x: auto;
      overflow-y: auto;
      flex: 1;
      min-height: 0;
      margin-top: 10px;
      border-radius: 10px;
      border: 1px solid #e2e8f0;
      background: white;
    }
    table {
      width: 100%;
      min-width: 1300px;
      border-collapse: collapse;
      font-size: 0.7rem;
    }
    th, td {
      padding: 6px 8px;
      border-bottom: 1px solid #e2e8f0;
      text-align: left;
    }
    th {
      background: #f1f5f9;
      font-weight: 600;
      position: sticky;
      top: 0;
      z-index: 10;
      cursor: pointer;
    }
    tr:hover td { background: #f8fafc; }
    .action-buttons {
      display: flex;
      gap: 4px;
      justify-content: center;
    }
    .action-buttons button {
      background: #e2e8f0;
      border: none;
      padding: 2px 6px;
      border-radius: 4px;
      cursor: pointer;
    }
    .message {
      padding: 6px 10px;
      margin-bottom: 10px;
      border-radius: 8px;
      font-size: 0.75rem;
    }
    .success { background: #d1fae5; color: #065f46; border-left: 4px solid #10b981; }
    .error { background: #fee2e2; color: #991b1b; border-left: 4px solid #ef4444; }
    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid #e2e8f0;
      border-top-color: #1a73e8;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .assignment-group {
      background: #f8f9fa;
      padding: 6px 10px;
      border-radius: 10px;
      margin: 6px 0;
    }
    .inline-checkbox {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 18px;
    }
    .inline-checkbox input { width: auto; }
    .modal {
      display: none;
      position: fixed;
      top:0; left:0;
      width:100%; height:100%;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .modal-content {
      background: white;
      border-radius: 20px;
      width: 90%;
      max-width: 700px;
      max-height: 85vh;
      overflow-y: auto;
      padding: 20px;
    }
    .modal-buttons {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 15px;
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }
    .text-center { text-align: center; }
    .header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .logo img { height: 32px; }
    .menu-btn {
      background: #6c757d;
      border: none;
      padding: 4px 12px;
      border-radius: 30px;
      color: white;
      cursor: pointer;
    }
    .sigle-table { width: 100%; margin-top: 10px; border-collapse: collapse; }
    .sigle-table th, .sigle-table td { padding: 5px; border: 1px solid #ddd; }
  </style>
</head>
<body>

<div class="container">
  <div class="header-bar">
    <div class="logo"><img src="/images/kastle-logo.png" alt="Kastle"></div>
    <button class="menu-btn" onclick="window.location.href='MenuPrincipale.html'">🏠 Menu</button>
  </div>
  <h2>📦 Gestione Articoli</h2>
  <div id="messageArea"></div>

  <!-- Form di inserimento (senza campo sigla) -->
  <form id="articleForm" onsubmit="return false;">
    <div class="form-row-5col">
      <div class="form-group"><label>Magazzino *</label><select id="magazzino" required></select></div>
      <div class="form-group"><label>Settore *</label><select id="settore" required></select></div>
      <div class="form-group"><label>Categoria *</label><select id="categoria" required></select></div>
      <div class="form-group"><label>Marca *</label><select id="marca" required></select></div>
      <div class="form-group">
        <div class="inline-checkbox">
          <input type="checkbox" id="assegnaCheckbox">
          <label for="assegnaCheckbox">📤 Assegna</label>
        </div>
      </div>
    </div>
    <div class="form-row-3col">
      <div class="form-group"><label>Descrizione *</label><input type="text" id="descrizione" list="descrizioneList" required autocomplete="off"><datalist id="descrizioneList"></datalist></div>
      <div class="form-group"><label>Codice Modello</label><input type="text" id="codice_modello" list="codice_modelloList" autocomplete="off"><datalist id="codice_modelloList"></datalist></div>
      <div class="form-group"><label>Lunghezza (cm)</label><input type="text" id="lunghezza" list="lunghezzaList" autocomplete="off"><datalist id="lunghezzaList"></datalist></div>
    </div>
    <div class="form-row-4col-slim">
      <div class="form-group"><label>Durezza</label><input type="text" id="durezza" list="durezzaList" autocomplete="off"><datalist id="durezzaList"></datalist></div>
      <div class="form-group"><label>Quantità *</label><input type="number" id="quantita" value="1" min="1" step="1" required></div>
      <div class="form-group"><label>Versione</label><input type="text" id="versione" value="1.0"></div>
      <div class="form-group"><label>Note</label><textarea id="note" rows="1"></textarea></div>
    </div>
    <div class="form-row-2col">
      <div class="form-group"><button type="button" class="btn" id="saveBtn" onclick="salvaArticolo()">💾 Salva</button></div>
      <div class="form-group"><button type="button" class="btn btn-secondary" onclick="resetFiltri()">🔄 Reset</button></div>
    </div>
    <div id="assegnaSection" style="display:none;" class="assignment-group">
      <div class="form-row-2col">
        <div class="form-group"><label>Destinazione</label><select id="destinazioneTipo"><option value="PROMOTER">Promoter</option><option value="NEGOZIO">Negozio</option><option value="CLIENTE">Cliente</option><option value="AGENTE">Agente</option></select></div>
        <div class="form-group"><label>Seleziona destinazione *</label><select id="destinazioneId"></select></div>
      </div>
      <div class="form-group"><label>Note assegnazione</label><input type="text" id="assegnaNote"></div>
    </div>
  </form>

  <!-- Tabella articoli -->
  <div class="table-wrapper">
    <table id="tabellaArticoli">
      <thead>
         <th data-sort="id">ID</th><th data-sort="codice">Codice</th><th data-sort="descrizione">Descrizione</th>
         <th data-sort="descrizione_completa">Descrizione Completa</th><th data-sort="magazzino_nome">Magazzino</th>
         <th data-sort="categoria_nome">Categoria</th><th data-sort="marca_nome">Marca</th>
         <th data-sort="lunghezza">Lunghezza</th><th data-sort="durezza">Durezza</th>
         <th data-sort="quantita_totale">Qtà Tot</th><th data-sort="quantita_in_kit">In Kit</th>
         <th data-sort="giacenza">Giacenza</th><th data-sort="stato">Stato</th>
         <th>Sigle</th><th>Azioni</th>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<!-- Modal Modifica Articolo -->
<div id="modalEdit" class="modal">
  <div class="modal-content">
    <h3>✏️ Modifica Articolo</h3>
    <form id="editForm" onsubmit="return false;">
      <input type="hidden" id="editId">
      <div class="form-row">
        <div class="form-group"><label>Magazzino *</label><select id="editMagazzino" required></select></div>
        <div class="form-group"><label>Settore *</label><select id="editSettore" required></select></div>
        <div class="form-group"><label>Categoria *</label><select id="editCategoria" required></select></div>
        <div class="form-group"><label>Marca *</label><select id="editMarca" required></select></div>
      </div>
      <div class="form-group"><label>Descrizione *</label><input type="text" id="editDescrizione" list="editDescrizioneList" required><datalist id="editDescrizioneList"></datalist></div>
      <div class="form-row">
        <div class="form-group"><label>Codice Modello</label><input type="text" id="editCodiceModello" list="editModelloList"><datalist id="editModelloList"></datalist></div>
        <div class="form-group"><label>Lunghezza (cm)</label><input type="text" id="editLunghezza" list="editLunghezzaList"><datalist id="editLunghezzaList"></datalist></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Durezza</label><input type="text" id="editDurezza" list="editDurezzaList"><datalist id="editDurezzaList"></datalist></div>
        <div class="form-group"><label>Quantità Totale *</label><input type="number" id="editQuantita" required min="0"></div>
      </div>
      <div class="form-group"><label>Note</label><textarea id="editNote" rows="2"></textarea></div>
      <div class="modal-buttons">
        <button type="button" class="btn" onclick="salvaModifica()">💾 Salva</button>
        <button type="button" class="btn btn-danger" onclick="chiudiModale()">Annulla</button>
      </div>
    </form>
  </div>
</div>

<!-- Modal Gestione Sigle -->
<div id="modalSigle" class="modal">
  <div class="modal-content">
    <h3>🔖 Gestione Sigle</h3>
    <p><strong>Articolo:</strong> <span id="sigleArticoloDesc"></span></p>
    <table class="sigle-table">
      <thead><tr><th>Sigla</th><th>Durezza</th><th>Codice Modello</th><th>Note</th><th></th></tr></thead>
      <tbody id="sigleTableBody"></tbody>
    </table>
    <div class="form-row">
      <div class="form-group"><label>Nuova Sigla</label><input type="text" id="nuovaSigla" placeholder="Sigla"></div>
      <div class="form-group"><label>Durezza</label><input type="text" id="nuovaSiglaDurezza"></div>
      <div class="form-group"><label>Codice Modello</label><input type="text" id="nuovaSiglaModello" list="modelliList"><datalist id="modelliList"></datalist></div>
      <div class="form-group"><label>Note</label><input type="text" id="nuovaSiglaNote"></div>
      <div class="form-group"><button class="btn" onclick="aggiungiSigla()">➕ Aggiungi</button></div>
    </div>
    <div class="modal-buttons">
      <button class="btn btn-secondary" onclick="chiudiModalSigle()">Chiudi</button>
    </div>
  </div>
</div>

<script>
  // ========== UTILITY ==========
  function getAuthHeader() {
    const token = localStorage.getItem('token');
    return token ? { 'Authorization': 'Bearer ' + token } : {};
  }
  function showMessage(msg, type) {
    const div = document.getElementById('messageArea');
    div.innerHTML = `<div class="message ${type}">${msg}</div>`;
    setTimeout(() => div.innerHTML = '', 5000);
  }
  async function apiFetch(endpoint, options = {}) {
    const headers = { 'Content-Type': 'application/json', ...getAuthHeader(), ...options.headers };
    const res = await fetch(endpoint, { ...options, headers });
    if (!res.ok) {
      let err = `Errore ${res.status}`;
      try { const data = await res.json(); err = data.message || err; } catch(e) {}
      throw new Error(err);
    }
    return res.json();
  }
  function restoreSession() { return !!localStorage.getItem('token'); }

  // ========== GLOBALI ==========
  let magazzini = [], settori = [], categorie = [], marche = [];
  let articoliCorrente = [];
  let sortColumn = 'id', sortAsc = true;

  // Elementi
  const magazzinoSelect = document.getElementById('magazzino');
  const settoreSelect = document.getElementById('settore');
  const categoriaSelect = document.getElementById('categoria');
  const marcaSelect = document.getElementById('marca');
  const descrizioneInput = document.getElementById('descrizione');
  const codiceModelloInput = document.getElementById('codice_modello');
  const lunghezzaInput = document.getElementById('lunghezza');
  const durezzaInput = document.getElementById('durezza');
  const quantitaInput = document.getElementById('quantita');

  // ========== CARICA ANAGRAFICHE ==========
  async function caricaAnagrafiche() {
    try {
      [magazzini, settori, categorie, marche] = await Promise.all([
        apiFetch('/api/anagrafiche/magazzini'),
        apiFetch('/api/anagrafiche/settori'),
        apiFetch('/api/anagrafiche/categorie'),
        apiFetch('/api/anagrafiche/marche')
      ]);
      function popola(sel, items, valKey, textKey) {
        sel.innerHTML = '<option value="">Seleziona</option>';
        items.forEach(i => sel.appendChild(new Option(i[textKey], i[valKey])));
      }
      popola(magazzinoSelect, magazzini, 'id', 'nome');
      popola(settoreSelect, settori, 'id', 'nome');
      popola(categoriaSelect, categorie, 'id', 'nome');
      popola(marcaSelect, marche, 'id', 'nome');
    } catch(err) { showMessage('Errore caricamento anagrafiche', 'error'); }
  }

  // ========== DATALIST ==========
  const filterFields = ['magazzino','settore','categoria','marca','descrizione','lunghezza','durezza','codice_modello'];
  const endpointMap = {
    descrizione: '/api/articoli/valori/descrizioni',
    lunghezza: '/api/articoli/valori/lunghezze',
    durezza: '/api/articoli/valori/durezze',
    codice_modello: '/api/articoli/valori/modelli'
  };
  function getCurrentFilters() {
    const f = {};
    for (let field of filterFields) {
      let el = document.getElementById(field);
      if (field === 'magazzino') el = magazzinoSelect;
      else if (field === 'settore') el = settoreSelect;
      else if (field === 'categoria') el = categoriaSelect;
      else if (field === 'marca') el = marcaSelect;
      if (el) f[field] = el.value;
    }
    return f;
  }
  async function aggiornaDatalist(campo, endpoint) {
    const filters = getCurrentFilters();
    delete filters[campo];
    const params = new URLSearchParams();
    for (let [k,v] of Object.entries(filters)) if (v) params.append(k,v);
    const url = `${endpoint}?${params.toString()}`;
    try {
      const data = await apiFetch(url);
      const datalist = document.getElementById(`${campo}List`);
      if (datalist) {
        datalist.innerHTML = '';
        data.forEach(item => { const opt = document.createElement('option'); opt.value = item[campo]; datalist.appendChild(opt); });
      }
    } catch(err) { console.error(err); }
  }
  async function refreshAllDatalists() {
    for (let [campo, ep] of Object.entries(endpointMap)) await aggiornaDatalist(campo, ep);
  }

  // ========== TABELLA ==========
  let refreshDebounce;
  function refreshTabella() { caricaArticoli(); }
  function refreshTabellaDebounced() { clearTimeout(refreshDebounce); refreshDebounce = setTimeout(refreshTabella, 300); }
  function attachFormEvents() {
    const selects = [magazzinoSelect, settoreSelect, categoriaSelect, marcaSelect];
    selects.forEach(s => s.addEventListener('change', () => { refreshAllDatalists(); refreshTabellaDebounced(); }));
    const inputs = ['descrizione', 'lunghezza', 'durezza', 'codice_modello'];
    inputs.forEach(id => {
      const el = document.getElementById(id);
      if (el) el.addEventListener('input', () => { refreshAllDatalists(); refreshTabellaDebounced(); });
    });
  }

  async function caricaArticoli() {
    try {
      const params = new URLSearchParams();
      if (magazzinoSelect.value) params.append('magazzino', magazzinoSelect.value);
      if (settoreSelect.value) params.append('settore', settoreSelect.value);
      if (categoriaSelect.value) params.append('categoria', categoriaSelect.value);
      if (marcaSelect.value) params.append('marca', marcaSelect.value);
      if (descrizioneInput.value) params.append('descrizione', descrizioneInput.value);
      if (codiceModelloInput.value) params.append('codice_modello', codiceModelloInput.value);
      if (lunghezzaInput.value) params.append('lunghezza', lunghezzaInput.value);
      if (durezzaInput.value) params.append('durezza', durezzaInput.value);
      const res = await apiFetch(`/api/articoli?${params.toString()}`);
      if (res.success) { articoliCorrente = res.data; renderTabella(); }
      else showMessage(res.message, 'error');
    } catch(err) { showMessage(err.message, 'error'); }
  }

  function compare(a,b,col) {
    let va = a[col], vb = b[col];
    if (col === 'quantita_totale' || col === 'quantita_in_kit' || col === 'giacenza') { va = Number(va)||0; vb = Number(vb)||0; }
    else if (col === 'lunghezza') { va = parseFloat(va)||0; vb = parseFloat(vb)||0; }
    else { va = (va||'').toString().toLowerCase(); vb = (vb||'').toString().toLowerCase(); }
    if (va < vb) return -1;
    if (va > vb) return 1;
    return 0;
  }
  function ordinaArticoli() {
    articoliCorrente.sort((a,b) => {
      let r = compare(a,b,sortColumn);
      if (!sortAsc) r = -r;
      if (r===0 && sortColumn!=='descrizione') r = compare(a,b,'descrizione');
      return r;
    });
  }
  function aggiornaIndicatoriOrdine() {
    document.querySelectorAll('#tabellaArticoli th').forEach(th => {
      const col = th.getAttribute('data-sort');
      if (col === sortColumn) th.innerText = th.innerText.replace(/[↑↓]/g,'') + (sortAsc ? ' ↑' : ' ↓');
      else th.innerText = th.innerText.replace(/[↑↓]/g,'');
    });
  }
  function renderTabella() {
    ordinaArticoli();
    const tbody = document.querySelector('#tabellaArticoli tbody');
    tbody.innerHTML = '';
    if (!articoliCorrente.length) { tbody.innerHTML = '<tr><td colspan="15">Nessun articolo</td></tr>'; return; }
    articoliCorrente.forEach(a => {
      const mag = magazzini.find(m=>m.id==a.magazzino)?.nome || a.magazzino;
      const cat = categorie.find(c=>c.id==a.categoria)?.nome || a.categoria;
      const mar = marche.find(m=>m.id==a.marca)?.nome || a.marca;
      const giac = (a.quantita_totale||0) - (a.quantita_in_kit||0);
      const row = tbody.insertRow();
      row.insertCell(0).innerText = a.id;
      row.insertCell(1).innerText = a.codice;
      row.insertCell(2).innerText = a.descrizione;
      row.insertCell(3).innerText = a.descrizione_completa;
      row.insertCell(4).innerText = mag;
      row.insertCell(5).innerText = cat;
      row.insertCell(6).innerText = mar;
      row.insertCell(7).innerText = a.lunghezza || '';
      row.insertCell(8).innerText = a.durezza || '';
      row.insertCell(9).innerText = a.quantita_totale;
      row.insertCell(10).innerText = a.quantita_in_kit;
      row.insertCell(11).innerText = giac;
      row.insertCell(12).innerText = a.stato;
      const btnSigle = document.createElement('button'); btnSigle.textContent = '🔖'; btnSigle.className = 'btn'; btnSigle.onclick = () => apriGestioneSigle(a.id, a.descrizione);
      row.insertCell(13).appendChild(btnSigle);
      const actions = row.insertCell(14);
      actions.className = 'action-buttons';
      actions.innerHTML = `<button class="btn" onclick="modificaArticolo(${a.id})">✏️</button>
                           <button class="btn btn-danger" onclick="eliminaArticolo(${a.id})">🗑️</button>`;
    });
    aggiornaIndicatoriOrdine();
  }
  function handleSort(col) {
    if (sortColumn === col) sortAsc = !sortAsc;
    else { sortColumn = col; sortAsc = true; }
    renderTabella();
  }
  function attachSortListeners() {
    document.querySelectorAll('#tabellaArticoli th[data-sort]').forEach(th => {
      th.addEventListener('click', () => handleSort(th.getAttribute('data-sort')));
    });
  }
  function resetFiltri() {
    magazzinoSelect.value = ''; settoreSelect.value = ''; categoriaSelect.value = ''; marcaSelect.value = '';
    descrizioneInput.value = ''; codiceModelloInput.value = ''; lunghezzaInput.value = ''; durezzaInput.value = '';
    refreshAllDatalists(); refreshTabella();
  }

  // ========== CRUD ARTICOLO ==========
  async function salvaArticolo() {
    const payload = {
      descrizione: descrizioneInput.value.trim(),
      magazzino: parseInt(magazzinoSelect.value),
      settore: parseInt(settoreSelect.value),
      categoria: parseInt(categoriaSelect.value),
      marca: parseInt(marcaSelect.value),
      lunghezza: lunghezzaInput.value.trim(),
      durezza: durezzaInput.value.trim(),
      quantita: parseInt(quantitaInput.value),
      versione: document.getElementById('versione').value.trim(),
      note: document.getElementById('note').value.trim(),
      codiceModello: codiceModelloInput.value.trim()
    };
    if (!payload.descrizione || !payload.magazzino || !payload.settore || !payload.categoria || !payload.marca || !payload.quantita) {
      showMessage('Compila tutti i campi obbligatori', 'error'); return;
    }
    const saveBtn = document.getElementById('saveBtn');
    saveBtn.disabled = true; saveBtn.innerHTML = '<span class="spinner"></span>';
    try {
      const res = await apiFetch('/api/articoli', { method: 'POST', body: JSON.stringify(payload) });
      if (res.success) {
        showMessage(res.message, 'success');
        if (document.getElementById('assegnaCheckbox').checked) {
          const assignPayload = {
            magazzinoId: payload.magazzino,
            destinazioneTipo: document.getElementById('destinazioneTipo').value,
            destinazioneId: parseInt(document.getElementById('destinazioneId').value),
            note: document.getElementById('assegnaNote').value,
            oggetti: [{ tipoOggetto: 'ARTICOLO', oggettoId: res.id, quantita: payload.quantita }]
          };
          try {
            const assignRes = await apiFetch('/api/assegnazioni/uscita/batch', { method: 'POST', body: JSON.stringify(assignPayload) });
            if (assignRes.success) showMessage('Articolo assegnato', 'success');
            else showMessage('Articolo salvato ma assegnazione fallita', 'error');
          } catch(e) { showMessage('Errore assegnazione', 'error'); }
        }
        descrizioneInput.value = ''; codiceModelloInput.value = ''; lunghezzaInput.value = ''; durezzaInput.value = '';
        quantitaInput.value = 1; document.getElementById('note').value = '';
        document.getElementById('assegnaCheckbox').checked = false;
        document.getElementById('assegnaSection').style.display = 'none';
        refreshAllDatalists(); refreshTabella();
      } else throw new Error(res.message);
    } catch(err) { showMessage(err.message, 'error'); }
    finally { saveBtn.disabled = false; saveBtn.innerHTML = '💾 Salva'; }
  }

  async function modificaArticolo(id) {
    const art = articoliCorrente.find(a => a.id == id);
    if (!art) return;
    document.getElementById('editId').value = art.id;
    await caricaSelectsModale();
    document.getElementById('editMagazzino').value = art.magazzino;
    document.getElementById('editSettore').value = art.settore;
    document.getElementById('editCategoria').value = art.categoria;
    document.getElementById('editMarca').value = art.marca;
    document.getElementById('editDescrizione').value = art.descrizione;
    document.getElementById('editLunghezza').value = art.lunghezza || '';
    document.getElementById('editDurezza').value = art.durezza || '';
    document.getElementById('editCodiceModello').value = art.codice_modello || '';
    document.getElementById('editQuantita').value = art.quantita_totale;
    document.getElementById('editNote').value = art.note || '';
    attachEditEvents(); await refreshEditDatalists();
    document.getElementById('modalEdit').style.display = 'flex';
  }

  async function caricaSelectsModale() {
    const [mag,set,cat,mar] = await Promise.all([
      apiFetch('/api/anagrafiche/magazzini'), apiFetch('/api/anagrafiche/settori'),
      apiFetch('/api/anagrafiche/categorie'), apiFetch('/api/anagrafiche/marche')
    ]);
    function pop(sel, items) { sel.innerHTML = '<option value="">Seleziona</option>'; items.forEach(i => sel.appendChild(new Option(i.nome, i.id))); }
    pop(document.getElementById('editMagazzino'), mag);
    pop(document.getElementById('editSettore'), set);
    pop(document.getElementById('editCategoria'), cat);
    pop(document.getElementById('editMarca'), mar);
  }

  const editEndpointMap = { descrizione: '/api/articoli/valori/descrizioni', lunghezza: '/api/articoli/valori/lunghezze', durezza: '/api/articoli/valori/durezze', codice_modello: '/api/articoli/valori/modelli' };
  function getEditFilters() {
    const f = {};
    for (let field of ['magazzino','settore','categoria','marca','descrizione','lunghezza','durezza','codice_modello']) {
      let el = document.getElementById(`edit${field.charAt(0).toUpperCase()+field.slice(1)}`);
      if (!el) el = document.getElementById(`edit${field}`);
      if (el) f[field] = el.value;
    }
    return f;
  }
  async function aggiornaEditDatalist(campo, ep) {
    const filters = getEditFilters();
    delete filters[campo];
    const params = new URLSearchParams();
    for (let [k,v] of Object.entries(filters)) if (v) params.append(k,v);
    const url = `${ep}?${params.toString()}`;
    try {
      const data = await apiFetch(url);
      const datalist = document.getElementById(`edit${campo.charAt(0).toUpperCase()+campo.slice(1)}List`);
      if (datalist) { datalist.innerHTML = ''; data.forEach(item => { const opt = document.createElement('option'); opt.value = item[campo]; datalist.appendChild(opt); }); }
    } catch(e) { console.error(e); }
  }
  async function refreshEditDatalists() { for (let [c,ep] of Object.entries(editEndpointMap)) await aggiornaEditDatalist(c,ep); }
  function attachEditEvents() {
    ['editMagazzino','editSettore','editCategoria','editMarca','editDescrizione','editLunghezza','editDurezza','editCodiceModello'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.addEventListener('change', () => refreshEditDatalists());
    });
  }
  async function salvaModifica() {
    const id = document.getElementById('editId').value;
    const dati = {
      descrizione: document.getElementById('editDescrizione').value.trim(),
      lunghezza: document.getElementById('editLunghezza').value.trim(),
      durezza: document.getElementById('editDurezza').value.trim(),
      quantita_totale: parseInt(document.getElementById('editQuantita').value),
      note: document.getElementById('editNote').value.trim(),
      codiceModello: document.getElementById('editCodiceModello').value.trim(),
      magazzino: parseInt(document.getElementById('editMagazzino').value),
      settore: parseInt(document.getElementById('editSettore').value),
      categoria: parseInt(document.getElementById('editCategoria').value),
      marca: parseInt(document.getElementById('editMarca').value)
    };
    if (!dati.descrizione || isNaN(dati.quantita_totale)) { showMessage('Dati non validi','error'); return; }
    try {
      const res = await apiFetch(`/api/articoli/${id}`, { method: 'PUT', body: JSON.stringify(dati) });
      if (res.success) { showMessage('Aggiornato','success'); chiudiModale(); refreshTabella(); }
      else showMessage(res.message,'error');
    } catch(err) { showMessage(err.message,'error'); }
  }
  function chiudiModale() { document.getElementById('modalEdit').style.display = 'none'; }
  async function eliminaArticolo(id) {
    if (!confirm('Eliminare?')) return;
    try {
      const res = await apiFetch(`/api/articoli/${id}`, { method: 'DELETE' });
      if (res.success) { showMessage('Eliminato','success'); refreshTabella(); }
      else showMessage(res.message,'error');
    } catch(err) { showMessage(err.message,'error'); }
  }

  // ========== GESTIONE SIGLE ==========
  let currentSigleArticoloId = null;
  async function apriGestioneSigle(articoloId, descrizione) {
    currentSigleArticoloId = articoloId;
    document.getElementById('sigleArticoloDesc').innerText = descrizione;
    await caricaSigleArticolo(articoloId);
    // popola datalist modelli (opzionale)
    try {
      const res = await apiFetch(`/api/articoli/valori/modelli?descrizione=${encodeURIComponent(descrizione)}`);
      const dl = document.getElementById('modelliList');
      if (dl) { dl.innerHTML = ''; res.forEach(r => { if(r.codice_modello) { let opt = document.createElement('option'); opt.value = r.codice_modello; dl.appendChild(opt); } }); }
    } catch(e) {}
    document.getElementById('modalSigle').style.display = 'flex';
  }
  async function caricaSigleArticolo(articoloId) {
    try {
      const sigle = await apiFetch(`/api/articoli/${articoloId}/sigle`);
      const tbody = document.getElementById('sigleTableBody');
      tbody.innerHTML = '';
      sigle.forEach(s => {
        const row = tbody.insertRow();
        row.insertCell(0).innerText = s.sigla;
        row.insertCell(1).innerText = s.durezza || '';
        row.insertCell(2).innerText = s.codice_modello || '';
        row.insertCell(3).innerText = s.note || '';
        const btn = row.insertCell(4);
        btn.innerHTML = `<button class="btn" onclick="modificaSigla(${s.id},'${s.sigla}')">✏️</button>
                         <button class="btn btn-danger" onclick="eliminaSigla(${s.id})">🗑️</button>`;
      });
    } catch(err) { showMessage('Errore caricamento sigle','error'); }
  }
  async function aggiungiSigla() {
    const sigla = document.getElementById('nuovaSigla').value.trim();
    if (!sigla) { showMessage('Inserisci sigla','error'); return; }
    const payload = {
      sigla,
      durezza: document.getElementById('nuovaSiglaDurezza').value.trim(),
      codice_modello: document.getElementById('nuovaSiglaModello').value.trim(),
      note: document.getElementById('nuovaSiglaNote').value.trim()
    };
    try {
      await apiFetch(`/api/articoli/${currentSigleArticoloId}/sigle`, { method: 'POST', body: JSON.stringify(payload) });
      showMessage('Sigla aggiunta','success');
      document.getElementById('nuovaSigla').value = '';
      document.getElementById('nuovaSiglaDurezza').value = '';
      document.getElementById('nuovaSiglaModello').value = '';
      document.getElementById('nuovaSiglaNote').value = '';
      await caricaSigleArticolo(currentSigleArticoloId);
    } catch(err) { showMessage(err.message,'error'); }
  }
  async function modificaSigla(id, vecchia) {
    const nuova = prompt('Nuova sigla:', vecchia);
    if (!nuova || nuova === vecchia) return;
    try {
      await apiFetch(`/api/sigle/${id}`, { method: 'PUT', body: JSON.stringify({ sigla: nuova }) });
      await caricaSigleArticolo(currentSigleArticoloId);
    } catch(err) { showMessage(err.message,'error'); }
  }
  async function eliminaSigla(id) {
    if (!confirm('Eliminare sigla?')) return;
    try {
      await apiFetch(`/api/sigle/${id}`, { method: 'DELETE' });
      await caricaSigleArticolo(currentSigleArticoloId);
    } catch(err) { showMessage(err.message,'error'); }
  }
  function chiudiModalSigle() { document.getElementById('modalSigle').style.display = 'none'; currentSigleArticoloId = null; }

  // ========== ASSEGNAZIONE ==========
  const assegnaCheck = document.getElementById('assegnaCheckbox');
  const assegnaSection = document.getElementById('assegnaSection');
  const destTipo = document.getElementById('destinazioneTipo');
  const destId = document.getElementById('destinazioneId');
  assegnaCheck.addEventListener('change', () => {
    assegnaSection.style.display = assegnaCheck.checked ? 'block' : 'none';
    if (assegnaCheck.checked) caricaDestinazioni();
  });
  destTipo.addEventListener('change', () => { if (assegnaCheck.checked) caricaDestinazioni(); });
  async function caricaDestinazioni() {
    const tipo = destTipo.value;
    try {
      const data = await apiFetch(`/api/soggetti/tipo/${tipo}`);
      destId.innerHTML = '<option value="">Seleziona</option>';
      data.forEach(item => {
        let testo = tipo === 'PROMOTER' ? `${item.nome} ${item.cognome||''}`.trim() : item.nome;
        destId.appendChild(new Option(testo, item.id));
      });
    } catch(err) { showMessage('Errore caricamento destinazioni','error'); }
  }

  // ========== INIT ==========
  window.onload = async () => {
    if (!restoreSession()) { window.location.href = 'Login.html'; return; }
    await caricaAnagrafiche();
    attachFormEvents();
    attachSortListeners();
    await refreshAllDatalists();
    await refreshTabella();
  };
</script>
</body>
</html>
