<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Menu Gestionale</title>
  <style>
    body { font-family: Arial; padding: 15px; }
    .menu-item { margin: 10px 0; }
    .btn-menu {
      display: block; width: 100%; padding: 10px; background: #1a73e8; color: white;
      text-align: center; border-radius: 4px; margin: 5px 0; cursor: pointer; border: none; font-size: 14px;
    }
    .btn-menu:hover { background: #0d5bbf; }
    .user-info { background: #f5f5f5; padding: 10px; border-radius: 4px; margin-bottom: 15px; font-size: 12px; text-align: center; }
    .logout { background: #e74c3c; }
    .logout:hover { background: #c0392b; }
  </style>
  <script>
    // ========== LIBRERIA COMUNE ==========
    (function() {
      window.currentUser = null;
      window.authToken = null;

      window.login = function(username, password, callback) {
        google.script.run
          .withSuccessHandler(function(res) {
            if (res.success) {
              window.currentUser = res.user;
              window.authToken = res.token;
              localStorage.setItem('magazzino_user', JSON.stringify({ user: res.user, token: res.token }));
              callback && callback(true, res);
            } else {
              callback && callback(false, res);
            }
          })
          .withFailureHandler(function(err) {
            callback && callback(false, { message: err.message });
          })
          .verificaLogin({ username, password });
      };

      window.restoreSession = function() {
        const saved = localStorage.getItem('magazzino_user');
        if (saved) {
          try {
            const data = JSON.parse(saved);
            window.currentUser = data.user;
            window.authToken = data.token;
            return true;
          } catch(e) {}
        }
        return false;
      };

      window.logout = function() {
        window.currentUser = null;
        window.authToken = null;
        localStorage.removeItem('magazzino_user');
        google.script.host.close();
      };

      window.callServer = function(funcName, params, callback) {
        if (!window.currentUser && funcName !== 'verificaLogin') {
          window.location.href = '?login=required';
          return;
        }
        params = params || {};
        if (window.currentUser) {
          params.userId = window.currentUser.id;
          params.token = window.authToken;
        }
        google.script.run
          .withSuccessHandler(callback)
          .withFailureHandler(function(err) {
            console.error('Errore in ' + funcName + ':', err);
            if (callback) callback({ success: false, message: err.message });
          })[funcName](params);
      };
    })();

    window.onload = function() {
      if (!window.restoreSession()) {
        document.getElementById('userInfo').innerHTML = 'Non autenticato';
        document.getElementById('logoutBtn').style.display = 'none';
        return;
      }
      document.getElementById('userInfo').innerHTML = `👤 ${window.currentUser.nome} (${window.currentUser.ruolo})`;
    };

    function apriModale(file) {
      google.script.run.withSuccessHandler(function(html) {
        const dialog = HtmlService.createHtmlOutput(html).setWidth(1300).setHeight(800);
        SpreadsheetApp.getUi().showModalDialog(dialog, 'Gestione');
      }).getHtmlFromFile(file);
    }

    function logout() {
      window.logout();
    }
  </script>
</head>
<body>
  <div id="userInfo" class="user-info"></div>
  <div class="menu-item"><button class="btn-menu" onclick="apriModale('InsertForm')">📦 Inserisci Articolo</button></div>
  <div class="menu-item"><button class="btn-menu" onclick="apriModale('GestioneArticoli')">📋 Gestione Articoli</button></div>
  <div class="menu-item"><button class="btn-menu" onclick="apriModale('AssegnaSigle')">🔖 Assegna Sigle</button></div>
  <div class="menu-item"><button class="btn-menu" onclick="apriModale('KitForm')">🔧 Gestisci Kit</button></div>
  <div class="menu-item"><button class="btn-menu" onclick="apriModale('CreaKitDaAssegnati')">🔧 Crea Kit da Assegnati</button></div>
  <div class="menu-item"><button class="btn-menu" onclick="apriModale('SpacchettaKitMagazzino')">🔓 Spacchetta Kit (Magazzino)</button></div>
  <div class="menu-item"><button class="btn-menu" onclick="apriModale('SpacchettaKitAssegnati')">🔓 Spacchetta Kit (Assegnati)</button></div>
  <div class="menu-item"><button class="btn-menu" onclick="apriModale('AssegnazioniUnificate')">📤 Assegnazioni / Trasferimenti</button></div>
  <div class="menu-item"><button class="btn-menu" onclick="apriModale('Inventory')">📊 Inventario</button></div>
  <div class="menu-item"><button class="btn-menu" onclick="apriModale('GestioneMagazzini')">🏭 Gestione Magazzini</button></div>
  <div class="menu-item"><button class="btn-menu" onclick="apriModale('GestioneSettori')">📋 Gestione Settori</button></div>
  <div class="menu-item"><button class="btn-menu" onclick="apriModale('GestioneCategorie')">🗂️ Gestione Categorie</button></div>
  <div class="menu-item"><button class="btn-menu" onclick="apriModale('GestioneMarche')">🏷️ Gestione Marche</button></div>
  <div class="menu-item"><button class="btn-menu" onclick="apriModale('GestioneSoggetti')">👥 Gestione Soggetti</button></div>
  <div class="menu-item"><button class="btn-menu" onclick="apriModale('GestioneUtenti')">👥 Gestione Utenti</button></div>
  <div class="menu-item"><button class="btn-menu" onclick="apriModale('ConfigForm')">⚙️ Configurazioni</button></div>
  <div class="menu-item"><button class="btn-menu logout" id="logoutBtn" onclick="logout()">🚪 Logout</button></div>
</body>
</html>
