<!DOCTYPE html>//OK
<html>
<head>
  <meta charset="UTF-8">
  <title>Gestione Articoli</title>
  <style>
    /* stili esistenti (invariati) */
    body { font-family: Arial; padding: 20px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    th { background: #f2f2f2; }
    .btn { padding: 5px 10px; margin: 2px; cursor: pointer; }
    .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
    .modal-content { background: white; padding: 20px; border-radius: 8px; width: 500px; }
  </style>
  <script>
    // ========== LIBRERIA COMUNE ==========
    (function() {
      // ... inserisci qui il codice di common.js ...
    })();

    let articoli = [];
    let magazzini = [], settori = [], categorie = [], marche = [];

    window.onload = function() {
      if (!window.restoreSession()) {
        document.body.innerHTML = '<div style="padding:20px;text-align:center">Devi effettuare il login. <a href="?login">Login</a></div>';
        return;
      }
      caricaDati();
    };

    function caricaDati() {
      callServer('getTuttiArticoli', {}, function(res) {
        if (res.success) {
          articoli = res.data;
          caricaAnagrafiche();
        } else {
          showMessage('Errore caricamento articoli', 'error');
        }
      });
    }

    function caricaAnagrafiche() {
      callServer('getInitialData', {}, function(data) {
        if (data.success) {
          magazzini = data.magazzini;
          settori = data.settori;
          categorie = data.categorie;
          marche = data.marche;
          popolaTabella();
        }
      });
    }

    function popolaTabella() {
      const tbody = document.getElementById('tabellaArticoli');
      tbody.innerHTML = '';
      articoli.forEach(a => {
        const mag = magazzini.find(m => m.ID == a.MAGAZZINO)?.NOME || a.MAGAZZINO;
        const cat = categorie.find(c => c.ID == a.CATEGORIA)?.NOME || a.CATEGORIA;
        const mar = marche.find(m => m.ID == a.MARCA)?.NOME || a.MARCA;
        const row = tbody.insertRow();
        row.insertCell(0).innerText = a.ID;
        row.insertCell(1).innerText = a.CODICE;
        row.insertCell(2).innerText = a.DESCRIZIONE;
        row.insertCell(3).innerText = a.DESCRIZIONE_COMPLETA;
        row.insertCell(4).innerText = mag;
        row.insertCell(5).innerText = cat;
        row.insertCell(6).innerText = mar;
        row.insertCell(7).innerText = a.LUNGHEZZA || '';
        row.insertCell(8).innerText = a.DUREZZA || '';
        row.insertCell(9).innerText = a.QUANTITA_TOTALE;
        row.insertCell(10).innerText = a.QUANTITA_IN_KIT;
        row.insertCell(11).innerText = a.GIACENZA_REALE;
        row.insertCell(12).innerText = a.STATO;
        const actions = row.insertCell(13);
        actions.innerHTML = `<button class="btn" onclick="modificaArticolo(${a.ID})">✏️ Modifica</button>
                             <button class="btn" onclick="eliminaArticolo(${a.ID})">🗑️ Elimina</button>`;
      });
    }

    function modificaArticolo(id) {
      const articolo = articoli.find(a => a.ID == id);
      if (!articolo) return;
      document.getElementById('editId').value = articolo.ID;
      document.getElementById('editDescrizione').value = articolo.DESCRIZIONE;
      document.getElementById('editLunghezza').value = articolo.LUNGHEZZA || '';
      document.getElementById('editDurezza').value = articolo.DUREZZA || '';
      document.getElementById('editQuantita').value = articolo.QUANTITA_TOTALE;
      document.getElementById('editNote').value = articolo.NOTE || '';
      document.getElementById('editSigla').value = articolo.SIGLA || '';
      document.getElementById('editCodiceModello').value = articolo.CODICE_MODELLO || '';
      document.getElementById('modalEdit').style.display = 'flex';
    }

    function salvaModifica() {
      const dati = {
        id: parseInt(document.getElementById('editId').value),
        descrizione: document.getElementById('editDescrizione').value,
        lunghezza: document.getElementById('editLunghezza').value,
        durezza: document.getElementById('editDurezza').value,
        quantita: parseInt(document.getElementById('editQuantita').value),
        note: document.getElementById('editNote').value,
        sigla: document.getElementById('editSigla').value,
        codiceModello: document.getElementById('editCodiceModello').value
      };
      callServer('updateArticolo', dati, function(res) {
        if (res.success) {
          showMessage(res.message, 'success');
          chiudiModale();
          caricaDati();
        } else {
          showMessage(res.message, 'error');
        }
      });
    }

    function eliminaArticolo(id) {
      if (!confirm('Eliminare questo articolo?')) return;
      callServer('deleteArticolo', { id: id }, function(res) {
        if (res.success) {
          showMessage(res.message, 'success');
          caricaDati();
        } else {
          showMessage(res.message, 'error');
        }
      });
    }

    function chiudiModale() {
      document.getElementById('modalEdit').style.display = 'none';
    }
  </script>
</head>
<body>
  <h2>📋 Gestione Articoli</h2>
  <button onclick="caricaDati()">🔄 Aggiorna</button>
  <div style="overflow-x:auto;">
    <table id="tabellaArticoli">
      <thead>
        <tr><th>ID</th><th>Codice</th><th>Descrizione</th><th>Descrizione Completa</th><th>Magazzino</th><th>Categoria</th><th>Marca</th><th>Lunghezza</th><th>Durezza</th><th>Qtà Tot</th><th>In Kit</th><th>Giacenza</th><th>Stato</th><th>Azioni</th></tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <div id="modalEdit" class="modal">
    <div class="modal-content">
      <h3>Modifica Articolo</h3>
      <input type="hidden" id="editId">
      <label>Descrizione:</label><input type="text" id="editDescrizione"><br>
      <label>Lunghezza:</label><input type="text" id="editLunghezza"><br>
      <label>Durezza:</label><input type="text" id="editDurezza"><br>
      <label>Quantità Totale:</label><input type="number" id="editQuantita"><br>
      <label>Sigla:</label><input type="text" id="editSigla"><br>
      <label>Codice Modello:</label><input type="text" id="editCodiceModello"><br>
      <label>Note:</label><textarea id="editNote" rows="3"></textarea><br>
      <button onclick="salvaModifica()">💾 Salva</button>
      <button onclick="chiudiModale()">Annulla</button>
    </div>
  </div>
</body>
</html>
