<!DOCTYPE html>
<html lang="it">
<head>
  <link rel="icon" type="image/png" href="/images/kastle-logo.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📦 Inserimento Articolo - Filtri incrociati</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f2f5;
      margin: 0;
      padding: 20px;
      line-height: 1.4;
    }
    .container {
      max-width: 1000px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
      padding: 30px;
    }
    /* Barra superiore con pulsanti (stile GestioneArticoli) */
    .top-bar {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-bottom: 20px;
    }
    h2 {
      margin-top: 0;
      margin-bottom: 20px;
      color: #1e2a3a;
      border-left: 5px solid #1a73e8;
      padding-left: 15px;
    }
    .top-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 20px;
    }
    .double-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }
    .full-row {
      margin-bottom: 20px;
    }
    .form-group { margin-bottom: 0; }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
      color: #2c3e50;
      font-size: 0.9rem;
    }
    input, select, textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #cbd5e0;
      border-radius: 8px;
      font-size: 0.95rem;
      transition: all 0.2s ease;
      background-color: #fff;
    }
    input:focus, select:focus, textarea:focus {
      border-color: #1a73e8;
      outline: none;
      box-shadow: 0 0 0 3px rgba(26,115,232,0.1);
    }
    .btn {
      background: #1a73e8;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: background 0.2s;
    }
    .btn:hover { background: #0f5bb5; }
    .btn-secondary {
      background: #6c757d;
    }
    .btn-secondary:hover {
      background: #5a6268;
    }
    /* Pulsante per il form principale */
    .btn-primary {
      background: #1a73e8;
      width: 100%;
      margin-top: 10px;
      padding: 12px 24px;
      font-size: 1rem;
      font-weight: 600;
    }
    .message {
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 0.9rem;
    }
    .success { background-color: #e6fffa; border-left: 4px solid #38a169; color: #22543d; }
    .error { background-color: #fff5f5; border-left: 4px solid #e53e3e; color: #742a2a; }
    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid #e2e8f0;
      border-top-color: #1a73e8;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .assignment-group {
      background: #f8f9fa;
      padding: 15px;
      border-radius: 12px;
      margin-top: 15px;
    }
    .assignment-group h4 {
      margin-top: 0;
      margin-bottom: 15px;
      font-size: 1rem;
      color: #2c3e50;
    }
    .inline-checkbox {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 15px;
    }
    .inline-checkbox input {
      width: auto;
    }
    /* Modale articoli in magazzino */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .modal-content {
      background: white;
      border-radius: 16px;
      width: 90%;
      max-width: 1000px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }
    .modal-content h3 {
      margin-top: 0;
      margin-bottom: 15px;
    }
    .modal-filter {
      display: flex;
      gap: 15px;
      margin-bottom: 15px;
      align-items: flex-end;
    }
    .modal-filter .form-group {
      flex: 1;
    }
    .modal-filter button {
      width: auto;
      padding: 8px 16px;
      margin-top: 0;
    }
    .article-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }
    .article-table th, .article-table td {
      border: 1px solid #ddd;
      padding: 8px;
      text-align: left;
    }
    .article-table th {
      background: #f8f9fa;
    }
    .close-modal {
      float: right;
      background: #dc3545;
      color: white;
      border: none;
      padding: 5px 10px;
      border-radius: 4px;
      cursor: pointer;
    }
    .close-modal:hover {
      background: #bb2d3b;
    }
  </style>
</head>
<body>
<div class="container">
  <!-- BARRA SUPERIORE CON PULSANTI (stile GestioneArticoli) -->
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
  <div class="logo">
    <img src="/images/kastle-logo.png" alt="Kastle" style="height: 40px;">
  </div>
  <div style="display: flex; gap: 10px;">
    <button class="btn btn-secondary" onclick="window.location.href='MenuPrincipale.html'">🏠 Menu</button>
    <button class="btn btn-secondary" onclick="logout()">🚪 Logout</button>
    <button class="btn btn-secondary" onclick="mostraArticoliMagazzino()">📋 Articoli in magazzino</button>
  </div>
</div>

  <h2>📦 Inserimento Articolo</h2>
  <div id="messageArea"></div>

  <form id="articleForm" onsubmit="return false;">
    <!-- Quattro campi affiancati -->
    <div class="top-row">
      <div class="form-group">
        <label>Magazzino *</label>
        <select id="magazzino" required>
          <option value="">⏳ Caricamento...</option>
        </select>
      </div>
      <div class="form-group">
        <label>Settore *</label>
        <select id="settore" required>
          <option value="">⏳ Caricamento...</option>
        </select>
      </div>
      <div class="form-group">
        <label>Categoria *</label>
        <select id="categoria" required>
          <option value="">⏳ Caricamento...</option>
        </select>
      </div>
      <div class="form-group">
        <label>Marca *</label>
        <select id="marca" required>
          <option value="">⏳ Caricamento...</option>
        </select>
      </div>
    </div>

    <!-- Descrizione in riga intera -->
    <div class="full-row">
      <div class="form-group">
        <label>Descrizione *</label>
        <input type="text" id="descrizione" list="descrizioneList" required autocomplete="off" placeholder="es. Cacciavite a stella">
        <datalist id="descrizioneList"></datalist>
      </div>
    </div>

    <!-- Codice Modello (sinistra) e Sigla (destra) affiancate -->
    <div class="double-row">
      <div class="form-group">
        <label>Codice Modello</label>
        <input type="text" id="codice_modello" list="codice_modelloList" autocomplete="off" placeholder="Modello fornitore">
        <datalist id="codice_modelloList"></datalist>
      </div>
      <div class="form-group">
        <label>Sigla</label>
        <input type="text" id="sigla" list="siglaList" autocomplete="off" placeholder="Codice interno">
        <datalist id="siglaList"></datalist>
      </div>
    </div>

    <!-- Lunghezza e Durezza affiancate -->
    <div class="double-row">
      <div class="form-group" id="gruppoLunghezza">
        <label>Lunghezza (cm)</label>
        <input type="text" id="lunghezza" list="lunghezzaList" autocomplete="off" placeholder="es. 15">
        <datalist id="lunghezzaList"></datalist>
      </div>
      <div class="form-group" id="gruppoDurezza">
        <label>Durezza</label>
        <input type="text" id="durezza" list="durezzaList" autocomplete="off" placeholder="es. HRC 50">
        <datalist id="durezzaList"></datalist>
      </div>
    </div>

    <div class="full-row">
      <div class="form-group">
        <label>Quantità *</label>
        <input type="number" id="quantita" value="1" min="1" step="1" autocomplete="off">
      </div>
    </div>

    <div class="full-row">
      <div class="form-group">
        <label>Versione</label>
        <input type="text" id="versione" value="1.0" autocomplete="off">
      </div>
    </div>

    <div class="full-row">
      <div class="form-group">
        <label>Note</label>
        <textarea id="note" rows="3" placeholder="Eventuali note" autocomplete="off"></textarea>
      </div>
    </div>

    <!-- Sezione ASSEGNAZIONE opzionale -->
    <div class="full-row">
      <div class="inline-checkbox">
        <input type="checkbox" id="assegnaCheckbox">
        <label for="assegnaCheckbox" style="margin-bottom:0;">📤 Assegna a destinatario</label>
      </div>
      <div id="assegnaSection" style="display:none;" class="assignment-group">
        <h4>Dettagli assegnazione</h4>
        <div class="double-row">
          <div class="form-group">
            <label>Destinazione</label>
            <select id="destinazioneTipo">
              <option value="PROMOTER">👤 Promoter</option>
              <option value="NEGOZIO">🏪 Negozio</option>
              <option value="CLIENTE">👥 Cliente</option>
              <option value="AGENTE">🤝 Agente</option>
            </select>
          </div>
          <div class="form-group">
            <label>Seleziona destinazione *</label>
            <select id="destinazioneId">
              <option value="">Seleziona...</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>Note per l'assegnazione (opzionale)</label>
          <input type="text" id="assegnaNote" placeholder="Note aggiuntive per l'uscita">
        </div>
        <div class="info-note" style="font-size:0.75rem; color:#6c757d;">
          L'articolo verrà assegnato al soggetto scelto subito dopo la creazione.
        </div>
      </div>
    </div>

    <button type="button" class="btn btn-primary" id="saveBtn" onclick="salvaArticolo()">💾 Salva Articolo</button>
  </form>
</div>

<!-- MODALE ARTICOLI IN MAGAZZINO -->
<div id="modalArticoli" class="modal">
  <div class="modal-content">
    <button class="close-modal" onclick="chiudiModalArticoli()">✖️ Chiudi</button>
    <h3>📦 Articoli in magazzino</h3>
    <div id="modalMessage" style="margin-bottom: 10px;"></div>
    <div class="modal-filter">
      <div class="form-group">
        <label>Filtra per categoria</label>
        <select id="filtroCategoriaModal">
          <option value="">Tutte</option>
        </select>
      </div>
      <div>
        <button class="btn btn-secondary" onclick="applicaFiltroCategoria()">🔍 Filtra</button>
      </div>
    </div>
    <div style="overflow-x: auto;">
      <table class="article-table" id="tabellaArticoliModal">
        <thead>
           <th>Codice</th><th>Descrizione</th><th>Lunghezza</th><th>Durezza</th><th>Qtà Totale</th><th>Giacenza Reale</th>
        </thead>
        <tbody>
           <td colspan="6" class="text-center">Caricamento...<\/td>
        </tbody>
      表格
    </div>
  </div>
</div>

<script>
  // ========== GESTIONE SESSIONE E UTILITY ==========
  function getAuthHeader() {
    const token = localStorage.getItem('token');
    if (!token) return null;
    return { 'Authorization': 'Bearer ' + token };
  }

  function showMessage(message, type = 'success') {
    const msgDiv = document.getElementById('messageArea');
    msgDiv.innerHTML = `<div class="message ${type}">${message}</div>`;
    setTimeout(() => {
      if (msgDiv.firstChild) msgDiv.removeChild(msgDiv.firstChild);
    }, 5000);
  }

  async function apiFetch(endpoint, options = {}) {
    const headers = {
      'Content-Type': 'application/json',
      ...getAuthHeader(),
      ...options.headers
    };
    const response = await fetch(endpoint, { ...options, headers });
    if (!response.ok) {
      const errorText = await response.text();
      throw new Error(`Errore ${response.status}: ${errorText}`);
    }
    return response.json();
  }

  function restoreSession() {
    const token = localStorage.getItem('token');
    if (!token) return false;
    return true;
  }

  // ========== CARICAMENTO DATI DEI SELECT ==========
  let categorieCompleto = [];
  const magazzinoSelect = document.getElementById('magazzino');
  const settoreSelect = document.getElementById('settore');
  const categoriaSelect = document.getElementById('categoria');
  const marcaSelect = document.getElementById('marca');

  function setDefaultSelect(selectElement, testiValidi) {
    if (!selectElement) return false;
    for (let i = 0; i < selectElement.options.length; i++) {
      const opt = selectElement.options[i];
      const testoMin = opt.text.toLowerCase();
      for (let valido of testiValidi) {
        if (testoMin === valido.toLowerCase()) {
          selectElement.value = opt.value;
          console.log(`Default impostato per ${selectElement.id} -> ${opt.value} (${opt.text})`);
          return true;
        }
      }
    }
    console.warn(`Default non trovato per ${selectElement.id} con testi:`, testiValidi);
    return false;
  }

  async function caricaMagazzini() {
    try {
      const data = await apiFetch('/api/anagrafiche/magazzini');
      magazzinoSelect.innerHTML = '<option value="">Seleziona magazzino</option>';
      data.forEach(m => {
        const option = document.createElement('option');
        option.value = m.id;
        option.textContent = m.nome;
        magazzinoSelect.appendChild(option);
      });
      setDefaultSelect(magazzinoSelect, ['race']);
      await caricaSettori();
    } catch (err) {
      console.error(err);
      magazzinoSelect.innerHTML = '<option value="">Errore caricamento magazzini</option>';
      showMessage('Errore caricamento magazzini', 'error');
    }
  }

  async function caricaSettori() {
    try {
      const data = await apiFetch('/api/anagrafiche/settori');
      settoreSelect.innerHTML = '<option value="">Seleziona settore</option>';
      data.forEach(s => {
        const option = document.createElement('option');
        option.value = s.id;
        option.textContent = s.nome;
        settoreSelect.appendChild(option);
      });
      setDefaultSelect(settoreSelect, ['sci alpino', 'alpino']);
      await caricaCategorie();
    } catch (err) {
      console.error(err);
      settoreSelect.innerHTML = '<option value="">Errore caricamento settori</option>';
    }
  }

  async function caricaCategorie() {
    try {
      const data = await apiFetch('/api/anagrafiche/categorie');
      categorieCompleto = data;
      categoriaSelect.innerHTML = '<option value="">Seleziona categoria</option>';
      data.forEach(c => {
        const option = document.createElement('option');
        option.value = c.id;
        option.textContent = c.nome;
        categoriaSelect.appendChild(option);
      });
      setDefaultSelect(categoriaSelect, ['sci']);
      await caricaMarche();
      toggleLunghezzaDurezza();
    } catch (err) {
      console.error(err);
      categoriaSelect.innerHTML = '<option value="">Errore caricamento categorie</option>';
    }
  }

  async function caricaMarche() {
    try {
      const data = await apiFetch('/api/anagrafiche/marche');
      marcaSelect.innerHTML = '<option value="">Seleziona marca</option>';
      data.forEach(m => {
        const option = document.createElement('option');
        option.value = m.id;
        option.textContent = m.nome;
        marcaSelect.appendChild(option);
      });
      setDefaultSelect(marcaSelect, ['kastle', 'Kastle']);
    } catch (err) {
      console.error(err);
      marcaSelect.innerHTML = '<option value="">Errore caricamento marche</option>';
    }
  }

  function toggleLunghezzaDurezza() {
    const catId = categoriaSelect.value;
    const categoria = categorieCompleto.find(c => c.id == catId);
    const mostraLunghezza = categoria ? categoria.mostra_lunghezza === 'SI' : false;
    const mostraDurezza = categoria ? categoria.mostra_durezza === 'SI' : false;
    document.getElementById('gruppoLunghezza').style.display = mostraLunghezza ? 'block' : 'none';
    document.getElementById('gruppoDurezza').style.display = mostraDurezza ? 'block' : 'none';
  }

  // ========== FILTRI INCROCIATI PER DATALIST ==========
  const filterFields = ['magazzino', 'settore', 'categoria', 'marca', 'descrizione', 'sigla', 'lunghezza', 'durezza', 'codice_modello'];
  const endpointMap = {
    descrizione: '/api/articoli/valori/descrizioni',
    sigla: '/api/articoli/valori/sigle',
    lunghezza: '/api/articoli/valori/lunghezze',
    durezza: '/api/articoli/valori/durezze',
    codice_modello: '/api/articoli/valori/modelli'
  };

  function getCurrentFilters() {
    const filters = {};
    for (let field of filterFields) {
      let el;
      if (field === 'magazzino') el = magazzinoSelect;
      else if (field === 'settore') el = settoreSelect;
      else if (field === 'categoria') el = categoriaSelect;
      else if (field === 'marca') el = marcaSelect;
      else el = document.getElementById(field);
      if (el) filters[field] = el.value;
    }
    return filters;
  }

  async function aggiornaDatalist(campo, endpoint) {
    const filters = getCurrentFilters();
    delete filters[campo];
    const params = new URLSearchParams();
    for (let [key, value] of Object.entries(filters)) {
      if (value && value !== '') params.append(key, value);
    }
    const url = `${endpoint}?${params.toString()}`;
    try {
      const data = await apiFetch(url);
      const datalist = document.getElementById(`${campo}List`);
      if (!datalist) return;
      datalist.innerHTML = '';
      data.forEach(item => {
        const option = document.createElement('option');
        option.value = item[campo];
        datalist.appendChild(option);
      });
      console.log(`Datalist ${campo} aggiornato con ${data.length} voci`);
    } catch (err) {
      console.error(`Errore aggiornamento datalist ${campo}:`, err);
    }
  }

  async function refreshAllDatalists() {
    for (let [campo, endpoint] of Object.entries(endpointMap)) {
      await aggiornaDatalist(campo, endpoint);
    }
  }

  function attachEvents() {
    magazzinoSelect.addEventListener('change', () => {
      console.log('Magazzino cambiato');
      refreshAllDatalists();
    });
    settoreSelect.addEventListener('change', () => {
      console.log('Settore cambiato');
      refreshAllDatalists();
    });
    categoriaSelect.addEventListener('change', () => {
      console.log('Categoria cambiata');
      toggleLunghezzaDurezza();
      refreshAllDatalists();
    });
    marcaSelect.addEventListener('change', () => {
      console.log('Marca cambiata');
      refreshAllDatalists();
    });

    const textFields = ['descrizione', 'sigla', 'lunghezza', 'durezza', 'codice_modello'];
    textFields.forEach(field => {
      const input = document.getElementById(field);
      if (input) {
        input.addEventListener('change', () => {
          console.log(`${field} cambiato:`, input.value);
          refreshAllDatalists();
        });
      }
    });
  }

  // ========== GESTIONE ASSEGNAZIONE OPZIONALE ==========
  const assegnaCheckbox = document.getElementById('assegnaCheckbox');
  const assegnaSection = document.getElementById('assegnaSection');
  const destinazioneTipo = document.getElementById('destinazioneTipo');
  const destinazioneId = document.getElementById('destinazioneId');
  const assegnaNote = document.getElementById('assegnaNote');

  assegnaCheckbox.addEventListener('change', () => {
    assegnaSection.style.display = assegnaCheckbox.checked ? 'block' : 'none';
    if (assegnaCheckbox.checked && destinazioneId.options.length <= 1) {
      caricaDestinazioni();
    }
  });

  async function caricaDestinazioni() {
    const tipo = destinazioneTipo.value;
    try {
      const data = await apiFetch(`/api/soggetti/tipo/${tipo}`);
      destinazioneId.innerHTML = '<option value="">Seleziona...</option>';
      data.forEach(item => {
        let testo = tipo === 'PROMOTER' ? `${item.nome} ${item.cognome || ''}`.trim() : item.nome;
        destinazioneId.appendChild(new Option(testo, item.id));
      });
    } catch (err) {
      console.error('Errore caricamento destinazioni:', err);
      showMessage('Errore caricamento destinazioni', 'error');
    }
  }

  destinazioneTipo.addEventListener('change', () => {
    if (assegnaCheckbox.checked) caricaDestinazioni();
  });

  // ========== SALVATAGGIO ARTICOLO + ASSEGNAZIONE OPZIONALE ==========
  async function salvaArticolo() {
    const descrizione = document.getElementById('descrizione').value.trim();
    const magazzino = magazzinoSelect.value;
    const settore = settoreSelect.value;
    const categoria = categoriaSelect.value;
    const marca = marcaSelect.value;
    const lunghezza = document.getElementById('lunghezza').value.trim();
    const durezza = document.getElementById('durezza').value.trim();
    const quantita = parseInt(document.getElementById('quantita').value);
    const versione = document.getElementById('versione').value.trim();
    const note = document.getElementById('note').value.trim();
    const sigla = document.getElementById('sigla').value.trim();
    const codiceModello = document.getElementById('codice_modello').value.trim();

    if (!descrizione || !magazzino || !settore || !categoria || !marca || !quantita) {
      showMessage('Compila tutti i campi obbligatori', 'error');
      return;
    }

    const payload = {
      descrizione,
      magazzino: parseInt(magazzino),
      settore: parseInt(settore),
      categoria: parseInt(categoria),
      marca: parseInt(marca),
      lunghezza: lunghezza || '',
      durezza: durezza || '',
      quantita,
      versione: versione || '1.0',
      note: note || '',
      sigla: sigla || null,
      codiceModello: codiceModello || null
    };

    const saveBtn = document.getElementById('saveBtn');
    saveBtn.disabled = true;
    saveBtn.innerHTML = '<span class="spinner"></span> Salvataggio in corso...';

    try {
      // 1. Salva articolo (o aggiorna quantità)
      const articleResult = await apiFetch('/api/articoli', {
        method: 'POST',
        body: JSON.stringify(payload)
      });
      if (!articleResult.success) {
        throw new Error(articleResult.message);
      }
      const articleId = articleResult.id;
      showMessage(articleResult.message, 'success');

      // 2. Se richiesto, assegna l'articolo al destinatario
      if (assegnaCheckbox.checked) {
        const destinazioneTipoVal = destinazioneTipo.value;
        const destinazioneIdVal = destinazioneId.value;
        if (!destinazioneIdVal) {
          showMessage('Articolo salvato, ma manca il destinatario per l\'assegnazione.', 'error');
        } else {
          const assignPayload = {
            magazzinoId: parseInt(magazzino),
            destinazioneTipo: destinazioneTipoVal,
            destinazioneId: parseInt(destinazioneIdVal),
            note: assegnaNote.value.trim() || note,
            oggetti: [{
              tipoOggetto: 'ARTICOLO',
              oggettoId: articleId,
              quantita: quantita
            }]
          };
          const assignResult = await apiFetch('/api/assegnazioni/uscita/batch', {
            method: 'POST',
            body: JSON.stringify(assignPayload)
          });
          if (assignResult.success) {
            showMessage(`Articolo assegnato a ${destinazioneTipoVal} con successo`, 'success');
          } else {
            showMessage(`Articolo salvato ma assegnazione fallita: ${assignResult.message}`, 'error');
          }
        }
      }

      // Reset form
      document.getElementById('descrizione').value = '';
      document.getElementById('sigla').value = '';
      document.getElementById('lunghezza').value = '';
      document.getElementById('durezza').value = '';
      document.getElementById('codice_modello').value = '';
      document.getElementById('quantita').value = 1;
      document.getElementById('note').value = '';
      // Opzionale: deseleziona checkbox assegnazione
      assegnaCheckbox.checked = false;
      assegnaSection.style.display = 'none';
      // Ricarica datalist per aggiornare i suggerimenti
      refreshAllDatalists();
    } catch (err) {
      console.error('Errore:', err);
      showMessage('Errore: ' + err.message, 'error');
    } finally {
      saveBtn.disabled = false;
      saveBtn.innerHTML = '💾 Salva Articolo';
    }
  }

  // ========== MODALE ARTICOLI IN MAGAZZINO ==========
  let articoliCompleti = [];
  let categorieMap = new Map();

  async function mostraArticoliMagazzino() {
    const magId = magazzinoSelect.value;
    if (!magId) {
      showMessage('Seleziona prima un magazzino', 'error');
      return;
    }
    const modal = document.getElementById('modalArticoli');
    modal.style.display = 'flex';
    const tbody = document.querySelector('#tabellaArticoliModal tbody');
    tbody.innerHTML = '<td colspan="6" class="text-center">Caricamento...<\/td>';
    document.getElementById('modalMessage').innerHTML = '';

    try {
      const params = new URLSearchParams();
      params.append('magazzino', magId);
      const res = await apiFetch(`/api/articoli?${params.toString()}`);
      if (res.success) {
        articoliCompleti = res.data;
        // Mappa categorie
        categorieMap.clear();
        categorieCompleto.forEach(c => categorieMap.set(c.id, c.nome));
        // Popola filtro categorie (basato sugli articoli presenti)
        const categorieUniche = new Set();
        articoliCompleti.forEach(a => {
          if (a.categoria) categorieUniche.add(a.categoria);
        });
        const filtroCat = document.getElementById('filtroCategoriaModal');
        filtroCat.innerHTML = '<option value="">Tutte</option>';
        for (let catId of categorieUniche) {
          const nomeCat = categorieMap.get(catId) || catId;
          filtroCat.appendChild(new Option(nomeCat, catId));
        }
        applicaFiltroCategoria();
      } else {
        throw new Error('Errore nel caricamento degli articoli');
      }
    } catch (err) {
      console.error(err);
      document.getElementById('modalMessage').innerHTML = `<div class="message error">${err.message}</div>`;
      tbody.innerHTML = '<td colspan="6" class="text-center">Errore caricamento<\/td>';
    }
  }

  function applicaFiltroCategoria() {
    const catId = document.getElementById('filtroCategoriaModal').value;
    let filtrati = [...articoliCompleti];
    if (catId) {
      filtrati = filtrati.filter(a => a.categoria == catId);
    }
    // Ordine: descrizione alfabetico, poi lunghezza crescente
    filtrati.sort((a, b) => {
      let descA = (a.descrizione || '').toLowerCase();
      let descB = (b.descrizione || '').toLowerCase();
      if (descA !== descB) return descA.localeCompare(descB);
      let lungA = parseFloat(a.lunghezza) || 0;
      let lungB = parseFloat(b.lunghezza) || 0;
      return lungA - lungB;
    });
    renderTabellaArticoliModal(filtrati);
  }

  function renderTabellaArticoliModal(articoli) {
    const tbody = document.querySelector('#tabellaArticoliModal tbody');
    tbody.innerHTML = '';
    if (articoli.length === 0) {
      tbody.innerHTML = '<td colspan="6" class="text-center">Nessun articolo trovato<\/td>';
      return;
    }
    articoli.forEach(a => {
      const row = tbody.insertRow();
      row.insertCell(0).innerText = a.codice || '';
      row.insertCell(1).innerText = a.descrizione_completa || a.descrizione || '';
      row.insertCell(2).innerText = a.lunghezza || '';
      row.insertCell(3).innerText = a.durezza || '';
      row.insertCell(4).innerText = a.quantita_totale || 0;
      const giacenza = (a.quantita_totale || 0) - (a.quantita_in_kit || 0);
      row.insertCell(5).innerText = giacenza;
    });
  }

  function chiudiModalArticoli() {
    document.getElementById('modalArticoli').style.display = 'none';
  }

  // ========== LOGOUT ==========
  function logout() {
    localStorage.removeItem('token');
    localStorage.removeItem('user');
    window.location.href = 'Login.html';
  }

  // ========== INIZIALIZZAZIONE ==========
  window.onload = async function() {
    console.log('🚀 Pagina caricata, controllo sessione...');
    if (!restoreSession()) {
      document.body.innerHTML = '<div class="container" style="text-align:center"><h2>Accesso non autorizzato</h2><p>Devi effettuare il login.</p><a href="Login.html">Vai al login</a></div>';
      return;
    }
    console.log('✅ Sessione valida, carico dati...');
    await caricaMagazzini();
    attachEvents();
    setTimeout(async () => {
      console.log('⏰ Forzo refresh iniziale datalist');
      await refreshAllDatalists();
    }, 500);
    console.log('🏁 Inizializzazione completata');
  };
</script>
