<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Spacchetta Kit Magazzino</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    .form-group { margin-bottom: 15px; }
    label { display: block; font-weight: bold; margin-bottom: 5px; }
    select, input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
    .btn { padding: 8px 16px; background: #1a73e8; color: white; border: none; border-radius: 4px; cursor: pointer; }
  </style>
  <script>
    // ========== LIBRERIA COMUNE ==========
    (function() { /* common.js */ })();

    let magazzini = [], kits = [];

    window.onload = function() {
      if (!window.restoreSession()) {
        document.body.innerHTML = '<div style="padding:20px;text-align:center">Devi effettuare il login. <a href="?login">Login</a></div>';
        return;
      }
      caricaMagazzini();
    };

    function caricaMagazzini() {
      callServer('getMagazzini', {}, function(data) {
        magazzini = data;
        const select = document.getElementById('magazzino');
        select.innerHTML = '<option value="">Seleziona magazzino</option>';
        magazzini.forEach(m => select.innerHTML += `<option value="${m.ID}">${m.NOME}</option>`);
        select.addEventListener('change', caricaKit);
      });
    }

    function caricaKit() {
      const magId = document.getElementById('magazzino').value;
      if (!magId) return;
      callServer('getKitInventory', { magazzino: magId }, function(data) {
        kits = data;
        const select = document.getElementById('kitId');
        select.innerHTML = '<option value="">Seleziona kit</option>';
        kits.forEach(k => select.innerHTML += `<option value="${k.ID}">${k.CODICE_KIT} - ${k.DESCRIZIONE_KIT} (q. ${k.QUANTITA_KIT})</option>`);
      });
    }

    function spacchetta() {
      const kitId = document.getElementById('kitId').value;
      const quantita = parseInt(document.getElementById('quantita').value);
      if (!kitId || quantita < 1) {
        showMessage('Seleziona kit e quantità valida', 'error');
        return;
      }
      const kit = kits.find(k => k.ID == kitId);
      if (quantita > kit.QUANTITA_KIT) {
        showMessage(`Quantità disponibile: ${kit.QUANTITA_KIT}`, 'error');
        return;
      }
      callServer('spacchettaKitInMagazzino', { kitId: kitId, quantita: quantita }, function(res) {
        if (res.success) {
          showMessage(res.message, 'success');
          caricaKit(); // ricarica
        } else {
          showMessage(res.message, 'error');
        }
      });
    }
  </script>
</head>
<body>
  <h2>🔓 Spacchetta Kit in Magazzino</h2>
  <div class="form-group">
    <label>Magazzino</label>
    <select id="magazzino"></select>
  </div>
  <div class="form-group">
    <label>Kit</label>
    <select id="kitId"></select>
  </div>
  <div class="form-group">
    <label>Quantità da spacchettare</label>
    <input type="number" id="quantita" value="1" min="1">
  </div>
  <button class="btn" onclick="spacchetta()">🔓 Spacchetta</button>
</body>
</html>
