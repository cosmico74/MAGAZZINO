<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestione Magazzino</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 1400px;
      margin: 0 auto;
    }
    .header {
      background: rgba(255,255,255,0.95);
      border-radius: 16px;
      padding: 15px 25px;
      margin-bottom: 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    .header h1 {
      color: #2c3e50;
      font-size: 24px;
      margin: 0;
    }
    .user-info {
      display: flex;
      align-items: center;
      gap: 15px;
    }
    .user-badge {
      background: #e8f0fe;
      padding: 6px 15px;
      border-radius: 40px;
      color: #1a73e8;
      font-weight: 500;
      font-size: 14px;
    }
    .logout-btn {
      background: #e74c3c;
      color: white;
      border: none;
      padding: 6px 16px;
      border-radius: 40px;
      cursor: pointer;
    }
    .logout-btn:hover { background: #c0392b; }
    .menu-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
    }
    .menu-item {
      cursor: pointer;
      transition: 0.2s;
      background: white;
      border-radius: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      width: 180px;
      padding: 15px 10px;
      text-align: center;
    }
    .menu-item:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }
    .menu-icon {
      font-size: 32px;
      margin-bottom: 8px;
    }
    .menu-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .menu-desc {
      font-size: 11px;
      color: #666;
    }
    .footer {
      text-align: center;
      margin-top: 40px;
      color: rgba(255,255,255,0.7);
      font-size: 12px;
    }
    .error-message {
      background: #f8d7da;
      color: #721c24;
      padding: 15px;
      border-radius: 8px;
      text-align: center;
      margin: 20px auto;
      max-width: 500px;
    }
  </style>
</head>
<body>
<div id="app"></div>

<script>
  async function apiCall(endpoint, method, data) {
    const token = localStorage.getItem('token');
    const response = await fetch(endpoint, {
      method: method || 'GET',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': token ? `Bearer ${token}` : ''
      },
      body: data ? JSON.stringify(data) : undefined
    });
    if (!response.ok) {
      const error = await response.json();
      throw new Error(error.message || 'Errore nella richiesta');
    }
    return response.json();
  }

  function logout() {
    localStorage.removeItem('user');
    localStorage.removeItem('token');
    window.location.href = 'Login.html';
  }

  async function loadAndShowMenu() {
    const userStr = localStorage.getItem('user');
    const token = localStorage.getItem('token');
    if (!userStr || !token) {
      window.location.href = 'Login.html';
      return;
    }
    const user = JSON.parse(userStr);
    try {
      const menuItems = await apiCall('/api/anagrafiche/menu', 'GET');
      showMenu(user, menuItems);
    } catch (err) {
      console.error('Errore menu:', err);
      document.getElementById('app').innerHTML = `<div class="error-message">❌ Impossibile caricare il menu: ${err.message}</div>`;
    }
  }

  function showMenu(user, menuItems) {
    let livelloText = '';
    if (user.ruolo === 'promoter' && user.livello) livelloText = ` livello ${user.livello}`;
    else if (user.ruolo === 'agente') livelloText = ' (Agente)';

    let html = `
      <div class="header">
        <h1>🏭 Gestione Magazzino</h1>
        <div class="user-info">
          <span class="user-badge">👤 ${user.nome_visualizzato || user.username} (${user.ruolo}${livelloText})</span>
          <button class="logout-btn" onclick="logout()">🚪 Logout</button>
        </div>
      </div>
    `;
    if (menuItems.length === 0) {
      html += `<div style="text-align:center; padding:40px; background:white; border-radius:16px;">Nessuna funzionalità disponibile per il tuo ruolo.</div>`;
    } else {
      html += `<div class="menu-grid">`;
      menuItems.forEach(item => {
        html += `
          <div class="menu-item" onclick="window.location.href='${item.url}'">
            <div class="menu-icon">${item.icona}</div>
            <div class="menu-title">${item.titolo}</div>
            <div class="menu-desc">${item.descrizione}</div>
          </div>
        `;
      });
      html += `</div>`;
    }
    html += `<div class="footer">Sistema di gestione magazzino</div>`;
    document.getElementById('app').innerHTML = html;
  }

  // Avvia
  loadAndShowMenu();
</script>
</body>
</html>
