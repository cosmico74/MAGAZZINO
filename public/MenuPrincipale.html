<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestione Magazzino</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 1400px;
      margin: 0 auto;
    }
    .login-card {
      background: white;
      border-radius: 24px;
      padding: 40px;
      max-width: 400px;
      margin: 0 auto;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }
    .login-card h2 {
      margin-bottom: 30px;
      color: #2c3e50;
      text-align: center;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: #2c3e50;
    }
    .form-group input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
    }
    .btn-login {
      width: 100%;
      padding: 12px;
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }
    .btn-login:hover { background: #1557b0; }
    .error-message {
      color: #e74c3c;
      margin-top: 15px;
      text-align: center;
    }
    .header {
      background: rgba(255,255,255,0.95);
      border-radius: 16px;
      padding: 15px 25px;
      margin-bottom: 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    .header h1 {
      color: #2c3e50;
      font-size: 24px;
      margin: 0;
    }
    .user-info {
      display: flex;
      align-items: center;
      gap: 15px;
    }
    .user-badge {
      background: #e8f0fe;
      padding: 6px 15px;
      border-radius: 40px;
      color: #1a73e8;
      font-weight: 500;
      font-size: 14px;
    }
    .logout-btn {
      background: #e74c3c;
      color: white;
      border: none;
      padding: 6px 16px;
      border-radius: 40px;
      cursor: pointer;
    }
    .logout-btn:hover { background: #c0392b; }
    .menu-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
    }
    .menu-item {
      cursor: pointer;
      transition: 0.2s;
      background: white;
      border-radius: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      width: 180px;
      padding: 15px 10px;
      text-align: center;
    }
    .menu-item:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }
    .menu-icon {
      font-size: 32px;
      margin-bottom: 8px;
    }
    .menu-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .menu-desc {
      font-size: 11px;
      color: #666;
    }
    .footer {
      text-align: center;
      margin-top: 40px;
      color: rgba(255,255,255,0.7);
      font-size: 12px;
    }
  </style>
</head>
<body>
<div id="app"></div>

<script>
  async function apiCall(endpoint, method, data) {
    const token = localStorage.getItem('token');
    const response = await fetch(endpoint, {
      method: method || 'GET',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': token ? `Bearer ${token}` : ''
      },
      body: data ? JSON.stringify(data) : undefined
    });
    if (!response.ok) {
      const error = await response.json();
      throw new Error(error.message || 'Errore nella richiesta');
    }
    return response.json();
  }

  function showLoginForm() {
    document.getElementById('app').innerHTML = `
      <div class="login-card">
        <h2>🔐 Accesso al gestionale</h2>
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="loginUsername" placeholder="Inserisci username">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="Inserisci password">
        </div>
        <button class="btn-login" onclick="doLogin()">Accedi</button>
        <div id="loginError" class="error-message"></div>
      </div>
    `;
  }

  window.doLogin = async function() {
    const username = document.getElementById('loginUsername').value.trim();
    const password = document.getElementById('loginPassword').value.trim();
    if (!username || !password) {
      document.getElementById('loginError').innerText = 'Inserisci username e password';
      return;
    }
    try {
      const res = await apiCall('/api/auth/login', 'POST', { username, password });
      if (res.success) {
        localStorage.setItem('user', JSON.stringify(res.user));
        localStorage.setItem('token', res.token);
        await loadAndShowMenu();
      } else {
        document.getElementById('loginError').innerText = res.message || 'Credenziali errate';
      }
    } catch (err) {
      document.getElementById('loginError').innerText = err.message;
    }
  };

  async function loadAndShowMenu() {
    const userStr = localStorage.getItem('user');
    if (!userStr) {
      showLoginForm();
      return;
    }
    const user = JSON.parse(userStr);
    try {
      const menuItems = await apiCall('/api/anagrafiche/menu', 'GET');
      showMenu(user, menuItems);
    } catch (err) {
      console.error('Errore menu:', err);
      document.getElementById('app').innerHTML = `<div style="background:white; border-radius:16px; padding:20px; text-align:center; margin:20px;">❌ Impossibile caricare il menu: ${err.message}</div>`;
    }
  }

  function showMenu(user, menuItems) {
    let livelloText = '';
    if (user.ruolo === 'promoter' && user.livello) livelloText = ` livello ${user.livello}`;
    else if (user.ruolo === 'agente') livelloText = ' (Agente)';

    let html = `
      <div class="header">
        <h1>🏭 Gestione Magazzino</h1>
        <div class="user-info">
          <span class="user-badge">👤 ${user.nome_visualizzato || user.username} (${user.ruolo}${livelloText})</span>
          <button class="logout-btn" onclick="logout()">🚪 Logout</button>
        </div>
      </div>
    `;
    if (menuItems.length === 0) {
      html += `<div style="text-align:center; padding:40px; background:white; border-radius:16px;">Nessuna funzionalità disponibile per il tuo ruolo.</div>`;
    } else {
      html += `<div class="menu-grid">`;
      menuItems.forEach(item => {
        html += `
          <div class="menu-item" onclick="window.location.href='${item.url}'">
            <div class="menu-icon">${item.icona}</div>
            <div class="menu-title">${item.titolo}</div>
            <div class="menu-desc">${item.descrizione}</div>
          </div>
        `;
      });
      html += `</div>`;
    }
    html += `<div class="footer">Sistema di gestione magazzino</div>`;
    document.getElementById('app').innerHTML = html;
  }

  function logout() {
    localStorage.removeItem('user');
    localStorage.removeItem('token');
    showLoginForm();
  }

  if (localStorage.getItem('user') && localStorage.getItem('token')) {
    loadAndShowMenu();
  } else {
    showLoginForm();
  }
</script>
</body>
</html>
