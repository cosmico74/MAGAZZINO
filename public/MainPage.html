<script>
  function apriMaschera(nomeFile) {
    google.script.run
      .withSuccessHandler(function(htmlContent) {
        // Sostituisce il contenuto della pagina con il nuovo HTML
        document.getElementById('contenuto').innerHTML = htmlContent;
      })
      .getHtmlFromFile(nomeFile); // Una nuova funzione server che restituisce l'HTML
  }
</script>

<div id="contenuto">
  <!-- Qui verrà caricato il contenuto delle varie maschere -->
</div>
